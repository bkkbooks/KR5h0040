front:
  text: 完孝録凡例封一一堪輿論巒頭者雪心賦葬經等書言之備
  hash: sha256:71f7d04ab28f52a33bd0641b8e042cdbe2625715dedbb99fc36f571903ca389e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0040_HFL_001-001a, image: hfl/1089/1089-004.png}
body:
  text: 矣論星氣者催官篇玉尺經等書言之備矣更復何贅是編中所載皆因古人所未言者而言之或古人言而未詳者而詳言之一切陳言不載但其中如廣熊氏饒安李氏括蒼季氏泰和周氏臨川昊氏之類言皆切理尚未廣傳于世故併録之一論形氣諸前賢格言皆可備參考至七政造命年月世所罕傳故編中論形氣者略而論七政者詳論形氣者止存今文論七政者併存古文一天符紫白闡五運六氣之機發洛書河圖之祕其理與七政相表裏者此亦世所罕傳故併存之一仁人孝子之心原無所為而為而編中輒言吉凶禍福後來之應驗者不亦惑世乎然以純孝之士不恆有於世故舉其驗以歆動之不必一一如所云一地理本靜也古人制作每於靜中求動故多用變夫變者權也權非聖人不能用時師而誤用之其不敗乃事幾希是編惟道其常而已至用變而涉奇怪幽玄皆所不載完孝録目録卷一一章論陰陽正宗二章論氣運通塞三章論氣色貴賤四章論氣色真假五章論五氣生尅六章論天地氣機七章論龍穴砂水八章論龍九章論穴十章論砂十一章論水十二章論峽位十三章論形勢十四章論定穴十五章論證穴十六章論星氣十七章論極暈十八章論四神星宿十九九章論左右朝對二十章論體槩草一章論花假草二章論約束草三章論交度草四章論五行生尅草五章論三合草六章論應驗草七章論用神沖合草八章論變體作穴草九章論尋龍總要三十章論宅墓總要卷二三十一章論選期正式三十二章論天時三十三章論造命三十四章論格局三十五章論身命三十六章論審氣三十七章論推星三十八章論二五三十九章論山向二五四十章論七政四十一章論過官四十二章論定時四十三章論天文四十四章論天運四十五章論經星四十六章論緯星四十七章論星土四十八章論帝星四十九章論五星五十章論中針五十一章論二曜五十二章論天機五十三章論火星五十四章論土星五十五章論金星五十六章論水星五十七章論紫氣五十八章論月孛五十九章論羅㬋六十章論計都三卷選擇條例細目見後觀星節要凡三十四章四卷七政細目見政五卷天符正經細目見後六卷九宫紫白細目見後七卷五星命略細目見後八卷安葬儀節細目見後目録終儒門崇理折衷堪輿完孝録卷之一蓋自有天有地分陰分陽至理流通於兩間元氣運行於萬古昏昏默默妙闔闢於無窮混混沌沌神變通於莫測或敷而為二氣之推遷或布而為五行之生尅一消一長總妙玄工為盈為虛無非造化天地之神固不可知推遷之數則有可考為日月為星辰其燦然于上者有一定之度為山川為土石其凝然于下者有一定之形推其度可以知年月日時之吉凶察其形可以決龍穴砂水之禍福道參三極理無二途惟三才合一之士可以凝天命佑神工彼拘攣執一之徒安得肩鴻巨當重任高其談闊其步依然遠類乎楊曾擬其象畫其圖居然自安於廖賴若問天文地理那有實見真知大者勿論乃拘拘于小節之疵全體罔聞顧屑屑於一偏之見巳昧乎山川向背之分且以方向言禍福既踈于聖正授時之令更以雜説論日時况偽書之紛紛濟誕説之喋喋天無二日古今定理今之論太陽者則曰曆數曰烏兔曰都篡之類有七位太陽之參差民無二王聖賢格言今之論帝星者則曰尊帝曰天皇曰口斗之類有十三帝星之間雜變亂陰陽者則有為淨陰為淨陽為分陰為分陽為真陰為真陽為先天為後天詎知太極之陰陽無二理易置五行者則有為陰府為洪範為八卦為雙山為玄空為納音為渾天為星宿誰知生成之五行無兩端似此之類難以悉舉信此之輩舉世皆然是以疑信交馳令人一二世而無葬地可否難辨致人數十年而無葬期始信偽術不足憑惟有吾心為真主吾心果善人自傑而地自靈念慮少虧地不庇而神不佑不然胡龍頭政嚴災兆十日胡牛眠山上位至三公况興衰成敗之機莫非天定故貪謀詐求之計枉自心勞或侵掘巳祖猶如剜肉以充飢或偷葬人塋無異盜鈴而掩耳奉勸世人無如守正培心地乃為得地之本循天理誠為地理之根崇信明師毋惑幻術相地以五星巒頭為先而卦例天星奚足惑擇期以七政要旨為重而百家雜説何足憑守此陰陽正理可參造化玄機相地以五星四句是一部大旨右第一章論陰陽正宗龍穴砂水地之形也盛衰消長地之氣也形本吉而氣未至則無先作福之理如尼丘生孔嵩嶽生申前古豈非此山水耶以氣運未至雖造化不能先啓其機形甚吉而氣巳泄亦無再作福之理如諸馮生舜岐周生文後世豈變易此山水耶以氣運之既盡雖造化不能復啓其機蓋天地之氣流行不滯古之洛陽今非昔此今之京師視古獨盛均此山川而作福有遲早久近之不同者以氣運之至與未至盡與未盡耳何嘗拘拘于龍穴砂水間耶然盛衰之機必有先兆是故河洛呈祥發卦疇之預兆麒麟郊見啓王法之先機黃河清而知聖王之御極五星聚而兆賢士之並生此皆關乎天下國家之盛故天地精萃之氣顯而為禎祥有如此也若氣數將亡則妖孽並生而凶氣集矣是氣也固大無不包亦小無不貫雖市廛之間墓宅之所亦有盛衰之可言者凡入其鄉登其宅墓見其禽獸繁育草木暢茂風氣和暖山谷騰輝水深土厚景色清奇至于晨昏半子之時乃見祥光呈現淑氣交騰又有若遠遠微聞鍾鼓之聲老者持杖壯者軒昴童子班班俊秀人人和樂雍雍揖遜凡此皆盛氣也發福必大若入其鄉登其宅墓見其草木焦枯禽獸離散風聲悽慘氣色消索山川崩破寒谷幽暗及晨昏半子之時又見光明不著滯氣交騰而寂寂然如入於無人之境家無頒白少壯罷弱內有風聲庭多忤逆凡此皆衰氣也為禍必速又有等人家出麻白悽慘之氣者必主喪服有黑爛沉滯之氣者必主疾疫有赤燥炎蒸之氣者必主火災官非之類或生菁苔或生白毫或牝雞鳴亦皆凶氣致之也又有等墓塜無故自陷風拔其樹雷擊其處其家亦主退敗墓土焦枯炎燥發露此火氣盛也必主蟲蟻墓上獨生青蒿或生白草白葉樹皆水氣盛也必主水泉凡山大水小而無龍穴者必生白蟻凡山小水大而無龍穴者必主水泉或來龍雖真而穴于無氣之所其禍亦然四旁皆生草木而塜上獨無者其中白蟻滿棺塜上獨生青苔而四旁皆無者其中水泉盈穴穴有砂石者水泉不免穴乘殺氣者白蟻亦生葬虛窩者水必浸葬頑硬者蟻必至此亦理之必然者皆衰氣也此盛衰之氣巳見其大概苟細察之愈推愈妙今人見靈芝等瑞誰不重之然非無别也如或靈芝之始出頭者有如寶蓋之微露其頂或如蜜蜂之吹飴微微然似有其聲實無其聲此初盛氣也露其頭者復露其盤露其頂者復露其簷似有其聲者實有其聲或紅或黃或赤或五色間雜而成章此正盛之氣也至若如靈芝之有盤者露其幹如寶蓋之有簷者露其柄或郁郁然盈人之日或鬨鬨然盈人之耳此極盛之氣也過此則盛極而衰矣如靈芝之有幹而長如寶蓋有柄而高如蚊鼓之自近而遠如微雷之自低而升如祥煙之結五彩者外濃而內淡此將衰之氣也如靈芝之有幹而斜飄不著於地如寶之柄高而飛拂無所依如蚊鼓之去遠如微雷之過高如五彩之一片一片而聚散無常此正衰之氣也至若如靈芝寶蓋之朽而壞變而無聲之高而亢遠而極色之濃者倏而為淡飄飄然如殘星之將散拂拂然如敗葉之經風此極衰之氣也在智士之善惟耳右第二章論氣運通塞卜氏曰相地一似相人此善喻相地之法也余觀風鑑之流每每以形體觀人之貴賤以氣色辨人之窮通二者兼盡然後相法無遁情也何今之相地者徒知相形體而不知觀氣色卒不能如相人之驗矣范氏曰祖龍高頂名樓殿常有雲氣現楊氏曰望氣尋龍易是古人相地丑來嘗不決之於氣也今人胡置而勿論耶然氣之現於微芒者認之尤難惟平旦之時清氣未散泊暮之際正氣方收及時兩方霽之㬋初秋中元之旦斯時也微露者皆可見恍惚者皆可觀至於更深半子之時認之尤當凡青紅者皆陽氣也白黑者皆陰氣也黃而潤澤者陰陽沖和之氣也觀氣之高低體態可以卜所結龍穴之長短觀氣之廣狹規模可以卜所收砂水之多少觀氣之端然而直上定知正穴必在幹龍觀氣之飄然而斜行定知正穴必是枝落幹氣自然雄偉高大枝氣自然卑小清弱山雄健者氣旺盛山柔弱者氣微細故曰龍行十里氣高一丈富穴氣如疊壘色艷而濁貴穴氣如張蓋色清而奇初吐一線上結華蓋蔥蔥鬱鬱如雲如煙如旃冕垂琉黃中五色具備似龍燔者名曰旺氣帝王之地蓋帝王陰陽合德五氣儲精又土為君政其色本黃龍為君象其形本肖所以備具五色又黃多而象龍也紅光明爍森森林林如虹如月如鳳舞者名曰淑氣后妃之地蓋后妃與君敵體相去不遠又火能助土鳳為君瑞所以紅多而象鳳也或內白外黃前青后紫青如牛首赤如虎尾者猛將之氣侯伯之地初若雲煙終類鼎沸中青外紅如流星燭地如蛟騰鳳翥者福喜之氣宰相之地赤白一線直沖貫日者忠幹之氣諫臣之地赤紅一線如虹而微帶綵色者文奇之氣狀元之地純白純黃民牧之地紅黃紫白相間而青潤者翰苑之俊紅黃黑白相間而厚重者附馬之英初吐一線終結寶蓋五色俱備輕清上浮有紋不雜如踏節如寶塔如搖旌如幢幡耀日燭星者為異氣神仙之地此氣多現於飛鴈龍鐵拐龍五色具備正直無倚如大臣之立朝者為正氣道學之地此地多現於中正龍逸士龍大抵青紅而明亮者文臣也白黑而徑直者武職也青紅白黑又帶一絲黃潤者文武全才也其氣類禽者出文其氣類獸者出武其氣盛大而燭天者必産出將入相之士其氣低小而光明者亦出文官而兼武備欲知官祿之崇卑視氣之高低廣狡而可見欲知官祿之久暫察氣之大小厚薄而可知欲知官祿之在何方蔭何命人則分野可考方位可斷如坐命坐穴皆在子而吉氣正躔玄枵之次者官祿多在宋利亥卯未人坐命坐穴皆在丑而吉氣正躔星紀之次者官祿多在鄭利申子辰人坐命穴皆在寅而吉氣正躔析木之次者官祿多在楚利巳酉丑人坐命穴皆在卯而吉氣正躔大火之次者官祿多在周利寅午戌人坐命穴皆在辰而吉氣正躔壽星之次者官祿多在秦利亥卯未人坐命穴皆在巳而吉氣正躔鶉尾之次者官祿多在晉利申子辰人坐命穴皆在午而吉氣正躔鶉火之次者官祿多在趙利巳酉丑人坐命穴皆在未而吉氣正躔鶉首之次者官祿多在魯利寅午戌人坐命穴皆在申而吉氣正躔實沈之次者官祿多在衛利亥卯未人坐命穴皆在酉而吉氣正躔大梁之次者官祿多在齊利申子辰人坐命穴皆在戌而吉氣正躔降婁之次者官祿多在昊利巳酉丑人坐命穴皆在亥而吉氣正躔娵訾之次者官祿多在燕利寅午戌人官位之升遷無定方則吉氣之旋轉亦無定在如坐命坐山在子而官貴之氣現於申者官祿多在晉若有時轉入於辰則官祿又在鄭或再轉而入於午則官祿又遷於周凡自低而高自微而著必升遷之氣也若漸低漸微必降謫之氣也變而為無者必退斥之氣也又有飄揚而入於坐山者必致仕還鄉之氣也凡此之類未可盡述非聰明特達之士不能探其玄微右第三章論氣色貴賤地之氣色有真有偽偽者似真真者似偽作福之地其氣特奇停停然如寶蓋郁郁然似靈芝望之則有影可見即之則無形可拘或紅或黃或紫或赤或白而滋潤或黑而有光或五色相間或萬象交騰又或如空中之錦繡或如五彩之文章凡此皆造化吉氣鍾之於地故精光特露有如是也若夫或白或藍橫欄散漫其象甚著其中甚澆此必是日氣與水氣相交而成者又有日出曙氣日落霞氣月出入輝光氣雨後雲氣老山濕氣川澤嵐氣珠藏澤媚玉韞山輝古窖浮光古墓有耀延平之劔芒射斗牛瓜園之刀光含夜月草木之枯老則有光器物之年深則有火人血之在野日久則暮夜生明禽獸之血亦積久而有焰妖蛇之吐氣似雲妖雉之吐氣似錦妖龜之吐氣似霞蜃之吐氣每每結成樓臺之狀與夫神火鬼火土地燈社司燈之類難以枚舉皆偽氣之似真者也大抵真氣上大下小偽氣上小下大真氣外淡內濃偽氣外濃內淡真氣外暗內明偽氣外明內暗真氣有氣而有光偽氣有光而無氣真氣出山之巔偽氣橫山之腰真氣多結於陽明之地偽氣多結於幽谷之中真氣多現於衆山攢聚之鄉偽氣多現於孤陰獨陽之處辨之不精未必不指鶡雀而為鳳野鳥而為鸞蝘蜒而為龍也氣之偽者勿論已而氣之真者又有龍氣穴氣砂氣水氣之不同祖龍之氣定是光芒燭天穴中之氣必然精光獨露一分砂之為氣所以輔龍穴之用也故欲看砂上之氣者當以龍穴之氣為主未可以砂上之氣旺而遂以為吉穴在砂也如東方龍穴砂上見白氣紅氣南方龍穴砂上見黑氣黃氣之類皆尅泄之氣也見之必凶惟龍穴本氣極旺者方可免咎若東方龍穴砂上見黑潤之氣南方龍穴砂上見青潤之氣之類見之甚吉雖龍穴本極衰弱亦不作禍凡尅泄之氣落陷宫為禍必淺生扶之氣落陷宫作福亦輕如火在北土在東之類即陷宫也水之氣其象與砂氣同右第四章論氣色真假春氣青兮夏氣紅清秋白潤黑居冬黃氣分居四季流行總是不同如青氣獨盛於芳春雖見白氣而無害赤光騰耀於夏日縱遇黑氣而不防白旺不畏赤臨黑盛何愁黃至夏季之土見木不生災旺氣之黃逢青而不尅細觀氣之盛者既不畏尅則知氣之衰者自不能生三春之土難以助金九夏之白何能生水冬火不救季土秋木不顧炎君四季水衰青黃何賴東方青氣輕飄本嫌白露若見絲絲紅紫定知賜宴瓊林西方嫩白飛揚不宜炎至或者微微黑現必然汗馬成功赤微畏黑見黃婆則功成可待水少忌土見青黃則事業可成黃雖懼木白解救土獨青能為筋骨之疾單紅必興牢獄之災重黃瘟疫孤白死亡孛在北方無間色災生不測不須疑此皆青紅黃白不潤黑帶濕滯無光若是中和何妨災至青氣散亂而不正多生巫祝紅光尖射而怪異定出訟師白氣亂出而亂飄世傳剛惡黑光斜沒而斜現代有穿窬黃現昏暗無光定産盲聾喑啞青亂必多變黑亂必多淫紅亂則文筆不開花白亂則干戈必生耀更有黃氣亂則生疾紅黃現總曰禎祥豈知亂紅現於西方必招血疾亂黃産於北地定主賢虛青黑生似非淑氣豈知青潤生於南地則光輝益著嫩黑呈於東土則生意可人蓋凶中也會藏吉吉處也會藏凶皆自然之機亦一定之理太旺則凶暴強悍太弱則孤苦伶仃旺極者斬後必速弱極者終亦絶嗣久暫雖殊同歸一致右第五章論五氣生尅風水之術先識氣機氣機不識風水何為氣通於天機達於地通天達地逈别時師略舉一二誨我支裔氣有進成機亦有進成進者吉成者又吉氣有退敗機亦有退敗退者凶敗者又凶履其龍登其穴挹其砂水審其氣機為進為成則貴地決其尊榮富地決其興旺縱貧賤之地亦安好也為退為敗則貧龍斷其枯竭賤龍斷其疾患縱富貴之地亦零落也春屬於木木之氣青木之機升夏屬於火火之氣赤火之機炎秋屬於金金之氣白金之機融冬屬於水水之氣黑水之機沉四季屬土土之氣黃土之機凝悠悠揚揚絪氲滿眼蕩樣飛絲淅瀝震響此木氣也鳥嬌其聲人含其笑青衣童子提壼挈榼此木機也舉凡所見所遇帶有動蕩之情歡虞之狀崛起之體態者皆屬於木皆為春之所宜矣緑靄紅光飛英集曰閃閃爍爍激烈怒號此火氣也犬吠雞鳴妻呼子叫牧堅樵夫歌吟笑跳此火機也舉凡旿見所遇帶有洶湧之情咆哮之狀轟烈之體態者皆屬於火皆為夏之所冝矣清清白白風色飄搖聽若有聲視之無形此金氣也行歌坐笑聲應聲呼驅牛趕馬緩語徐行此金機也舉凡所見所聞帶有思嘆之情倦怠之狀醉飽之體態者皆屬於金皆為秋之所宜矣寧寧靜靜無塵無上不動不搖亦不寂寥此水氣也扶肩而行對膝而坐携手而語為飛不嗚此水機也舉凡所見所遇帶有憂傷之情抱悶之狀妝斂之體態者皆屬於水皆為冬之所宜矣塵埃滿眼黃沙霏微萬籟無聲風氣溫涼此土氣也整衣束屢正立清談肩負擔荷為宿獸歸此土機也舉凡所見所遇帶有端肅之情負戴之狀沉潛之體態者皆屬於土皆四季之所宜矣春得火氣機為進木氣機為成水氣機為退金氣機為敗舉其一可以知其餘四季之土亦附四時而論氣斷人丁宫爵機斷祖業財帛氣雜者一門數姓氣進者子孫成名氣成者添丁進爵氣退者官休子病氣敗者官禍子死機雜者陽宅主淫奔陰墳亦主淫奔機進者産益財來機成者庫充倉滿機退者家耗廩虛機敗者賣田借債審氣機之時屬寅即應寅亥之生命審氣機之時在巳即應巳申之生命餘可類推而知斷其吉推生命祿寅之月斷其凶推生命刑刃之期萬無一失者也有春月登山見跨馬者一墳石砌斷其有隔足之疾一墳荒草斷其全富貴之家有夏月入聞聞燕語者問疾病斷其秋必死亡問功名斷其秋必榮捷有秋月登山見携酒者一有碑之墳斷其富而無積一無碑之墳斷其吝而有財有冬月登山聞鴉聲者一男墳斷其子陛御史一女墳斷其家寒子孝有日午登墳見日影者斷西方興旺齗東方零落有日午登堂見賣菜者斷男女無緣中年失偶此皆以氣機論也右第六章論天地氣機此以前論氣以後論形談龍者必曰來龍龍不見其來則將何作主論穴者必曰穴情穴不審其情則以何為證龍之枝幹雖殊其來也皆有飛見潛躍如一不全則龍不真穴之形體雖異其落也皆有情勢氣脈如一不聚則穴不正有真龍有正穴則砂之吉者吉也凶者亦將為我制譬之朝廷有道則姦雄化為純良水之來者來也去者亦將為我用譬之心腹無虞則疥癬何嫌一二無個非龍其來不終葬者乘之孤獨貧窮無穴非穴其中必拙葬者當之輕貧重絶生尅皆砂皆宜就我子父財官皆宜柔抱抱我皆吉皆我皆禍來去皆水皆宜舒徐艮丙巽辛皆宜溶注金水土佳木火為崇裹趕非砂蟹蝦非水一以定龍一以證穴龍有正變穴有乘除金變如木火溶其傍勢如一線貴不可當見土成穴穴欲其藏土變如金木列其間勢如剖瓜富不可言遇火伏側穴除其巔砂嫌離鄉亦愛離鄉嫌在尖削為漂為蕩愛在圓秀遠宦富商水莫愛去亦莫伯去去者回顧四處招財來者箭跳一事不諧穴音緯交覆深屋也右第七章論龍穴砂水待哺之雛伏棲何鳴起微之犬黨巷何聲發將之巔龍之起祖曰發將過峽曰過將結穴曰住將巉然何圓結咽之關混然何平二氣何儀五兆何行奇幻倏忽易步分程聯鑣附轡並足爭衡降高就卑僕從紛紛如群羊之躑躅如驚鳥之翻翎如蚓沿壤陌如蛛絲畫簷如帛之紋如水之痕其翩翩片葉必趨於一陳其壘壘群隊必隨於一奔若起若伏若斷若連勢不纍形形不纍塋崇雅之岡其住欲巧稠衆之岡其住欲專隱隱微微其降既弱其住欲端蜿蜿蜒蜒其勢既橫其住必旋葉茂枝繁定須腰結葉踈枝朗盡處可扜故曰衆山回頭結在原頭衆山飛走結在水口上下相抄結在中腰此可為尋龍之要領亦可為點穴之大端是以龍之行也有手有足龍之住也有頭有面龍子端嚴也不顧四面龍之四面也皆顧龍神龍之行度宜相生相合龍之硤位宜相尅相刑龍之起祖必顧子孫龍之到頭必肖宗祖祖宗重厚有好子孫子孫秀異由好宗祖故曰祖強宗強立已善艮子孫其昌宗雖分泒祖德未艾子孫昌大發迹雖涼承世延長聲聞遠揚祖沒宗茂一代之富祖榮宗燁富貴奕葉子孫迎迎宗祖繩繩宗派降勢祖本山泠一代小康宗泒降勢祖本山顧光大之葬亡祖失宗望人門户皆祖棄宗南北西東平地之龍無異高山蓋高山之五星堅體平地之五星卧體分枝結咽開帳出胍順逆迎送無一不同但北龍山勝於水故多就氣南龍水勝於山故多就水右第八章論龍近日顓門人家輒曰窩鉗乳突窩鉗一也窩則圓而鉗則直乳突一也突則聳而乳則垂金水之龍愛成窩鉗土木之龍愛成乳突窩以心泡為證高無心泡為側為空空側之窩孤寡貧窮鉗以貫耳為證鉗無貫耳為蕩為散蕩散之鉗人離家散乳以隨水為證乳無隨水為枯為竭枯竭之乳非貧即絶突以鬚翼為證突無鬚翼為孤為孑孤孑之突艱難四裂地在高山突中愛窩地在平洋窩中愛突穿空穿薄穴情便惡夾堅夾頓穴情鎔暖借官不借鬼借鬼者絶借虎不借龍借龍者滅借案莫借托借托者家蕩如雪借山莫借水借水者財蕩如裂右第九章論穴主山降勢衆山必輔相衛相隨為羽為翼山必欲特特則不群出類拔萃稠衆難倫山不欲獨獨則必孤流落羈旅宗黨無徒山不欲多多則無憑亂臣賊子朋伍縱橫山必欲衆衆中有尊羅列左右扈從元勳山必欲交交則必鬭山必欲鎖鎖則不漏鬪漏之辨相須相擊之侯山不欲垂垂則失利山必欲降降則勢止垂降之辨殺氣得氣之謂所喜者完其四面所忌者勝于一偏不集不應五氣散於八風或逼或沉三光囚于五造惟三方稠密以舒以容一水平澄以防以衛貴賤固係於後龍吉凶盡應於前對蟻蟻繩繩以屬其的低結盤窩蜂蜂旅旅以羅其傍高藏壺蕩進前勢以若鬪退却立以惟恭集左右以為輔峻門户以藏風如展屏如列城而無馳逐離去之意如懸鍾如覆釜而有朝宗顧主之情何取如纛如旗又何必如筍如鎗後卧前聳左回右拱此衆山拘龍之蕩後瘦前亂左反右宜此衆山脫源之窮皆後分枝面前分溪左如梳腦右如眉此衆山脫水而腳不齊皆後如傘欄面前如劈板左去如出軍右去如群奔此衆山逐水而腳分岐雖然欲知砂法之美惡先看本主之盛衰如本主木星過盛宜見火見金本主木星甚衰宜見木見水扶其衰亦當制其過舉其一可以例其餘右第十章論砂山隨水行水界山住水隨山轉山防水去人知山之不可頗不可偏孰知水之不可淫不可蠱無劔佩之腋流無偏鏘之面去無隔胸之建瓴無分臂之墻瓦無蛙背之披淋無雞胸之兩下橫琴卧笏精神有類於環襟新月長虹氣象不同于反弩六相西朝而右不虛六替東行而左不空來如展席之平且分地濁去如鋪簾之鎖又辨天清有織有交無沖無射入首尋龍蕩必分於內外隨形擬穴應當復其污降蓋山尋住腳連延則未絶他情水愛環城反背則不鍾內氣固取瀦而後泄尤愛去而復留乾流欲鎮於長流堂前不脫小畜相逄於大畜腕內宜灣雖有江湖池沼之澄凝不若金魚蔭腮之親切橫平寬整欲江澗之無聲抖直瀏奔忌田濠之短折平不平而橫不橫分途八字傾不傾而宜不宜鎖節丁文搖旌反弩者禍臨崩唇夾脅者災至溍筧長槽不數年財箱如洗偏鎗幹割一二世宗祀伶仃或如帶或如練須應於天文或是之或是玄各司乎宫分駇雜交宫縱清流而蹈濁耀真純入路凝緑鑑以照蒼淵主衰則宜生宜扶主旺則宜尅宜泄扶其弱抑其盛總歸中和龍既真穴既正水自合法抖音收衰他瓴音靈右第十一章論水星峰固宜剝換亦須不失原神如金星更迭之後必復見土見金方為本原主露方論過峽過峽與束氣迹相似而實不同束氣者恐其發泄大盡欲暫安憩焉耳峽則如蟬之蛻如龍之化最為機軸如金龍過峽則思金為土之精水之母生於巳墓於丑養於辰旺於酉寡於箕孤於鬼沖於卯絶於寅祿于申酉而貴于寅午自墓絶而過生旺自孤寡而過祿貴即善地矣而所過之體尤分正變纍絡如珠金之正體也以正體過則凡諸星護衛皆以合正為妙液流如線金之變體也以變體過則凡諸宿遮攔亦以用變為奇峽之未過以生為體峽之既過以尅為用譬如養子者骨格既成欲其脫嬰兒之態任大人之事則必勞其筋骨苦其心志和以切磋而琢磨方成人矣是故火雖尅金而金以火過為融水雖尅火而火以水過為制木雖尅土而土以木過為踈金雖尅木而木以金過為用土雖尅水而水以土過為凝觀峽左右知青與曰觀峽閃昂知乳與突觀峽曲直知窩與鉗觀峽之形即知穴態觀峽之勢即知穴證觀峽之星即知穴色觀峽平沉知穴淺深觀峽長短知穴唇氊峽既過矣則觀其作何星辰以為少祖如金過而金則龍露須障之以水則以子護母母不拋頭露面而體勢以尊金過而水則龍泄須培之以土而后元氣不凋金過而土則龍壅須制之以木而后英華漸露金過而木則龍病須輔之以金而后氣力不虧金過而火則龍傷須制之以水泄之以土而后精靈不損既起祖星須宜剝換剝換一二便須束氣束氣而再束便宜起頂起頂之星尤宜分曉過峽是金而金作頂始見原神之真骨也木土二星子母亦堪互用惟水與火則匪佳城金逄木火財殺同鄉惟疊疊皆金並無剝換則又宜見木火譬之獨創門户非財不安非官不顯也右第十二章論峽位來山為勢結成形勢如根本形如蕊英英華則實固根遠則幹榮勢必欲行行則遠遠而騰蹤形不欲行行則蕩蕩而不鍾勢不欲止止則來無所從形必欲止止則蓄而有容形不欲露露則氣散於飄風勢必欲露露則氣聚于高贊勢不欲汙汙則氣菽而不鍾形必欲汙汙則氣聚而有融蓋形者勢之積勢者形之崇形者勢之結勢者形之從彼有左右之勢以從中而衛穴面前之勢以朝穴而應龍外勢欲圓內勢欲才宗龍之形如花之的騎龍之形如宇之堂的承貼萼之正堂居門仞之防攀龍之形如人卧之肩井如魚奮之腮鬛皆隨其趨向而橫應偏傍承龍之穴如心目之顧帶如日月之精光皆引其來歷而寬接窳藏如世族之居兮門仞之高峻莫窺其堂如大度之設兮實主之交際以盡其溫恭如荒園敗圃兮藩離已壞者來往之蒙衝如巨翁權勳兮必森翼衛而環左右如藏寶積粟兮必厚蓄而峻厫君故曰燔根固蒂者枝必茂於喬木夾輔礞流者形必就於真龍右第十三章論形勢橫脈定穴橫脈龍過處而起起又伏在中央梭肚有泡處扞之要前有朝案後有落托左右有肩帽方真為鬪斧孔脈多腰受宜後頂龍脊書云橫擔橫落無龍須下有龍是也切不可出出則脫氣直脈定穴直脈龍直來不左不右扦穴多宜脫出必須兩手重重拱揖攔截去水方可下之若眠體少緩則閃殺可扦書云直送直奔有氣要安無氣是也切不可正鬪鬪則撞殺斷胍定穴斷脈龍行兩頭大中央小如折藕之絲又如銀錠之中則從細小中認定應樂以腰受氣橫騎扦之無應樂而穴糢糊切不可扜漏脈定穴漏脈者大山之下胎息之旁輕漏一湶入於平也或也起敦阜此真氣傍漏穴宜就頂扦之向宜就局偷脈定穴偷胍是平地中草蛇灰線連帶龜脊起于平中詳其盡處粘脊扦之要前有明堂後有送水方真飛脈定穴飛脈龍行如蛛絲馬迹飛燕遊絲勢多斜旋擇其衆山圍繞中取其端正者而扦之平胍定穴平脈平地之龍如四圍田高繞將來中間低田低田又起一路高田則低者為水高者為脈外高者為龍虎看水合處認掌心扞之墜脈定穴墜脈龍行高大落下一絲如懸絲之蟲如挂網之蛛穴當就泡珠小塋扦之勿大作大則損龍長胍定穴長脈龍鋪平出洋悠悠遠去或出或沒或大或小只從氣盡水交堂聚處認中扦之短胍定穴短脈正龍不住只於行龍上落一二節或聚講處落一脈結穴宜扦中正不可偏倚然亦易發易敗之地正脈定穴正脈龍行中出逶迤軟活星辰端秀只看朝對正中蓋穴扦之玄武嘴長壓殺扦之玄武頭縮屏殺扦之右第十四章論定穴五星證穴金體圖扞其虛而動木體直扦其芽而泡水體曲扦其正而靜火體烈扞其焰之盡土體方扞其飢而薄九星證穴貪狼出穴是乳頭巨門出穴窩中求武曲結穴叉鉗覔祿廉梳齒鑗鐴頭文曲求穴平裏作高處亦是掌中落破軍作穴如戈矛西邊左右手背收輔星正穴燕巢仰若在高山挂燈樣弼星出穴在低平縱有圓頭亦凹象三勢證穴立體山聳氣上浮眠是山伏氣下墜坐是山和氣中藏此乃天地人三勢朝山證穴案對之説取其應也如主客相迎如夫婦相親情意相投而無間形勢相駐而不踆奇峰特發直中取的耦巒聯秀拗裏平分高則齊眉低則應心故曰惟有朝山識幸心明堂證穴結穴處必有小明堂收小界水合入其內看堂正則居中而取偏左穴居左偏右穴居右堂之輔穴如盤盛杯如裀藉足斷無一偏之堂水勢證穴結穴處水到此必灣環澄聚儼若不流書云水不亂灣水聚左穴偏左水聚右穴偏右又曰左水明偏左右水明偏右朝水宜高順水宜低蓋水者龍之血脈山行則水隨水合則山住故穴以水為的樂山證穴龍行有委曲結穴多不對頂必穴星後生一山為樂托不拘他山本山只要立穴處坐後對之為應直來多坐本祖橫坐必是他山樂星不對穴亦不真官鬼證穴橫來須有鬼直落定逢官結穴處後拖者為鬼亦可以為托前拖者為官亦可以為案若有此二山立穴處後要坐鬼前要對官如不坐不對非真穴也龍虎證穴龍逆水穴依龍虎逆水穴依虎左單提倚龍右單提倚虎龍虎高穴高龍虎低穴低龍虎中停穴中穴低龍虎高則忌壓塜穴高龍虎低則忌露胎故察龍虎亦可以得穴情十道證穴十道取乎四應前後相對左右相稱謂坐不宜偏案不宜斜夾耳不宜進前退後故立穴處先看穿㬹十字後枕圓前對尖左右對㬹曰天心十道曰㗸枚分合證穴上面有分其來明下面有合其住真此小明堂內合水即蝦鬚金魚界合也有合無分來不明有分無合住不真是假穴也曜氣證穴龍虎肘外盛氣發而為曜亦可以證穴左有曜則穴居左右有曜則穴居右左右雙曜穴居其中長而清者為貴短而掬者最強龍盡方有初中罕遇方隅證穴衆形既各可證方隅又可總證如穴結于中心穿出處則以兩水交止證之如穴結于平緩水橫處則以龍脈特氣證之如穴結于脈並水兢處則以朝山有意證之主背脈側之結穴處以左右停勻證之龍虎偏護之結穴處以堂氣聚大證之平凸之難向結穴處則以砂寬水抱證之大抵證穴多端總認情勢如果有情則雖獨證不嫌偏倘或無情則雖合證不言備在智者之自悟耳右第十五章論證穴陶公曰上法少備真龍難辨真穴難明有旺氣依巒頭而行者得其星則得其氣其辨之也易有星辰布後而氣則鋪前星巒偏左而氣則鋪右若此等則得其星必失其氣得其氣必遺其星故曰認氣難大抵龍從氣鍾星輔氣住善認者得其氣不遺其星不善認者得其星而脫其氣亦必然理也但于蚌腰鶴膝處考其過則來真於肥圓平聚處認其靨則結明觸類而推萬無一失右第十六章論星氣地理關健極暈為至行行有極星星有暈不極不暈富貴難問土為金極水木火暈極為元氣暈為用神極不送亦不迎閃閃渾如顧復情暈不昴亦不俯依依恰似相面互金龍過峽土星微露端倪而子父財官森森互列過峽起祖土星遠相照映而水金土木簇簇親隨束氣以土藏金父元護衛生龍以金帶土財鬼遮隨官出現財伏藏子端拱是為正暈正暈者爵祿悠長而為牧為相官俯伏財崛起子縱橫是為變暈變暈者威權猛烈而為臺為將行龍不帶極丹桂無根縱有一乙二甲不産狀元之子堂氣不聚極黃金無種縱有文武輔弼難登公相之堂極見暈而端凝龍章鳳誥暈見極而低縮紫閣丹扉登穴場而極居落托或為屏嶂之尊挹明堂而暈列官禽必作排衙之狀極在砂中鋒鋩不露而暈皆隱隱流行極藏水曲源派有蹤而暈即洋洋布置龍穴之極暈不全懼貽災於卿黨砂水之極暈不備恐播惡於蒼生極有欠缺不為孝子忠臣暈有踈違難説經邦濟世極有極之方方宜出現極奪於財者貪極奪於子者弱極奪於官者爭不若以我壓之尤為耀祖暈有暈之位位有異宜官暈之位宜踈財暈之位宜伏子暈之位宜端一有不得其宜即為禍端明堂內四暈俱全少年及第水口中四暈乃備晚嵗登科大富者財暈常端而得位蓋富非驟至如珠聚如帛纍而後千倉萬箱大貴者官暈必踈而居方蓋貴不倏來必琢磨必勤苦而后姓揚名顯故曰我尅為財尅我為官時師不識吾徒愼焉右第十七章論極暈地有百形理原一致尋宗問祖見影知形峽位與公位相當后鬼與前官相應來氣與餘氣相因分襟與合襟相稱后有落托前有唇氊來有撓掉住有頭面龍須媚虎虎必馴龍最忌者龍巉似虎最愛者虎軟如龍虎軟如龍者無刑併而盈財帛龍巉似虎者損丁壯而耗財箱朱玄子父青白財官傍無凹借富貴雙全鬼不愛鬼官却宜官落不宜落曜須見曜以鬼為鬼名為盜氣家道伶仃子孫不庶以官作官不懼尖巒生人軒豁甲第魁元鬼不愛鬼亦不愛子父兄財星方為得所官宜于官亦宜財父木火二星最為天助落而落者其勢卑弱雖有若無人家消索曜而曜者其形俊俏若是貴龍為官清要為禍之鬼十有五六凡有官曜盡皆為福大富大貴裹趕分明只愛財官有氣有情貴龍無官趕者不貴無財裹者亦不貴富龍無財趕者不富無官裹者亦不富蓋富貴相連財官相衛財不見官其財不熾官不見財其官不庇時師開口門開户閉門開無屏長房凌替户閉不伏幼子乖戾堂喚明堂不宜遮閉平正有情更為吉利周匝開鎖寬狹無計寬曠氣泄狹端情聚水口葫蘆時師笑跳不察星巒空誇華表若遇子孫陶朱寂寥筆印端嚴去水主貴倉庫逆生水去財聚砂無鶴瓜文名士少鶴瓜不掬反成齷齪砂無牛角終成寥落牛角不開反出姦回砂無蟬翼穴情不的蟬翼壅腫生人懵懂頂愛中穿穿愛之玄不之不玄反成死繕枝遭幹尅何誇正落受尅到穴終有一絶縱有水城定多沖割時師不識貪愛鎖織尅龍鎖水反成牢獄若無赦文女童縲絏此係祕傳善悟自得右第十八章論四神星宿門內有君子自致佳賓門外少佳賓諒非賢主况門庭有寇為禍百端鎖鑰不嚴飛災四至捷報之案與流徒何殊哭兒之山與神童不異舞袖之狀似離鄉牢獄之形如倉庫朔南百步無聳案六十年一掃如空西東舉首見高峰千百年愁煩不了故曰午子堂開老無聊賴酉卯户閉少不軒昂登科及第定有三合火星積玉堆金須是八方水局馬上貴人未必非探頭之賊幕中伴讀或又是宣詔之山文筆搖而老作書生玉琴瘦而四方遊蕩祖宗前聳迎之吉而背之凶旦生陋劣尸虎回來文為禍而武為福更看勳庸龍穴俱全水火土星皆美利元辰見出子財官位定為災龍抱虎虎抱龍皆從水判右射左左射右盡自堂分山特來而俯伏貴壓千官水遠至而凝澄財增萬頃衆山混沌獨一位之對穴者端然萬派支流惟半鑑之當堂者沉注斷定家門富貴却難親戚榮華水窮山盡須宜陪表之贊召亂墳多惟愛跪眠之狀右第十九章論左右朝對直龍看化生之腦橫龍尋落托之形既有腦氣落托自有上分下合分合之間天造地設孫不肖祖者曰素素者不産文章客子不養毋者曰漏漏者難培富貴根兄弟不論弱與強只要無衝無尅主賓不論遠與近只要相合相生僕從不論多與寡要無反主之星門户不論闊與狹要有捍門之宿山不論前後左右要合星辰而頭不見飛腳不見竄水不論來去澄流要合方位而來不見沖去不見割束氣要圓淨兩傍不要泄泄者行龍無力過峽要融暖兩傍不要散散者到穴無情寧可借停驂之主以為客不可認憩駕之客以為主寧可挽元神之水以為富不可招黃泉之水以為貴祖宗雖好隔五世六世則無功僕從雖多去五代六代則即散龍竄虎飛只要水城環抱堂寬案遠只宜龍勢高強地可催官須用情於祿貴穴能造福必迎氣於龍神官殺同鄉差毫釐而或殃或慶毬簷咫尺悮一掐而為福為災星峰秩秩縱一節兩節之小庇猶為吉地鬼劫重重雖一山一水之可取不為佳城水愛曲不愛直直去者固凶直來者亦防衝射朝愛來不愛去去長者不吉去短者亦是支離水秀山明可靠可吞者有力山嘯水哭不聞不見者無妨龍不開屏列帳何誇粉黛煙花穴無后鬼前官空有樓臺鼓角文章蓋世不科第只因筆印糢糊子孫富貴不繁多緣是唇氊淺薄水去處石曜一卷千鈞之力箭來時巽水一勺萬鎰之情正龍之福遲而久故將門出將相門出相傍龍之福驟而短故一發如雷一敗如灰右第二十章論體槩龍穴易識真假難知真者多拙假者多奇真者如真女垂簾肅駕無傍窺雜覘之人假者如淫女暴面露頭多橫覷交馳之勢真者如法駕雖樓臺鼓角而拱手埋頭假者如浪子雖煙花粉黛而東馳西逐巒頭大而歪竄是假山也砂腳多而反抱是假砂也穴場孤曠而耳無貫贊腦無屏枕陽無唇褥陰無鬚翼是假穴也水城屈曲而方位不合衝射暗來近視悠揚遠觀遮朴是假水也真龍中穿假龍亦中穿真龍遮護假龍亦遮護中出無根多是幹龍之逐客遮護無裹半為帶劫之零星大假者久而大殃小假者久而小昌勾勾搭搭十無一二真蹤閃閃藏藏萬有百千假態俗眼指稱灰線傍有子父則真時師愛道迹絲側見官財則假右第二十一章論花假地無約束龍神碌碌約束端然富貴雙全約束之山氣象尊嚴后不為鬼前不為官左不為龍右不為虎帝都王都之約束在一百二百里之外宦家世族之約束在一十二十里之間父為約束根基厚而世代簪纓子為約束驟興旺而威名遠播財為約束盈倉箱而納粟奏名官為約東登科甲而出將入相兄為約束勢頡頏而聯芳齊美金星約束定是獻天如釜如鍾而火星滅迹木星約束定是沖天不戟不矛而金星低避水星約束定是漲天不擺不搖而土星低回火星約束定是焰天不飛不竄而水星潛伏土星約束定是齊天不尖不瘦而水星低遁約束遇官雖詩禮而難逃訟獄約束見父敦孝友而遷徙防危約束見子多英俊而老成凋謝約速見財尚豐殖而妻宫寡厄約東見兄分門户而爭雄競勢惟一山端然傍無並峙衆星低避者則家道尊嚴而干祥萬福矣龍從左來則約束在右如竦於左龍從右來則約束在左如竦於右龍從後來則約束在前如衛於後龍到處宜有約束在龍虎數層之外者為奇龍去處宜有約束在水口門户之內者為妙約束出於生旺之鄉長春百嵗約束出於墓絶之所七十來稀居水口之內郊為陪表現玄武之臂便是干城專宰大勢大形不照一山一水時師不究法眼先尋右第二十二章論約束斷福如符要知交度祕云風水無文度富不陶朱貴不三公壽不彭祖夫婦不齊眉孤寡號門户故龍不文度其名曰妬龍之妬者無百年之福穴不交度其名曰痼穴之痼者無十年之祚砂不文度名曰齷齪齷齪之砂子孫不祿水不交度名曰支離支離之水門户流移自過峽而起少祖是為龍度如金龍不見水來護則為子妬安望兒孫有三五水龍不見金來顧則為父妬定無白髮盈門户金龍不見木來扶則為財妬營營食用常難措木龍不見金來助則為官妬文章不上青雲路金龍不見金來護則為兄妬煢煢獨自撑門户起鬼落而至唇氈是為穴度坐金不見木則為財痼何誇四處有倉庫坐金不見金則為兄痼莫羡龍神多夾輔坐金不見火則為官痼何論色色文星助坐金不見土則為父痼定主堂前少姑舅坐金不見水則為子痼時有孤兒與寡婦自隨龍及門户是為水度金穴水城水是為子支離定知祖業難豐足金穴木城水是為財支離終日運籌持斗斛木穴金城水是為官支離白頭尤把文章讀金穴金城水是為兄支離打虎鬩暗常僕僕自左青以至右白是為水度金龍水疊疊則為子齷齪生者頻頻育者遲水龍金揚揚則為父齷齪異父異母不相宜金龍木汨汨則為財齷齪散得多多聚得稀木龍金條條則為官齷齪聲名位分常卑微金龍金焰焰則為兄齷齪手足文齊福不齊蓋龍穴之度以表而見者為力砂水之度以表而見者為忌此訣在心悟非可以言傳也右第二十三章論交度地理之宗統於五行五行之柄權於生尅生固可愛亦有不愛之生尅固可僧亦有不僧之尅生之目有五一曰飛伏二曰感應三曰順逆四曰雌雄五曰眠坐立生是也獻天金生水為飛生少陰金生水為伏生飛生忌其促伏生忌其強促強之生家多忤逆金穴水案為感生金穴土案為應生感生宜於近應生宜於特不近不特富貴不獲金巒剝水為順生金巒剝土為逆生順生愛其秀逆生愛其簇不秀不簇英才不育左金右水為雄生右金左水為雌生雄生宜於俯雌生宜於仰不俯者骨肉相殘不仰者家道乖張正體生者曰坐側腦生者曰眠平面生者曰立坐而生者宜正眠而生者宜附平面生者宜平不正不附不平者初亡老哭五行之相尅其目亦有五一曰強弱二曰有無三曰愛伯四曰明暗五曰人已是也獻天之金居庚申辛酉之方而尅木星是強尅也少陰之金出丙丁巳午之方而尅木星是弱尅也強尅強弱尅弱者殺強尅弱弱尅強者降火星直射金穴而鬼托禽曜皆水星證映而無土星制水則有尅如無矣正體金龍並無火星侵擾木星簇簇孤金莫能鉗制則雖無尅而有矣有尅如無者爵位高強無尅而有者數被中傷如金星入手廉真高妬者為明尅磊磊火星夾遞金龍到穴者為暗尅明尅者顯禍暗尅者陰傷隱隱金龍帶有火星壓主者曰已尅外山特聳火星並敵者曰人尅人尅者爭競鄉邦已尅者骨肉參商凶星惡曜如妬主廉真則喜見水星此為愛尅吉星得地如金居兊位則懼見火星此為伯尅愛尅而尅為福不小怕尅而尅為禍不了右第二十四章論五行生尅龍不合穴則龍不真穴不合水則穴不正如木龍起在亥穴在卯水流未則萬福矣蓋水來處宜生宜旺水去處宜墓宜絶故曰門户不許子孫居是也水無三合其福不昌火無三合其貴不彰龍無三合其氣不增穴無三合其情不集砂無三合其勢不端富貴之地以此為的術數家有假三合之説以談禍福者則謬矣龍之起得其方是為天合穴之結乘其生是為人合水乘其旺是為地合此龍之三合也如鬼坐於玄是為后合官竦於明是為前合曜展於側是為傍合此穴之三合也一不劫龍是為來合二不悖穴是為止合三不順水是為去合此砂之三合也來從生養是為源合注於官旺是為注合去從墓絶是為流合此水之三合也龍虎兩溶是為耳合八字均注是為肘合蝦鬚並𣲖是為液合亦水之三合也如正案在午而起秀峰是為天地合寅上有峰相應是為日月合戌上有峰相照是為風雲合此火之三合也一合者不竄不絶再合者不貧不賤全合者大富大貴然亦可遇不可求也大凡地有全合則峽有角顧峽有角顧則龍有祖宗龍有祖宗則穴無孤露或如泊岸之舟橈棹俱住或如登殿之主文武齊護若夫三敗三忌之説則即與此相反耳可類推也火助文章之客故單舉火以見其餘也右第二十五章論三合别人看形我看星别人看格我看情星贊本是龍之表情脈却是龍之精金星宜何鬼落托土木二物情交錯青白朝迎無水火不融不化成頑朴金木水土穴之星窩鉗乳突穴之形凸凹高沉穴之地細將證佐論分明前看明堂與朝案後看落托與鬼撑傍看龍虎與畍水過此却論砂水清我見屏風筆架砂貼身白虎形如畫只因峽位右邊單幼房到底無聲價我見玉帶眠弓水灣回繞抱青龍嘴只峽左邊無吉星長房遇此無祥瑞我見席帽橫琴案端嚴竦樹真看羡子孫何故不科名保因鬼落星辰亂我見明堂萬馬容排衙唱諾人傳頌誰知唇褥不悠揚富無藏積官無俸我見水口似葫蘆之玄屈曲相回願如何家道不興隆只因龍穴無倉庫我見案上文筆插又有宜詔與天馬若還龍穴無設施何勞十載寒窗下我見錦被蓋牙床團山疊疊兒孫樣只因龍穴落幽寒伶仃子媳難興旺砂水如何為禍災只因龍穴元神敗渾如弱主與庸君姦臣悍將威權大砂水如何福力強只因龍穴元神旺渾如聖主坐朝堂四方皆是干城將我聞龍與穴相迎我聞水與砂相稱吉水常能消惡砂好砂亦能調水病陰砂右方插過左左方水去難為禍只恐砂去水亦去家筵頃刻多崩破右第二十六章論應驗自此章至三十章皆廣豐熊氏之論龍穴須知有用神用神沖動事非輕叮嚀可知不可説只恐時師認未真金龍金穴用何神生在巳兮墓在丑或用二方作向山或用二方為入手不忌黃泉與刑墓穴要穴與龍相就亡命愛是水火宫葬期須在丑時㬋巳丑宫中有酉藏須用卯沖魂始受子孫如有亥未人合起沖星真不謬金馬原居亥酉藏金祿輪來申酉沖動祿時官即至沖動馬處病難防馬在病宫宜生合祿居官位要軒昂富貴根源愛在胎維持却喜長生地設施必須居旺方應驗便宜墓絶位勸君沖生莫沖胎沖胎却恐根原壞惟從生處一沖之維持圓活天機快勸君沖墓莫沖旺沖旺却愁設施妄惟從墓處一沖之自然應驗無遮障金貴却在寅午中貴人可合不可沖合起貴人沖動祿何愁富貴不相從請問貴人如何合金貴寅午用戌合寅午二方有吉曜戌命生人為甚妙亡命若更是卯酉富貴重重相輻輳水火以墓絶為貴金以為貴水以土之衰旺為貴土以未之墓絶為貴也右第二十七章論用神沖合貴穴十九是變體時師俗眼何曾識第一穿變火灼金金液而流惟一線到頭遇土便安墳乳如懸膽真金現第二穿變木趕土土星磊磊變金子窩傍帶火便尋蹤必有當頭屏與几第三穿變金琢木木變鳳形雞涿粟水星一見便堪扦突微如苞為真木第四穿變土壅水水勢奔騰如蛇蛻金峰隱隱面前迎一穴安然如孔墜第五穿變水滅火火星撲滅如菱角尋見條條木節開水星映穴場辰尅而變者喜見父見父安墳貴富生而變者喜見財見財富貴自天來精微妙訣説不盡尅生生尅兩安排生變喜見財官尅愛喜見父子故曰兩安右第二十八章論變體作穴莫道尋龍難難於平地望高山莫道尋龍易易在高山望平地一看龍是如何起真龍起處便有鬼二看龍是如何博真龍博處便有托三看龍是如何伏真龍伏處便有簇四看龍是如何行真龍行處便有情五看情勢向何方所向之方多閃藏閃藏何處討分明後有送者前有迎送迎却在兩邊看護龍莫作真龍斷真龍一閃一出頭此間却要認根苗細認金木水火土認定星辰作少祖少祖遠祖若相生便知此處勢層層得時子父財宫逐便知種有千年福行時龍生與氣東便知藏有真堂局看了少祖却看趕財官趕處真為罕父母趕要來得緩子孫趕要到得滿若然不緩與不滿興隆有數難綿遠若求大富與大貴楊公只愛財官趕若還只是我趕我縱有驟福亦無禍看了龍時看鬼落鬼落看也星辰博鬼落生龍與生穴暗中為福真堪賀若是龍穴生鬼落反生盜氣反為禍我尅尅我皆不宜不若比和相負荷平洋鬼落要可枕高山鬼落要可靠不論左右與中間看他情向何邊抱看了鬼落却看穴高沉凸凹宜分别穴看氣從何處入葬乘生氣須當記氣從耳入為第一第二頂入第三腰化生腦下認毬簷穴情要似生芽豆上有一靨中有迹下有唇氈莫消瘦蝦鬚蟬翼兩邊挨雞心魚泡高相照土木行龍乳突多金水行龍鈴與窩看了穴時却看裹裹處要與龍神合若還裹我兩邊財子孫腰下黃金帶若還裹我兩邊官堆金積玉福千般父母裹時子孫罕子孫裹時父母殘不如只是我裹我安居樂業無艱難看了裏時却看朝我生生我皆相投更有財官來並列門庭富貴無休歇看了朝案看門户門户不許子孫居第一父母第二財第三亦愛官星來吉人形象由人取只宜頭向內安排朱玄青白都看了砂水明堂自然好水來水去捴不拘只從方位討分曉來愛長兮不愛急去如眷戀情不走若求大富與大貴巽水源源流到口地在高山易為術地在平地多鶻突高山跌下平洋來時時要見毛與骨却問如何認是毛不生禾稼生草茅却問如何認是骨土石一坯常竦出有毛有骨便有護護處便有星神助無風水處有風水有風水處無風水無風水處有風水十有八九容窀穸有風水處無風水尋盡世間萬無一此是尋龍一掌金眼明心巧方能述右第二十九章論尋龍總要人家富貴豈容易必有陽基與陰地陽似舟兮陰似棹論陽先要定方位胎養周正富貴根生浴開張富貴至冠帶平坦富貴清官旺軒昂富貴義衰病遮攔富貴安死處疏納富貴易墓處藏聚富貴久吉神須用應方位中間又要看聯絡聯絡之文多禁忌胎養長生須間隔若無間隔不清白沐浴冠帶嫌凹突有凹有突生鶻鶟臨官帝旺宜抄插不抄不插無科甲衰旺中間莫高下一高一下常驚訝死病二方宜擁護不擁不護生嫉妬陰地陽地一般論墳屋星辰宜既濟陰地生陽與尅陽子孫富貴多軒昂陰地生陰與尅陰子孫富貴多沉吟若見陰陽同一氣子孫富貴無興替陽地富貴要根源又要維持與設施到處又要有應驗五吉俱全天地賜中間方位又相殊生養墓旺四處是縱有根源無設施聲名不到鳳凰池虎砂兜插即官罷不許腰纏萬貫歸有了設施無根源何須苦向仕途鑽龍頭拱出席帽樣奏名納粟可求官有了根源有設施登科奪得錦衣歸如何不繫黃金帶須知墓下無維持維持設施俱各有根源得位科多首如何位不到三公應驗須知無輻輳亥上有吉蔭子人離宫有吉午人受登山從此細推詳胸中星斗神仙授右第三十章論宅墓總要完孝録一卷終
