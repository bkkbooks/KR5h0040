body:
  text: 天符正經引五運圖六氣圖司天在泉之圖氣不化齊圖主氣圖客氣圖生扶尅洩圖五運六氣司天在泉主氣客氣天符嵗會天符同天符同嵗會天符太乙天符長生天符天符六十字超神接氣天符或問天符衍義東方龍南方寵四隅龍西方龍北方龍正氣天符襍氣天符化象局類象局六格局目録終儒門崇理折哀堪輿完孝録卷之五天符正經引此書始於容成見於素書赤松子發之於青囊經黄石公註之於青囊傳至宋陳摶氏又支分節觧各極其趣闡五連六氣之機發生扶尅洩之秘其理甚備其法甚精蓋由古人與造化爲徒故其作用之妙有如是也但要氣運方隆而值山水之眞正者用之百發百中因叙正如左五運之圖此即河圖定位數也其運行於天每一年而一變者其土居中以定四方故曰君政餘皆各司一方以行君令故曰臣政詩曰甲己化土乙庚金丙辛化水起甘霖火出南方尋戊癸丁壬化木盡成林六氣之圖此後天流行數也其氣降於地每六十曰而一變大寒已後厥陰生氣春分已後少陰舒氣小滿已後少陽長氣大暑已後太陰中氣秋分已後陽明收氣小雪已後太陽藏氣一節三候一候五曰又分七十一二氣詩曰六氣分明各六旬大寒風水起縁因君相依然先濕土寒水從來讓燥金司天在泉之圖此是陰陽互運每一年而一變者也子午與卯酉反對丑未與辰戌反對寅申與巳亥反對司天在泉更相爲用正陰陽互藏其宅而五氣順布者也凡補洩之機皆當即此推之詩曰子午君火燥金泉丑未濕土寒水聯寅申相火風木位其餘反對盡皆然氣之不化齊圖此是氣化不齊每一年而一變者也有太過有不及有平氣如天符歲會同天符同歲會長生天符大乙天符此皆平氣之年其餘皆太過不及而所以制化以取其平者尤存乎其人詩曰太乙天符最吉祥長生位上福無疆歲會天符皆吉曜同符同會共推詳主氣之圖此是五行一定之位亘萬古而不易者也遇平氣則吉遇太過不及皆凶凡損其太過益其不及而制化以取其平者又存乎其人若洪範五行之類皆顚倒正理禍福無驗荀能察此而有得焉則其應如響矣詩曰南火炎炎北水居曲直東方太白西巽木乾金坤艮土黄婆四墓不湏題客氣之圖此是五氣流行隨年月而變者也得平氣爲主者固不可使客氣生亦不可使客氣洩惟主氣太過者宜客氣以泄之主氣不及者宣客氣以生之初之氣即主氣也客氣固有爲福者亦有爲禍者未可執一諭詩曰水怕土兮木怕金金星畏火火愁霖更有黄婆嫌曲直制化湏當細用心生扶尅洩之圖造化之妙中和盡之矣生扶是𥙷其不及尅洩是制其太過即如狂者進趨聖人抑之狷者有所不爲聖人進之世人只知用生扶而不知用尅洩豈知太過不及悉能爲災因立此圖以便檢閱詩曰五氣原來用不同中和端的奪神工太過必湏尋尅洩太弱生扶始有功五運甲巳化土乙庚化金丙辛化水丁壬化木戊癸化火土居中以令四方故曰君政餘皆各專一方以奉令故曰臣政希夷陳氏曰五運者乃十干行天之運每一年而一變者也陽年五運化氣太過陰年五運化氣不及無過不及者正氣也必能爲福過與不及者邪氣也悉能爲灾故六甲之年嵗土大過陰氣盛行其邪干水六乙之年嵗金不及炎氣盛行其邪干金六丙之年嵗水太過寒氣盛行其邪干火六丁之年嵗木不及燥氣盛行其邪干木六戊之年嵗火太過炎暑盛行其邪干金六巳之年嵗土不及風氣盛行其邪干土六庚之年嵗金太過燥氣盛行其邪干木六辛年嵗水不及濕氣盛行其邪干水六壬年歲木太過風氣盛行其邪干土六癸年嵗火不及寒氣盛行其邪干火惟甲辰申戌己丑己未土之正氣也壬寅壬申丁卯丁巳丁亥木之正氣也戊子戊午戊寅戊申癸卯癸巳癸酉癸亥坎之正氣也庚子庚午庚申乙卯乙酉金之正氣也丙子丙辰丙申丙戌辛丑辛卯辛未辛亥水之正氣也愚按寅屬虎辰屬龍物之變化不測莫龍虎若也故化氣取龍虎月爲主是故甲己之年正月建丙寅丙火必能生土數至辰月又見戊故曰甲己化土乙庚之年正月建戊寅戊土必能生金數至辰月又見庚故曰乙庚化金丙辛之年正月建庚寅庚金必能生水數至辰月又見壬故曰丙辛化水丁壬之年正月建壬寅壬水必能生木數至辰月又見甲故曰丁壬化木戊癸之年正月建甲寅甲木必能生火數至辰月又見丙故曰戊癸化火土爲君政獨在五連之先土生金金生水水生木木生火順生一週而火復生土此皆臣政也故以次而後六氣大寒初至驚蟄末厥陰風木司令生氣也春分初至夏至末少陰君火司令舒氣也小滿初至小暑末少陽相火司令長氣也大暑初至白露末太陰濕土司令中氣也秋分初至立冬末陽明燥金司令收氣也小雪初至小寒末太陽寒水司令藏氣也希夷陳氏曰六氣者乃十二支行地之氣每六十日而一變者也每一氣有四節每一節有三候每一候有五日大寒立春兩水驚蟄皆風木氣臨之時此四十五日其氣正到東方春分清明穀兩立夏皆君火氣臨之時小滿芒種夏至小暑皆相火氣臨之時此九十日其氣正到南方大暑立秋䖏暑白露皆濕土氣臨之時此四十五日其氣正到四隅之方秋分寒露霜降立冬皆燥金氣臨之時此四十五日其氣正到西方小雪大雪冬至小寒皆寒水氣臨之時此四十五日其氣到北方金水土木皆以形化者也故金分則輕水分則淺土分則弱木分則小火以氣化者也則愈分愈盛故金木水土各一而火獨有二也愚按欲知六氣之運行者又當知乎超接之法否則氣未到而或失之扵先氣已過而或失之於後者有之然六氣又不過隨時以定其衰旺而已其實還以運氣合一者方爲至吉司天在泉子午之年君火司天燥金在泉丑未之年濕土司天寒水在泉寅甲之年相火司天風木在泉卯酉之年燥金司天君火在泉辰戌之年寒水司天濕土在泉巳亥之年風木司天相火在泉希夷陳氏曰按京房以太陽化寒水陽明化燥金少陽化相火太陰化濕土厥陰化風木故子午之嵗少陰司天陽明在泉丑未之嵗太陰司天太陽在泉寅申之嵗少陽司天厥陰在泉卯酉之嵗陽明司天少陰在泉辰戌之嵗太陽司天太陰在泉巳亥之嵗厥陰司天少陽在泉愚按子午君火司天火能生土故丑未繼之以濕土君火穉弱難以獨任故寅申繼之以相火土旺生金故卯酉繼之以燥金金旺生水故辰戌繼之以寒水水旺生木故巳亥繼之以風木此是司天者順生一週而木又生火子午燥金在泉金旺生水故丑未繼之以寒水水旺生木故寅申繼之以風木水旺生火故卯酉繼之以君火火能生土故辰戌繼之以濕土君火穉弱又繼之以相火此是在泉者順生一週而土又生金石此者其殆五行生生不窮之道歟又子午與卯酉反對丑未與辰戌反對寅申與巳亥反對豈非五行互藏其宅之道歟主氣客氣初之氣水遇土金水火皆客初之氣火遇土金水木皆客初之氣二遇金水木火皆客初之氣金遇水木火土皆客初之氣水遇木火土金皆客希夷陳氏曰凢東方行來之龍皆風木之氣主之南方行來之龍皆君火相火之氣主之凢係四隅行來之龍皆濕土之氣主之凢西方行來之龍皆燥金之氣主之北方行來之龍皆寒水之氣主之自主氣之外皆客氣也愚按東方木南方火西方金北方水四隅之土此皆主氣亘萬古而不易者也客氣則逐年逐月而變屢遷而不拘者也如每年司天在泉之不同春夏秋冬之迭運是也客氣之可以作福者皆吉爲禍者皆凶如主旺則尅我者吉生我者凶主弱則生我者吉尅我者凶蓋主氣靜客氣動易曰吉凶悔吝生乎動者也天符戊寅戊申戊子戊午丙辰丙戌丁巳丁亥己丑己未乙卯乙酉此是化氣與司天者合故曰天符嵗會天符甲辰甲戌己丑己未乙酉庚申丙子辛亥壬寅丁卯戊午癸巳此是化氣與年辰相合故曰嵗會天符同天符甲辰甲戌庚子庚午壬寅壬申此是陽年化氣與在泉者合故曰同天符同嵗會天符辛丑辛未癸巳癸亥癸卯癸酉此是陰年化氣與在泉者合故曰同嵗會天符太乙天符己未己丑乙酉戊午此是天符又是嵗會故曰太乙天符長生天符戊寅癸酉丙申辛卯此是化氣臨長生之位故曰長生天符甲寅雖臨長生之位而土氣受尅不用己酉雖臨長生之位而梟神同生不用戊寅雖遇梟神又合天符可用天符六十字丁卯庚午辛未壬申癸酉甲戌丙子戊寅乙酉丙戌丁亥戊子己丑辛卯癸巳丙申庚子辛丑壬寅癸卯甲辰戊申辛亥乙卯丙辰丁巳戊午己未庚申癸亥愚按天符六十字皆以五運配六氣而得之則如大衍之數五十皆以河圖中宫天五乘地十而得之今即此六十字而各衍之以成本氣之局者亦小成之卦也即此六十字而盡衍之以成雜氣之局者即大成之卦也又引而伸之觸類而長之則變化不窮矣不猶大衍之卦有四千九百六十卦之盛歟超神接氣一節分三㬋一㬋五日如甲子甲午己卯己酉即初㬋符頭也甲寅甲申己巳己亥即中㬋符頭也甲辰甲戌己丑己未即下㬋符頭也或交節在後初㬋符頭在前即超其神而用符或交節在前初㬋符頭在後必接其氣而不用節此超神接氣之法也愚按氣在節前爲神神在節後爲氣神氣本一事而異名也如立春三日前遇初㬋符頭即作立春節氣用事此之謂超神若立春後三日遇初㬋符頭又必待符頭到日方作立春節氣用事此之謂接氣或前後一二日或前後四五六日皆倣此若本日初㬋符頭到者即用本日爲始時上超接亦然五時爲一㬋三㬋該一十五時天符或問或問天符之法皆以平氣爲主凡太過不及悉能爲灾此眞選擇家之正宗雖萬世而不易者也但觀其作用之法亦不能無疑如陰年不及埋宜補之故六乙之年皆不及之金也惟乙卯乙酉有司天之金以補之乙酉又有嵗會以補之六丁之年皆不及之木也惟丁亥丁巳有司天之木以補之丁卯有嵗會以補之六己之年皆不及之土也惟己丑己未有司天之土以補之又有嵗會以補之六辛之年皆不及之水也惟辛丑辛未有在泉之水以補之辛亥有嵗會以補之六癸之年皆不及之火也惟癸卯癸巳癸酉癸亥俱有在泉之火以補之至若六甲之年皆太過之土也而甲辰甲戌何以又有嵗會之土以補之六丙之年皆太過之水也而丙辰丙戌何以有司天之水以補之丙申何以有長生之水以補之六戊之年皆太過之火也而戊子戊寅戊午戊申何以有司天之火以補之戊午又有太乙之火以補之六庚之年皆太過之金也而庚子庚午何以有同天符之金以補之六壬之年皆太過之木也而壬寅壬申何以有在泉之木以補之壬寅又有嵗會以補之凢此皆不能無疑者答曰過不至於盛極則不能反之以就於中如寒必極也而後煖生焉暑必極也而後涼生焉易曰日中則昃月盈則食邵子亦以花之盛開爲衰以含芳吐蕋之時爲極盛皆此意也惟五陰之年有如才力不及之人必輔之翼之而後可以有成耳試思之必有所以自得者右經一章此章皆古語希夷陳先生之所註述者也天符衍義符者合也經者常也蓋言其與天之氣運相合乃至正之常道也故曰天符正經子嘗仰稽黄帝命大橈占斗柄以作甲子命容成綜六術以定氣運此天符之始也故鬼臾蓲得之則有神曆之作岐伯得之則有内經之傳堯之欽若昊天敬授人時舜之在璣衡齊七政禹湯文武之治曆明時皆此道也惜乎秦火之後而其法不存惟希夷陳先生之繼作也獨以心得之妙上契帝王不傳之緒五運六氣有定議司天在泉有定論凢主客勝負之機無不洞明其秘但先王雖發其㫖而又爲後世術人所亂所以數百年至今卒不見有能知其梗槩者但知本氣所臨之時即謂其足以安墳定宅而年月日時之合與不合弗惜也此禍福之所以無憑歟愚乃沉潜反復始悟其說其中有天符有嵗會天符有同天符有同嵗會天符又有太乙天符又有長生天符言雖約而該愽意雖簡而甚詳但術者既不能知君子又不暇及此卒使古人之心學不明于天下後世也久矣愚因盡衍其義以爲世告焉此法固不避凶神亦不必吉曜惟年月日時俱要與天符相合旺則宜尅宜洩衰則宜生宜扶定湏合中和之局者然後用之大則可以建邦立國小則可以安墳定宅雖不合七政星盤亦可獲吉選擇之法此其至正至要者因衍成定局于後若再合星盤吉局者作福尤大此篇專論龍與坐向不相干東方龍正氣天符此係風未所臨之方與造葬塋宜壬寅壬申丁卯丁巳丁亥年月日時皆同雜氣天符年日皆宜壬寅壬申丁卯丁巳丁亥丙辰丙戌丙子丙申辛丑辛卯辛未辛亥又甲辰甲戌己丑己未月時皆宜壬寅甲辰辛亥辛卯辛丑丙申丁卯辛未壬申甲戌丙子又辛丑己丑時已上皆風木之得其平者外壬子壬辰壬午壬戌丙寅丙午甲子甲寅甲午甲申皆化氣太過丁丑丁未丁酉辛巳辛酉辛卯己卯己巳己酉己亥皆化氣不及南方寵此係君相二火所臨之方與造葬塋正氣天符宜戊子戊午戊寅戊申癸卯癸酉癸巳癸亥年月日時皆仝雜氣天符年日皆宜戊子戊午戊寅戊申癸卯癸酉癸巳癸亥壬寅壬申丁卯丁巳丁亥又庚子庚午庚申己卯乙酉月時皆宜乙卯丁巳戊午庚甲癸亥壬寅癸卯戊申戊寅乙酉丁亥戊子又庚子時已上君火相火之得其平者外戊辰戊戌壬子壬辰壬午庚寅庚辰庚戌皆化氣太過癸丑癸未丁未丁酉丁丑乙巳乙未乙亥皆化氣不及四隅龍此係濕土所臨之方造葬仝正氣天符宜甲辰甲戌己丑己未年月日時皆仝雜氣天符年日皆宜甲辰甲戌己丑己未戊寅戊午戊子戊申癸卯癸酉癸巳癸亥又丙子丙申丙辰丙戌辛丑辛未辛卯辛亥月時皆宜辛未癸酉甲戌丙子丙辰戊午己未癸亥辛卯癸巳丙申辛丑又戊子時已上皆濕土之得其平者外甲子甲寅甲午甲申戊辰戊戌丙寅丙午皆化氣太過己卯己巳己酉己亥癸未癸丑辛巳辛酉皆化氣不及西方龍此係燥金所臨之方造葬仝正氣天符宜庚子庚午庚申乙卯乙酉年月日時皆仝雜氣天符年日皆宜庚申庚午庚子乙卯乙酉甲辰甲戌巳丑己未又壬寅壬申丁卯丁亥丁巳月時皆宜乙酉丁亥巳丑丁卯庚午壬申甲戌壬寅甲辰又庚子時外庚辰庚戌庚寅甲子甲寅甲午甲申壬辰壬午壬戌壬子皆化氣太過乙丑乙巳乙未乙亥乙卯己巳己亥丁丑丁未丁酉皆化氣不及北方龍此係寒水所臨之方造葬仝正氣天符宜丙子丙辰丙申丙戌辛丑辛卯辛未辛亥年月日時皆仝雜氣天符年日皆宜丙子丙辰丙申丙戌辛卯辛未辛亥辛丑庚子庚午庚申乙卯乙酉又戊子戊寅戊午戊申癸卯癸巳癸酉癸亥月時皆宜辛卯癸巳丙申庚子辛丑戊寅乙酉丙戌戊子乙卯丙辰戊午庚申癸亥又宜戊子丙子時已上皆寒水之得其平者外丙寅丙午戊辰戊戌庚寅庚辰庚戌皆化氣太過辛巳辛酉癸丑癸未乙巳乙未乙亥乙丑皆化氣不及已上四柱皆用本氣並無間雜者名正氣天符四柱或用本氣或用生氣或用財氣三者間雜而用者名雜氣天符名雖不同作福一也若選擇得年月日時皆合者至吉雖不合七政星盤亦能作福止忌三殺乘旺不可坐太歲乘旺不可向而已其他凶神惡殺俱不忌若又查得七政星盤皆合局者尤萬選得一之期也至吉至吉其圈外又有太過者則宜損其過以就扵中有不及者則宜引其不及以至扵中由是則制化得中與平氣無異某然查得七政星盤合格者固成全局然不可以七政拘也又有龍氣旺者柱中雖用克洩無妨龍氣衰弱者必用生扶方吉此上二段皆變化在人惟正氣天符併雜氣天符雖初學皆可用然天符正局或者一時雖遇其言此外又有化象局有類象局有六格局皆吉亦與天符正局相似止要取得太陽到坐向或帝星到坐向又不坐三殺不向太嵗者皆可用之期也因具作法圖局于左三者不必皆合得一局皆可用一化象局此局定湏取得天干雙化而地支三合者方可用一類象局此局定湏取得各從其類如木取木類火取火類地支又三合成局他倣此一六格局此局定湏取得各合正格如官殺身弱者宜用印身旺者宜財印輕者喜官印重者喜財財多喜官殺財弱怕刼食神只喜一位三位即作傷看傷官身旺喜財殺身弱喜印綬但財印又不可俱彰子平常謂傷官財印俱彰將何發福風木龍二火龍濕土龍燥金龍寒水龍皆直椎横看化甲己年月日時乙庚年月日時丙辛年月日時丁壬年月日時戊癸年月日時地支又臨局地支又臨金局地支又臨水局地支或臨木局地支或臨火局或臨水局或臨土局或臨金局或臨水局或臨木局財氣局主旺則吉主弱必凶乙庚年月日時丙辛年月日時丁壬年月日時戊癸年月日時甲己年月日時地支又臨金局地支又臨水局地支又臨木局地支又臨火局地支又臨土局或臨土局或臨金局或臨水局或臨木局或臨火局尅氣局主旺無妨主弱極凶象丙辛年月日時丁壬年月日時戊癸年月日時甲己年月日時乙庚年月日時地支又臨水局地支又臨木局地支又臨火局地支又臨土局地支又臨金局或臨木局或臨火局或臨土局或臨金局或臨水局生氣局主旺平平主弱極吉丁壬年月日時戊癸年月日時甲己年月日時乙庚年月日時丙辛年月日時地支又臨木局地支又臨火局地支又臨土局地支又臨金局地支又臨水局或臨水局或臨木局或臨火局或臨土局或臨金局局本氣局中和極吉過不及凶戊癸年月日時甲己年月日時乙庚年月日時丙辛年月日時丁壬年