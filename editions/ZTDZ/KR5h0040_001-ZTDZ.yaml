front:
  text: 完孝録凢例封一一堪輿論巒頭者雪心賦葬經等書言之備
  hash: sha256:635e414e21ce582b3a61d97d6c760da57e7347cc63973e3cb2060b15f0996f19
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0040_SJB_001-350580a, image: sjb/35/350580a.png}
body:
  text: 矣論星氣者催官篇玉尺經等書言之備矣更復何贅是編中所載皆因古人所未言者而言之或古人言而未詳者而詳言之一切陳言不載但其中如廣熊氏饒安李氏括蒼季氏泰和周氏臨川昊氏之類言皆切理尚未廣傳于世故併録之一論形氣諸前賢格言皆可備參考至七政造命年月世所罕傳故編中論形氣者略而論七政者詳論形氣者止存今文論七政者併存古文一天符紫白闡五運六氣之機發洛書河圖之秘其理與七政相表裏者此亦世所罕傳故併存之一仁人孝子之心原無所爲而爲而編中輙言吉凶禍福後來之應驗者不亦惑世乎然以純孝之士不恒有於世故舉其騐以歆動之不必一一如所云一地理本靜也古人制作毎於靜中求動故多用變夫變者權也權非聖人不能用時師而誤用之其不敗乃事幾希是編惟道其常而已至用變而涉奇怪幽玄皆所不載完孝録目録卷一一章論陰陽正宗二章論氣運通塞三章論氣色貴賤四章論氣色眞假五章論五氣生尅六章論天地氣機七章論龍穴砂水八章論龍九章論穴十章論砂十一章論水十二章論峽位十三章論形勢十四章論定穴十五章論證穴十六章論星氣十七章論極暈十八章論四神星宿十九九章論左右朝對二十章論體槩廿一章論花假廿二章論約束廿三章論交度廿四章論五行生尅廿五章論三合廿六章論應騐廿七章論用神冲合廿八章論變體作穴廿九章論尋龍總要三十章論宅墓總要卷二三十一章論選期正式三十二章論天時三十三章論造命三十四章論格局三十五章論身命三十六章論審氣三十七章論推星三十八章論二五三十九章論山向二五四十章論七政四十一章論過官四十二章論定時四十三章論天文四十四章論天運四十五章論經星四十六章論緯星四十七章論星土四十八章論帝星四十九章論五星五十章論中針五十一章論二曜五十二章論天機五十三章論火星五十四章論土星五十五章論金星五十六章論水星五十七章論紫氣五十八章論月孛五十九章論羅㬋六十章論計都三卷選擇條例细目見後觀星節要凡三十四章四卷七政细目見政五卷天符正經细目見後六卷九宫紫白细目見後七卷五星命畧细目見後八卷安葬儀節细目見後目録終儒門崇理折衷堪輿完孝録卷之一蓋自有天有地分陰分陽至理流通於兩間元氣運行於萬古昏昏默默妙闔闢於無窮混混沌沌神變通於莫測或敷而爲二氣之推遷或布而爲五行之生尅一消一長總妙玄工爲盈爲虚無非造化天地之神固不可知推遷之數則有可考爲日月爲星辰其燦然扵上者有一定之度爲山川爲土石其凝然扵下者有一定之形推其度可以知年月日時之吉㐫察其形可以决龍穴砂水之禍福道叅三極理無二途惟三才合一之士可以凝天命佑神工彼拘攣執一之徒安得肩鴻鉅當重任高其談闊其步依然遠類乎楊曾擬其象畫其圖居然自安於廖賴若問天文地理那有實見眞知大者勿論乃拘拘扵小節之疵全體罔聞顧屑屑於一偏之見巳昧乎山川向背之分且以方向言禍福既踈扵聖正授時之令更以雜說論日時况僞書之紛紛濟誕說之喋喋天無二日古今定理今之論太陽者則曰曆數曰烏兔曰都篡之類有七位太陽之參差民無二王聖賢格言今之論帝星者則曰尊帝曰天皇曰口斗之類有十三帝星之間雜變亂陰陽者則有爲凈陰爲凈陽爲分陰爲分陽爲眞陰爲眞陽爲先天爲後天詎知太極之陰陽無二理易置五行者則有爲陰府爲洪範爲八卦爲雙山爲玄空爲納音爲渾天爲星宿誰知生成之五行無兩端似此之類難以悉舉信此之輩舉世皆然是以疑信交馳令人一二世而無葬地可否難辨致人數十年而無葬期始信僞術不足憑惟有吾心爲眞主吾心果善人自傑而地自靈念慮少虧地不庇而神不佑不然胡龍頭政嚴灾兆十日胡牛眠山上位至三公况興衰成敗之機莫非天定故貪謀詐求之計枉自心勞或侵掘巳祖猶如剜肉以充饑或偷葬人塋無異盗鈴而掩耳奉勸世人無如守正培心地乃爲得地之本循天理誠爲地理之根崇信明師毋惑幻術相地以五星巒頭爲先而卦例天星奚足惑擇期以七政要㫖爲重而百家襍說何足憑守此陰陽正理可叅造化玄機相地㕥五星四句是一部大㫖右第一章論陰陽正宗龍穴砂水地之形也盛衰消長地之氣也形本吉而氣未至則無先作福之理如尼丘生孔嵩嶽生申前古豈非此山水耶以氣運未至雖造化不能先啓其機形甚吉而氣巳洩亦無再作福之理如諸馮生舜岐周生文後世豈變易此山水耶以氣運之既盡雖造化不能復啓其機蓋天地之氣流行不滯古之洛陽今非昔此今之京師視古獨盛均此山川而作福有遲早乆近之不同者以氣運之至與未至盡與未盡耳何嘗拘拘扵龍穴砂水間耶然盛衰之機必有先兆是故河洛呈祥發卦疇之預兆麒麟郊見啓王法之先機黄河清而知聖王之御極五星聚而兆賢士之竝生此皆關乎天下國家之盛故天地精萃之氣顯而爲禎祥有如此也若氣數將亡則妖孽竝生而㐫氣集矣是氣也固大無不包亦小無不貫雖市廛之間墓宅之所亦有盛衰之可言者凢入其郷登其宅墓見其禽獸繁育草木暢茂風氣和煖山谷騰輝水深土厚景色清奇至扵晨昏半子之時乃見祥光呈現淑氣交騰又有若遠遠微聞鍾皷之聲老者持杖壯者軒昴童子班班俊秀人人和樂雍雍揖遜凢此皆盛氣也發福必大若入其郷登其宅墓見其草木焦枯禽獸離散風聲悽𢡖氣色消索山川崩破寒谷幽暗及晨昏半子之時又見光明不著滯氣交騰而寂寂然如入於無人之境家無頒白少壯罷弱内有風聲庭多忤逆凢此皆衰氣也爲禍必速又有等人家出麻白悽𢡖之氣者必主喪服有黑爛沉滯之氣者必主疾疫有赤燥炎蒸之氣者必主火灾官非之類或生菁苔或生白毫或牝雞鳴亦皆㐫氣致之也又有等墓塜無故自䧟風㧞其樹雷擊其處其家亦主退敗墓土焦枯炎燥發露此火氣盛也必主虫蟻墓上獨生青蒿或生白草白葉𣗳皆水氣盛也必主水泉凡山大水小而無龍穴者必生白蟻凢山小水大而無龍穴者必主水泉或來龍雖眞而穴扵無氣之所其禍亦然四旁皆生草木而塜上獨無者其中白蟻滿棺塜上獨生青苔而四旁皆無者其中水泉盈穴穴有砂石者水泉不免穴乘殺氣者白蟻亦生葬虚窩者水必浸葬頑硬者蟻必至此亦理之必然者皆衰氣也此盛衰之氣巳見其大槪苟細察之愈推愈妙今人見靈芝等瑞誰不重之然非無别也如或靈芝之始出頭者有如寳蓋之微露其頂或如蜜蜂之吹飴微微然似有其聲實無其聲此初盛氣也露其頭者復露其盤露其頂者復露其簷似有其聲者實有其聲或紅或黄或赤或五色間雜而成章此正盛之氣也至若如靈芝之有盤者露其幹如寳蓋之有簷者露其柄或郁郁然盈人之日或鬨鬨然盈人之耳此極盛之氣也過此則盛極而衰矣如靈芝之有幹而長如寳蓋有柄而高如蚊鼓之自近而遠如微雷之自低而升如祥烟之結五彩者外濃而内淡此將衰之氣也如靈芝之有幹而斜飄不着於地如寳之柄高而飛拂無所依如蚊鼓之去遠如微雷之過高如五彩之一片一片而聚散無常此正衰之氣也至若如靈芝寳蓋之朽而壞變而無聲之高而亢遠而極色之濃者倏而爲淡飄飄然如殘星之將散拂拂然如敗葉之經風此極衰之氣也在智士之善惟耳右第二章論氣運通塞卜氏曰相地一似相人此善喻相地之法也余觀風鑑之流每每以形體觀人之貴賤以氣色辨人之窮通二者兼盡然後相法無遁情也何今之相地者徒知相形體而不知觀氣色卒不能如相人之騐矣范氏曰祖龍高頂名樓殿常有雲氣現楊氏曰望氣尋龍易是古人相地丑來嘗不决之於氣也今人胡置而勿論耶然氣之現於微芒者認之尤難惟平旦之時清氣未散泊暮之際正氣方收及時兩方霽之㬋初秋中元之旦斯時也㣲露者皆可見恍惚者皆可觀至於更深半子之時認之尤當凢青紅者皆陽氣也白黑者皆陰氣也黄而潤澤者陰陽冲和之氣也觀氣之高低体態可以卜所結龍穴之長短觀氣之廣狹規模可以卜所收砂水之多少觀氣之端然而直上定知正穴必在幹龍觀氣之飄然而斜行定知正穴必是枝落幹氣自然雄偉高大枝氣自然卑小清弱山雄健者氣旺盛山柔弱者氣微細故曰龍行十里氣高一丈富穴氣如叠壘色艶而濁貴穴氣如張蓋色清而奇初吐一線上結華蓋葱葱欝欝如雲如煙如旃冕垂琉黄中五色具備似龍燔者名曰旺氣帝王之地蓋帝王陰陽合德五氣儲精又土爲君政其色本黄龍爲君象其形本肖所以備具五色又黄多而象龍也紅光明爍森森林林如虹如月如鳳舞者名曰淑氣后妃之地蓋后妃與君敵體相去不遠又火能助土鳳爲君瑞所以紅多而象鳳也或内白外黄前青后紫青如牛首赤如虎尾者猛將之氣侯伯之地初若雲煙终類鼎沸中青外紅如流星燭地如蛟騰鳳翥者福喜之氣宰相之地赤白一線直冲貫日者忠幹之氣諫臣之地赤紅一線如虹而微帶綵色者文奇之氣狀元之地純白純黄民牧之地紅黄紫白相間而青潤者翰苑之俊紅黄黑白相間而厚重者附馬之英初吐一線終結寳蓋五色俱備輕清上浮有紋不襍如踏節如寳塔如揺旌如幢幡耀日燭星者爲異氣神仙之地此氣多現於飛鴈龍鐵拐龍五色具備正直無倚如大臣之立朝者爲正氣道學之地此地多現於中正龍逸士龍大抵青紅而明亮者文臣也白黑而徑直者武職也青紅白黑又帶一絲黄潤者文武全才也其氣類禽者出文其氣類獸者出武其氣盛大而燭天者必產出將入相之士其氣低小而光明者亦出文官而兼武備欲知官禄之崇卑視氣之高低廣狡而可見欲知官禄之乆暫察氣之大小厚薄而可知欲知官禄之在何方蔭何命人則分野可考方位可斷如坐命坐穴皆在子而吉氣正躔玄枵之次者官禄多在宋利亥卯未人坐命坐穴皆在丑而吉氣正躔星紀之次者官禄多在鄭利申子辰人坐命穴皆在寅而吉氣正躔析木之次者官禄多在楚利巳酉丑人坐命穴皆在卯而吉氣正躔大火之次者官禄多在周利寅午戌人坐命穴皆在辰而吉氣正躔壽星之次者官禄多在秦利亥卯未人坐命穴皆在巳而吉氣正躔鶉尾之次者官禄多在晋利申子辰人坐命穴皆在午而吉氣正躔鶉火之次者官禄多在趙利巳酉丑人坐命穴皆在未而吉氣正躔鶉首之次者官禄多在魯利寅午戌人坐命穴皆在申而吉氣正躔實沈之次者官禄多在衛利亥卯未人坐命穴皆在酉而吉氣正躔大梁之次者官禄多在齊利申子辰人坐命穴皆在戌而吉氣正躔降婁之次者官禄多在昊利巳酉丑人坐命穴皆在亥而吉氣正躔娵訾之次者官禄多在燕利寅午戌人官位之陞遷無定方則吉氣之旋轉亦無定在如坐命坐山在子而官貴之氣現於申者官禄多在晋若有時轉入於辰則官禄又在鄭或再轉而入於午則官禄又遷於周凡自低而高自微而著必升遷之氣也若漸低漸微必降謫之氣也變而爲無者必退斥之氣也又有飄揚而入於坐山者必致仕還郷之氣也凡此之類未可盡述非聰明特達之士不能探其玄㣲右第三章論氣色貴賤地之氣色有眞有僞僞者似眞眞者似僞作福之地其氣特奇停停然如寳蓋郁郁然似靈芝望之則有影可見即之則無形可拘或紅或黄或紫或赤或白而滋潤或黑而有光或五色相間或萬象交騰又或如空中之錦繡或如五彩之文章凢此皆造化吉氣鍾之於地故精光特露有如是也若夫或白或藍横欄散漫其象甚著其中甚澆此必是日氣與水氣相交而成者又有日出曙氣日落霞氣月出入輝光氣雨後雲氣老山濕氣川澤嵐氣珠藏澤媚玉韞山輝古窖浮光古墓有耀延平之劔芒射斗牛瓜園之刀光含夜月草木之枯老則有光器物之年深則有火人血之在野日久則暮夜生明禽獸之血亦積久而有焰妖蛇之吐氣似雲妖雉之吐氣似錦妖龜之吐氣似霞蜃之吐氣每每結成樓䑓之狀與夫神火鬼火土地燈社司燈之類難以枚舉皆僞氣之似眞者也大抵眞氣上大下小僞氣上小下大眞氣外淡内濃僞氣外濃内淡眞氣外暗内明僞氣外明内暗眞氣有氣而有光僞氣有光而無氣眞氣出山之巔僞氣横山之腰眞氣多結於陽明之地僞氣多結於幽谷之中眞氣多現於衆山攢聚之郷僞氣多現於孤陰獨陽之處辨之不精未必不指鶡雀而爲鳳野鳥而爲鸞蝘蜒而爲龍也氣之僞者勿論已而氣之眞者又有龍氣穴氣砂氣水氣之不同祖龍之氣定是光芒燭天穴中之氣必然精光獨露一分砂之爲氣所以輔龍穴之用也故欲看砂上之氣者當以龍穴之氣爲主未可以砂上之氣旺而遂以爲吉穴在砂也如東方龍穴砂上見白氣紅氣南方龍穴砂上見黑氣黄氣之類皆尅洩之氣也見之必凶惟龍穴本氣極旺者方可免咎若東方龍穴砂上見黑潤之氣南方龍穴砂上見青潤之氣之類見之甚吉雖龍穴本極衰弱亦不作禍凢尅洩之氣落䧟宫爲禍必淺生扶之氣落䧟宫作福亦輕如火在北土在東之類即䧟宫也水之氣其象與砂氣同右第四章論氣色眞假春氣青兮夏氣紅清秋白潤黑居冬黄氣分居四季流行總是不同如青氣獨盛於芳春雖見白氣而無害赤光騰耀於夏日縱遇黑氣而不防白旺不畏赤臨黑盛何愁黄至夏季之土見木不生灾旺氣之黄逢青而不尅細觀氣之盛者既不畏尅則知氣之衰者自不能生三春之土難以助金九夏之白何能生水冬火不救季土秋木不顧炎君四季水衰青黄何賴東方青氣輕飄本嫌白露若見絲絲紅紫定知賜宴瓊林西方嫩白飛揚不宜炎至或者微微黑現必然汗馬成功赤微畏黑見黄婆則功成可待水少忌土見青黄則事業可成黄雖懼木白解救土獨青能爲筋骨之疾單紅必興牢獄之灾重黄瘟疫孤白死亡孛在北方無間色灾生不測不須疑此皆青紅黄白不潤黑帶濕滯無光若是中和何妨灾至青氣散亂而不正多生巫祝紅光尖射而怪異定出訟師白氣亂出而亂飄世傳剛惡黑光斜没而斜現代有穿窬黄現昏暗無光定產盲聾喑啞青亂必多變黑亂必多淫紅亂則文筆不開花白亂則干戈必生耀更有黄氣亂則生疾紅黄現總曰禎祥豈知亂紅現於西方必招血疾亂黄產於北地定主賢虚青黑生似非淑氣豈知青潤生於南地則光輝益著嫩黑呈於東土則生意可人蓋㐫中也㑹藏吉吉處也會藏凶皆自然之機亦一定之理太旺則凶暴强悍太弱則孤苦伶仃旺極者斬後必速弱極者終亦絶嗣久暫雖殊同歸一致右第五章論五氣生尅風水之術先識氣機氣機不識風水何爲氣通於天機達於地通天達地逈别時師略舉一二誨我支裔氣有進成機亦有進成進者吉成者又吉氣有退敗機亦有退敗退者㐫敗者又㐫履其龍登其穴挹其砂水審其氣機爲進爲成則貴地决其尊榮富地决其興旺縱貧賤之地亦安好也爲退爲敗則貧龍斷其枯竭賤龍斷其疾患縱富貴之地亦零落也春屬於木木之氣青木之機升夏屬於火火之氣赤火之機炎秋屬於金金之氣白金之機融冬屬於水水之氣黑水之機沉四季屬土土之氣黄土之機凝悠悠揚揚絪氲滿眼蕩樣飛絲淅瀝震響此木氣也鳥嬌其聲人含其咲青衣童子提壼挈榼此木機也舉凡所見所遇帶有動盪之情懽虞之狀崛起之體態者皆屬於木皆爲春之所宜矣緑靄紅光飛英集曰閃閃爍爍激烈怒號此火氣也犬吠雞鳴妻呼子叫牧堅樵夫歌吟咲跳此火機也舉凢旿見所遇帶有汹湧之情咆哮之狀轟烈之體態者皆屬於火皆爲夏之所冝矣清清白白風色飄揺聽若有聲視之無形此金氣也行歌坐咲聲應聲呼驅牛趕馬緩語徐行此金機也舉凡所見所聞帶有思嘆之情倦怠之狀醉飽之體態者皆屬於金皆爲秋之所宜矣寧寧靜靜無塵無上不動不揺亦不寂寥此水氣也扶肩而行對膝而坐携手而語爲飛不嗚此水機也舉凢所見所遇帶有憂傷之情抱悶之狀妝歛之體態者皆屬於水皆爲冬之所宜矣塵埃滿眼黄沙霏微萬籟無聲風氣温涼此土氣也整衣束屢正立清談肩負擔荷爲宿獸歸此土機也舉凢所見所遇帶有端肅之情負戴之狀沉潜之體態者皆屬於土皆四季之所宜矣春得火氣機爲進木氣機爲成水氣機爲退金氣機爲敗舉其一可以知其餘四季之土亦附四時而論氣斷人丁宫爵機斷祖業財帛氣雜者一門數姓氣進者子孫成名氣成者添丁進爵氣退者官休子病氣敗者官禍子死機襍者陽宅主淫奔陰墳亦主淫奔機進者產益財來機成者庫充倉滿機退者家耗廩虚機敗者賣田借債審氣機之時屬寅即應寅亥之生命審氣機之時在巳即應巳申之生命餘可類推而知斷其吉推生命禄寅之月斷其凶推生命刑刃之期萬無一失者也有春月登山見跨馬者一墳石砌斷其有隔足之疾一墳荒草斷其全富貴之家有夏月入聞聞燕語者問疾病斷其秋必死亡問功名斷其秋必榮捷有秋月登山見携酒者一有碑之墳斷其富而無積一無碑之墳斷其吝而有財有冬月登山聞鴉聲者一男墳斷其子陛御史一女墳斷其家寒子孝有日午登墳見日影者斷西方興旺齗東方零落有日午登堂見賣菜者斷男女無縁中年失偶此皆以氣機論也右第六章論天地氣機此以前論氣以後論形談龍者必曰來龍龍不見其來則將何作主論穴者必曰穴情穴不審其情則以何爲証龍之枝幹雖殊其來也皆有飛見潜躍如一不全則龍不眞穴之形體雖異其落也皆有情勢氣脉如一不聚則穴不正有眞龍有正穴則砂之吉者吉也凶者亦將爲我制譬之朝廷有道則奸雄化爲純良水之來者來也去者亦將爲我用譬之心腹無虞則疥癬何嫌一二無個非龍其來不終葬者乘之孤獨貧窮無穴非穴其中必拙葬者當之輕貧重絶生尅皆砂皆宜就我子父財官皆宜柔抱抱我皆吉皆我皆禍來去皆水皆宜舒徐艮丙巽辛皆宜溶注金水土佳木火爲崇裹赶非砂蟹蝦非水一以定龍一以證穴龍有正變穴有乘除金變如木火溶其傍勢如一線貴不可當見土成穴穴欲其藏土變如金木列其間勢如剖瓜富不可言遇火伏側穴除其巓砂嫌離郷亦愛離郷嫌在尖削爲漂爲蕩愛在圓秀遠宦富商水莫愛去亦莫伯去去者回顧四處招財來者箭跳一事不諧穴音緯交覆深屋也右第七章論龍穴砂水待哺之雛伏棲何鳴起微之犬黨巷何聲發將之巓龍之起祖曰發將過峽曰過將結穴曰住將巉然何圓結咽之關混然何平二氣何儀五兆何行奇幻倏忽易步分程聯鑣附轡並足爭衡降高就卑僕從紛紛如群羊之躑躅如驚鳥之翻翎如蚓沿壤陌如蛛絲畫簷如帛之紋如水之痕其翩翩片葉必趨於一陣其壘壘群隊必隨於一奔若起若伏若斷若連勢不累形形不累塋崇雅之崗其住欲巧稠衆之崗其住欲專隱隱微微其降既弱其住欲端蜿蜿蜒蜒其勢既横其住必旋葉茂枝繁定湏腰結葉踈枝朗盡處可扜故曰衆山回頭結在原頭衆山飛走結在水口上下相抄結在中腰此可爲尋龍之要領亦可爲點穴之大端是以龍之行也有手有足龍之住也有頭有面龍子端嚴也不顧四面龍之四面也皆顧龍神龍之行度宜相生相合龍之硤位宜相尅相刑龍之起祖必顧子孫龍之到頭必肖宗祖祖宗重厚有好子孫子孫秀異由好宗祖故曰祖强宗强立已善艮子孫其昌宗雖分泒祖德未艾子孫昌大發跡雖涼承世延長聲聞遠揚祖没宗茂一代之富祖榮宗燁富貴奕葉子孫迎迎宗祖繩繩宗派降勢祖本山泠一代小康宗泒降勢祖本山顧光大之葬亡祖失宗望人門户皆祖棄宗南北西東平地之龍無異高山蓋高山之五星堅體平地之五星卧體分枝結咽開帳出胍順逆迎送無一不同但北龍山勝於水故多就氣南龍水勝於山故多就水右第八章論龍近日顓門人家輙曰窩鉗乳突窩鉗一也窩則圓而鉗則直乳突一也突則聳而乳則垂金水之龍愛成窩鉗土木之龍愛成乳突窩以心泡爲證高無心泡爲側爲空空側之窩孤寡貧窮鉗以貫耳爲證鉗無貫耳爲蕩爲散蕩散之鉗人離家散乳以隨水爲證乳無隨水爲枯爲竭枯竭之乳非貧即絶突以鬚翼爲證突無鬚翼爲孤爲孑孤孑之突艱難四裂地在高山突中愛窩地在平洋窩中愛突穿空穿薄穴情便惡夾堅夾頓穴情鎔煖借官不借鬼借鬼者絶借虎不借龍借龍者滅借案莫借托借托者家蕩如雪借山莫借水借水者財蕩如裂右第九章論穴主山降勢衆山必輔相衛相隨爲羽爲翼山必欲特特則不群出類拔萃稠衆難倫山不欲獨獨則必孤流落羈旅宗黨無徒山不欲多多則無憑亂臣賊子朋伍縱横山必欲衆衆中有尊羅列左右扈從元勳山必欲交交則必鬭山必欲鎻鎻則不漏闘漏之辨相湏相擊之侯山不欲垂垂則失利山必欲降降則勢止垂降之辨殺氣得氣之謂所喜者完其四面所忌者勝扵一偏不集不應五氣散於八風或逼或沉三光囚扵五造惟三方稠密以舒以容一水平澄以防以衛貴賤固係於後龍吉凶盡應於前對螘螘繩繩以屬其的低結盤窩蜂蜂旅旅以羅其傍高藏壺盪進前勢以若闘退却立以惟恭集左右以爲輔峻門户以藏風如展屏如列城而無馳逐離去之意如懸鍾如覆釜而有朝宗顧主之情何取如纛如旗又何必如筍如鎗後卧前聳左回右拱此衆山拘龍之蕩後瘦前亂左反右宜此衆山脫源之窮皆後分枝面前分溪左如梳腦右如眉此衆山脫水而脚不齊皆後如傘欄面前如𤖼板左去如出軍右去如群奔此衆山逐水而脚分岐雖然欲知砂法之美惡先看本主之盛衰如本主木星過盛宜見火見金本主木星甚衰宜見木見水扶其衰亦當制其過舉其一可以例其餘右第十章論砂山隨水行水界山住水隨山轉山防水去人知山之不可頗不可偏孰知水之不可淫不可蠱無劔佩之腋流無偏鏘之面去無隔胷之建瓴無分臂之墻瓦無蛙背之披淋無鷄胷之兩下横琴卧笏精神有類於環襟新月長虹氣象不同扵反弩六相西朝而右不虚六替東行而左不空來如展席之平且分地濁去如鋪簾之鎻又辨天清有織有交無冲無射入首尋龍蕩必分於内外隨形擬穴應當復其污降蓋山尋住脚連延則未絶他情水愛環城反背則不鍾内氣固取瀦而後洩尤愛去而復留乾流欲鎭於長流堂前不脫小畜相逄於大畜腕内宜灣雖有江湖池沼之澄凝不若金魚蔭腮之親切横平寬整欲江澗之無聲抖直瀏奔忌田濠之短折平不平而横不横分途八字傾不傾而宜不宜鎻節丁文揺旌反弩者禍臨崩唇夾脇者災至溍筧長槽不數年財箱如洗偏鎗幹割一二世宗祀伶仃或如帶或如練湏應於天文或是之或是玄各司乎宫分駇襍交宫縱清流而蹈濁耀眞純入路凝緑鑑以照蒼淵主衰則宜生宜扶主旺則宜尅宜洩扶其弱抑其盛總歸中和龍既眞穴既正水自合法抖音收衰他瓴音靈右第十一章論水星峰固宜剥換亦湏不失原神如金星更迭之後必復見土見金方爲本原主露方論過峽過峽與束氣迹相似而實不同束氣者恐其發洩大盡欲暫安憩焉耳峽則如蟬之蛻如龍之化最爲機軸如金龍過峽則思金爲土之精水之母生於巳墓於丑養於辰旺於酉寡於箕孤於鬼冲於卯絶於寅禄扵申酉而貴扵寅午自墓絶而過生旺自孤寡而過禄貴即善地矣而所過之體尤分正變纍絡如珠金之正体也以正体過則凡諸星護衛皆以合正爲妙液流如線金之變體也以變體過則凡諸宿遮攔亦以用變爲奇峽之未過以生爲體峽之既過以尅爲用譬如養子者骨格既成欲其脫嬰兒之態任大人之事則必勞其筋骨苦其心志和以切磋而琢磨方成人矣是故火雖尅金而金以火過爲融水雖尅火而火以水過爲制木雖尅土而土以木過爲踈金雖尅木而木以金過爲用土雖尅水而水以土過爲凝觀峽左右知青與曰觀峽閃昂知乳與突觀峽曲直知窩與鉗觀峽之形即知穴態觀峽之勢即知穴證觀峽之星即知穴色觀峽平沉知穴淺深觀峽長短知穴唇氊峽既過矣則觀其作何星辰以爲少祖如金過而金則龍露湏障之以水則以子護母母不抛頭露面而體勢以尊金過而水則龍洩湏培之以土而后元氣不凋金過而土則龍壅湏制之以木而后英華漸露金過而木則龍病湏輔之以金而后氣力不虧金過而火則龍傷湏制之以水洩之以土而后精靈不損既起祖星湏宜剥換剥換一二便須束氣束氣而再束便宜起頂起頂之星尤宜分曉過峽是金而金作頂始見原神之眞骨也木土二星子母亦堪互用惟水與火則匪佳城金逄木火財殺同郷惟叠叠皆金並無剥換則又宜見木火譬之獨創門户非財不安非官不顯也右第十二章論峽位來山爲勢結成形勢如根本形如蕊英英華則實固根遠則幹榮勢必欲行行則遠遠而騰蹤形不欲行行則蕩蕩而不鍾勢不欲止止則來無所從形必欲止止則蓄而有容形不欲露露則氣散於飄風勢必欲露露則氣聚扵高賛勢不欲汙汙則氣菽而不鍾形必欲汙汙則氣聚而有融蓋形者勢之積勢者形之崇形者勢之結勢者形之從彼有左右之勢以從中而衛穴面前之勢以朝穴而應龍外勢欲圓内勢欲才宗龍之形如花之的騎龍之形如宇之堂的承貼萼之正堂居門仞之防㐴龍之形如人卧之肩井如魚奮之顋鬛皆隨其趨向而横應偏傍承龍之穴如心目之顧帶如日月之精光皆引其來歷而寬接窳藏如世族之居兮門仞之高峻莫窺其堂如大度之設兮實主之交際以盡其温恭如荒園敗圃兮藩離已壞者來徃之蒙衝如巨翁權勳兮必森翼衛而環左右如藏寳積粟兮必厚蓄而峻厫君故曰燔根固蒂者枝必茂於喬木夾輔礞流者形必就於眞龍右第十三章論形勢横脉定穴横脉龍過處而起起又伏在中央梭肚有泡處扞之要前有朝案後有落托左右有肩㡌方眞爲闘斧孔脉多腰受宜後頂龍脊書云横擔横落無龍須下有龍是也切不可出出則脫氣直脉定穴直脉龍直來不左不右扦穴多宜脫出必湏兩手重重拱揖攔截去水方可下之若眠體少緩則閃殺可扦書云直送直奔有氣要安無氣是也切不可正闘闘則撞殺斷胍定穴斷脉龍行兩頭大中央小如折藕之絲又如銀錠之中則從細小中認定應樂以腰受氣横騎扦之無應樂而穴糢糊切不可扜漏脉定穴漏脉者大山之下胎息之旁輕漏一湶入於平也或也起敦阜此眞氣傍漏穴宜就頂扦之向宜就局偷脉定穴偷胍是平地中草蛇灰線連帶龜脊起扵平中詳其盡處粘脊扦之要前有明堂後有送水方眞飛脉定穴飛脉龍行如蛛絲馬跡飛燕遊絲勢多斜旋擇其衆山圍遶中取其端正者而扦之平胍定穴平脉平地之龍如四圍田高遶將來中間低田低田又起一路高田則低者爲水高者爲脉外高者爲龍虎看水合處認掌心扞之墜脉定穴墜脉龍行高大落下一絲如懸絲之蟲如掛網之蛛穴當就泡珠小塋扦之勿大作大則損龍長胍定穴長脉龍鋪平出洋悠悠遠去或出或没或大或小只從氣盡水交堂聚處認中扦之短胍定穴短脉正龍不住只於行龍上落一二節或聚講處落一脉結穴宜扦中正不可偏倚然亦易發易敗之地正脉定穴正脉龍行中出逶迤軟活星辰端秀只看朝對正中蓋穴扦之玄武嘴長壓殺扦之玄武頭縮屏殺扦之右第十四章論定穴五星證穴金體圖扞其虚而動木體直扦其芽而泡水體曲扦其正而靜火體烈扞其焰之盡土體方扞其饑而薄九星證穴貪狼出穴是乳頭巨門出穴窩中求武曲結穴釵鉗覔禄廉梳齒鑗鐴頭文曲求穴平裏作高處亦是掌中落破軍作穴如戈矛西邊左右手背收輔星正穴燕巢仰若在高山掛燈樣弼星出穴在低平縱有圓頭亦凹象三勢證穴立體山聳氣上浮眠是山伏氣下墜坐是山和氣中藏此乃天地人三勢朝山證穴案對之說取其應也如主客相迎如夫婦相親情意相投而無間形勢相駐而不踆奇峰特發直中取的耦巒聯秀拗裏平分高則齊眉低則應心故曰惟有朝山識幸心明堂證穴結穴處必有小明堂收小界水合入其内看堂正則居中而取偏左穴居左偏右穴居右堂之輔穴如盤盛杯如裀藉足斷無一偏之堂水勢證穴結穴處水到此必灣環澄聚儼若不流書云水不亂灣水聚左穴偏左水聚右穴偏右又曰左水明偏左右水明偏右朝水宜高順水宜低蓋水者龍之血脉山行則水隨水合則山住故穴以水爲的樂山證穴龍行有委曲結穴多不對頂必穴星後生一山爲樂托不拘他山本山只要立穴處坐後對之爲應直來多坐本祖横坐必是他山樂星不對穴亦不眞官鬼證穴横來湏有鬼直落定逢官結穴處後拖者爲鬼亦可以爲托前拖者爲官亦可以爲案若有此二山立穴處後要坐鬼前要對官如不坐不對非眞穴也龍虎證穴龍逆水穴依龍虎逆水穴依虎左單提倚龍右單提倚虎龍虎高穴高龍虎低穴低龍虎中停穴中穴低龍虎高則忌壓塜穴高龍虎低則忌露胎故察龍虎亦可以得穴情十道證穴十道取乎四應前後相對左右相稱謂坐不宜偏案不宜斜夾耳不宜進前退後故立穴處先看穿㬹十字後枕圓前對尖左右對㬹曰天心十道曰㗸枚分合證穴上面有分其來明下面有合其住眞此小明堂内合水即蝦鬚金魚界合也有合無分來不明有分無合住不眞是假穴也曜氣證穴龍虎肘外盛氣發而爲曜亦可以證穴左有曜則穴居左右有曜則穴居右左右雙曜穴居其中長而清者爲貴短而掬者最强龍盡方有初中罕遇方隅證穴衆形既各可證方隅又可總證如穴結于中心穿岀處則以兩水交止證之如穴結于平緩水横處則以龍脉特氣證之如穴結于脉並水兢處則以朝山有意證之主背脉側之結穴處以左右停匀證之龍虎偏護之結穴處以堂氣聚大證之平凸之難向結穴處則以砂寬水抱證之大抵證穴多端總認情勢如果有情則雖獨證不嫌偏倘或無情則雖合證不言備在智者之自悟耳右第十五章論證穴陶公曰上法少備眞龍難辨眞穴難明有旺氣依巒頭而行者得其星則得其氣其辨之也易有星辰布後而氣則鋪前星巒偏左而氣則鋪右若此等則得其星必失其氣得其氣必遺其星故曰認氣難大抵龍從氣鍾星輔氣住善認者得其氣不遺其星不善認者得其星而脫其氣亦必然理也但扵蚌腰鶴膝處考其過則來眞於肥圓平聚處認其靨則結明觸類而推萬無一失右第十六章論星氣地理關健極暈爲至行行有極星星有暈不極不暈富貴難問土爲金極水木火暈極爲元氣暈爲用神極不送亦不迎閃閃渾如顧復情暈不昴亦不俯依依恰似相面互金龍過峽土星微露端倪而子父財官森森互列過峽起祖土星遠相照映而水金土木簇簇親隨束氣以土藏金父元護衛生龍以金帶土財鬼遮隨官出現財伏藏子端拱是爲正暈正暈者爵禄悠長而爲牧爲相官俯伏財崛起子縱横是爲變暈變暈者威權猛烈而爲臺爲將行龍不帶極丹桂無根縱有一乙二甲不產狀元之子堂氣不聚極黄金無種縱有文武輔弼難登公相之堂極見暈而端凝龍章鳳誥暈見極而低縮紫閣丹扉登穴場而極居落托或爲屏嶂之尊挹明堂而暈列官禽必作排衙之狀極在砂中鋒鋩不露而暈皆隱隱流行極藏水曲源派有踪而暈即洋洋布置龍穴之極暈不全懼貽灾於卿黨砂水之極暈不備恐播惡於蒼生極有欠缺不爲孝子忠臣暈有踈違難說經邦濟世極有極之方方宜出現極奪於財者貪極奪於子者弱極奪於官者爭不若以我壓之尤爲耀祖暈有暈之位位有異宜官暈之位宜踈財暈之位宜伏子暈之位宜端一有不得其宜即爲禍端明堂内四暈俱全少年及第水口中四暈乃備晩嵗登科大富者財暈常端而得位蓋富非驟至如珠聚如帛累而後千倉萬箱大貴者官暈必踈而居方蓋貴不倏來必琢磨必勤苦而后姓揚名顯故曰我尅爲財尅我爲官時師不識吾徒愼焉右第十七章論極暈地有百形理原一致尋宗問祖見影知形峽位與公位相當后鬼與前官相應來氣與餘氣相因分襟與合襟相稱后有落托前有唇氊來有撓掉住有頭面龍湏媚虎虎必馴龍最忌者龍巉似虎最愛者虎軟如龍虎軟如龍者無刑併而盈財帛龍巉似虎者損丁壯而耗財箱朱玄子父青白財官傍無凹借富䝿雙全鬼不愛鬼官却宜官落不宜落曜湏見曜以鬼爲鬼名爲盗氣家道伶仃子孫不庶以官作官不懼尖巒生人軒豁甲第魁元鬼不愛鬼亦不愛子父兄財星方爲得所官宜扵官亦宜財父木火二星最爲天助落而落者其勢卑弱雖有若無人家消索曜而曜者其形俊俏若是貴龍爲官清要爲禍之鬼十有五六凢有官曜盡皆爲福大富大貴裹趕分明只愛財官有氣有情貴龍無官趕者不貴無財裹者亦不貴富龍無財趕者不富無官裹者亦不富蓋富貴相連財官相衛財不見官其財不熾官不見財其官不庇時師開口門開户閉門開無屏長房凌替户閉不伏幼子乖戾堂喚明堂不宜遮閉平正有情更爲吉利周匝開鎻寬狹無計寬曠氣洩狹端情聚水口葫蘆時師咲跳不察星巒空誇華表若遇子孫陶朱寂寥筆印端嚴去水主貴倉庫逆生水去財聚砂無鶴𤓰文名士少鶴瓜不掬反成齷齪砂無牛角終成寥落牛角不開反出奸回砂無蟬翼穴情不的蟬翼壅腫生人懵懂頂愛中穿穿愛之玄不之不玄反成死繕枝遭幹尅何誇正落受尅到穴終有一絶縱有水城定多冲割時師不識貪愛鎻織尅龍鎻水反成牢獄若無赦文女童縲絏此係秘傳善悟自得右第十八章論四神星宿門内有君子自致佳賓門外少佳賓諒非賢主况門庭有寇爲禍百端鎻鑰不嚴飛灾四至捷報之案與流徒何殊哭兒之山與神童不異舞䄂之狀似離郷牢獄之形如倉庫朔南百步無聳案六十年一掃如空西東舉首見高峰千百年愁煩不了故曰午子堂開老無聊賴酉卯户閉少不軒昂登科及第定有三合火星積玉堆金湏是八方水局馬上貴人未必非探頭之賊幕中伴讀或又是宣詔之山文筆揺而老作書生玉琴瘦而四方游蕩祖宗前聳迎之吉而背之凶旦生陋劣屍虎回來文爲禍而武爲福更看勳庸龍穴俱全水火土星皆美利元辰見出子財官位定爲灾龍抱虎虎抱龍皆從水判右射左左射右盡自堂分山特來而俯伏貴壓千官水遠至而凝澄財增萬頃衆山混沌獨一位之對穴者端然萬派支流惟半鑑之當堂者沉注斷定家門富貴却難親戚榮華水窮山盡須宜陪表之賛召亂墳多惟愛跪眠之狀右第十九章論左右朝對直龍看化生之腦横龍尋落托之形既有腦氣落托自有上分下合分合之間天造地設孫不肖祖者曰素素者不產文章客子不養毋者曰漏漏者難培富貴根兄弟不論弱與强只要無衝無尅主賓不論遠與近只要相合相生僕從不論多與寡要無反主之星門户不論闊與狹要有捍門之宿山不論前後左右要合星辰而頭不見飛脚不見竄水不論來去澄流要合方位而來不見冲去不見割束氣要圓凈兩傍不要洩洩者行龍無力過峽要融煖兩傍不要散散者到穴無情寧可借停驂之主以爲客不可認憩駕之客以爲主寧可挽元神之水以爲富不可招黄泉之水以爲貴祖宗雖好隔五世六世則無功僕從雖多去五代六代則即散龍竄虎飛只要水城環抱堂寬案遠只宜龍勢高强地可催官湏用情於禄貴穴能造福必迎氣於龍神官殺同郷差毫釐而或殃或慶毬簷咫尺悮一掐而爲福爲灾星峰秩秩縱一節兩節之小庇猶爲吉地鬼劫重重雖一山一水之可取不爲佳城水愛曲不愛直直去者固凶直來者亦防衝射朝愛來不愛去去長者不吉去短者亦是支離水秀山明可靠可吞者有力山嘯水哭不聞不見者無妨龍不開屏列帳何誇粉黛烟花穴無后鬼前官空有樓臺鼓角文章蓋世不科第只因筆印糢糊子孫富貴不繁多縁是唇氊淺薄水去處石曜一卷千鈞之力箭來時巽水一勺萬鎰之情正龍之福遲而久故將門出將相門出相傍龍之福驟而短故一發如雷一敗如灰右第二十章論體槩龍穴易識眞假難知眞者多拙假者多奇眞者如眞女垂簾肅駕無傍窺雜覘之人假者如淫女暴面露頭多横覷交馳之勢眞者如法駕雖樓臺鼓角而拱手埋頭假者如浪子雖烟花粉黛而東馳西逐巒頭大而歪竄是假山也砂脚多而反抱是假砂也穴場孤曠而耳無貫賛腦無屏枕陽無唇褥陰無鬚翼是假穴也水城屈曲而方位不合衝射暗來近視悠揚遠觀遮樸是假水也眞龍中穿假龍亦中穿眞龍遮護假龍亦遮護中出無根多是幹龍之逐客遮護無裹半爲帶刼之零星大假者久而大殃小假者久而小昌勾勾搭搭十無一二眞踪閃閃藏藏萬有百千假態俗眼指稱灰線傍有子父則眞時師愛道跡絲側見官財則假右第二十一章論花假地無約束龍神碌碌約束端然富貴雙全約束之山氣象尊嚴后不爲鬼前不爲官左不爲龍右不爲虎帝都王都之約束在一百二百里之外宦家世族之約束在一十二十里之間父爲約束根基厚而世代簪纓子爲約束驟興旺而威名遠播財爲約束盈倉箱而納粟奏名官爲約東登科甲而出將入相兄爲約束勢頡頏而聯芳齊美金星約束定是獻天如釜如鍾而火星滅迹木星約束定是冲天不戟不矛而金星低避水星約束定是漲天不擺不揺而土星低回火星約束定是燄天不飛不竄而水星潜伏土星約束定是齊天不尖不瘦而水星低遯約束遇官雖詩禮而難逃訟獄約束見父敦孝友而遷徙防危約束見子多英俊而老成凋謝約速見財尚豐殖而妻宫寡阨約東見兄分門户而爭雄競勢惟一山端然傍無並峙衆星低避者則家道尊嚴而干祥萬福矣龍從左來則約束在右如竦於左龍從右來則約束在左如竦於右龍從後來則約束在前如衛於後龍到處宜有約束在龍虎數層之外者爲奇龍去處宜有約束在水口門户之内者爲妙約束出於生旺之鄕長春百嵗約束出於墓絶之所七十來稀居水口之内郊爲陪表現玄武之臂便是干城專宰大勢大形不照一山一水時師不究法眼先尋右第二十二章論約束斷福如符要知交度秘云風水無文度富不陶朱貴不三公壽不彭祖夫婦不齊眉孤寡號門户故龍不文度其名曰妬龍之妬者無百年之福穴不交度其名曰痼穴之痼者無十年之祚砂不文度名曰齷齪齷齪之砂子孫不禄水不交度名曰支離支離之水門户流移自過峽而起少祖是爲龍度如金龍不見水來護則爲子妬安望兒孫有三五水龍不見金來顧則爲父妬定無白髮盈門户金龍不見木來扶則爲財妬營營食用常難措木龍不見金來助則爲官妬文章不上青雲路金龍不見金來護則爲兄妬煢煢獨自撑門户起鬼落而至唇氈是爲穴度坐金不見木則爲財痼何誇四處有倉庫坐金不見金則爲兄痼莫羨龍神多夾輔坐金不見火則爲官痼何論色色文星助坐金不見土則爲父痼定主堂前少姑舅坐金不見水則爲子痼時有孤兒與寡婦自隨龍及門户是爲水度金穴水城水是爲子支離定知祖業難豐足金穴木城水是爲財支離终日運籌持斗斛木穴金城水是爲官支離白頭尤把文章讀金穴金城水是爲兄支離打虎䦧闇常僕僕自左青以至右白是爲水度金龍水叠叠則爲子齷齪生者頻頻育者遲水龍金揚揚則爲父齷齪異父異母不相宜金龍木汨汨則爲財齷齪散得多多聚得稀木龍金條條則爲官齷齪聲名位分常卑微金龍金焰焰則爲兄齷齪手足文齊福不齊蓋龍穴之度以表而見者爲力砂水之度以表而見者爲忌此訣在心悟非可以言傳也右第二十三章論交度地理之宗統於五行五行之柄權於生尅生固可愛亦有不愛之生尅固可僧亦有不僧之尅生之目有五一曰飛伏二曰感應三曰順逆四曰雌雄五曰眠坐立生是也獻天金生水爲飛生少陰金生水爲伏生飛生忌其促伏生忌其强促强之生家多忤逆金穴水案爲感生金穴土案爲應生感生宜於近應生宜於特不近不特富貴不獲金巒剥水爲順生金巒剥土爲逆生順生愛其秀逆生愛其簇不秀不簇英才不育左金右水爲雄生右金左水爲雌生雄生宜於俯雌生宜於仰不俯者骨肉相殘不仰者家道乖張正體生者曰坐側腦生者曰眠平面生者曰立坐而生者宜正眠而生者宜附平面生者宜平不正不附不平者初亡老哭五行之相尅其目亦有五一曰强弱二曰有無三曰愛伯四曰明暗五曰人已是也獻天之金居庚申辛酉之方而尅木星是强尅也少陰之金出丙丁巳午之方而尅木星是弱尅也强尅强弱尅弱者殺强尅弱弱尅强者降火星直射金穴而鬼托禽曜皆水星證映而無土星制水則有尅如無矣正體金龍並無火星侵擾木星簇簇孤金莫能鉗制則雖無尅而有矣有尅如無者爵位高强無尅而有者數被中傷如金星入手廉眞高妬者爲明尅磊磊火星夾逓金龍到穴者爲暗尅明尅者顯禍暗尅者陰傷隱隱金龍帶有火星壓主者曰已尅外山特聳火星並敵者曰人尅人尅者爭競郷邦已尅者骨肉參商凶星惡曜如妬主廉眞則喜見水星此爲愛尅吉星得地如金居兊位則懼見火星此爲伯尅愛尅而尅爲福不小怕尅而尅爲禍不了右第二十四章論五行生尅龍不合穴則龍不眞穴不合水則穴不正如木龍起在亥穴在卯水流未則萬福矣蓋水來處宜生宜旺水去處宜墓宜絶故曰門户不許子孫居是也水無三合其福不昌火無三合其貴不彰龍無三合其氣不增穴無三合其情不集砂無三合其勢不端富貴之地以此爲的術數家有假三合之說以談禍福者則謬矣龍之起得其方是爲天合穴之結乘其生是爲人合水乘其旺是爲地合此龍之三合也如鬼坐於玄是爲后合官竦於明是爲前合曜展於側是爲傍合此穴之三合也一不刼龍是爲來合二不悖穴是爲止合三不順水是爲去合此砂之三合也來從生養是爲源合注於官旺是爲注合去從墓絶是爲流合此水之三合也龍虎兩溶是爲耳合八字均注是爲肘合蝦鬚並𣲖是爲液合亦水之三合也如正案在午而起秀峰是爲天地合寅上有峰相應是爲日月合戌上有峰相照是爲風雲合此火之三合也一合者不竄不絶再合者不貧不賤全合者大富大貴然亦可遇不可求也大凢地有全合則峽有角顧峽有角顧則龍有祖宗龍有祖宗則穴無孤露或如泊㟁之舟橈棹俱住或如登殿之主文武齊護若夫三敗三忌之說則即與此相反耳可類推也火助文章之客故單舉火以見其餘也右第二十五章論三合别人看形我看星别人看格我看情星賛本是龍之表情脉却是龍之精金星宜何鬼落托土木二物情交錯青白朝迎無水火不融不化成頑朴金木水土穴之星窩鉗乳突穴之形凸凹高沉穴之地細將証佐論分明前看明堂與朝案後看落托與鬼撑傍看龍虎與畍水過此却論砂水清我見屏風筆架砂貼身白虎形如畫只因峽位右邊單幼房到底無聲價我見玉帶眠弓水灣廻遶抱青龍嘴只峽左邊無吉星長房遇此無祥瑞我見席㡌横琴案端嚴竦樹眞看羨子孫何故不科名保因鬼落星辰亂我見明堂萬馬容排衙唱諾人傳頌誰知唇褥不悠揚富無藏積官無俸我見水口似葫蘆之玄屈曲相回願如何家道不興隆只因龍穴無倉庫我見案上文筆插又有宜詔與天馬若還龍穴無設施何勞十載寒窗下我見錦被蓋牙床團山叠叠兒孫樣只因龍穴落幽寒伶仃子媳難興旺砂水如何爲禍災只因龍穴元神敗渾如弱主與庸君奸臣悍將威權大砂水如何福力强只因龍穴元神旺渾如聖主坐朝堂四方皆是干城將我聞龍與穴相迎我聞水與砂相稱吉水常能消惡砂好砂亦能調水病陰砂右方插過左左方水去難爲禍只恐砂去水亦去家筵頃刻多崩破右第二十六章論應騐自此章至三十章皆廣豐熊氏之論龍穴湏知有用神用神冲動事非輕叮嚀可知不可說只恐時師認未眞金龍金穴用何神生在巳兮墓在丑或用二方作向山或用二方爲入手不忌黄泉與刑墓穴要穴與龍相就亡命愛是水火宫葬期湏在丑時㬋巳丑宫中有酉藏湏用卯冲魂始受子孫如有亥未人合起冲星眞不謬金馬原居亥酉藏金禄輪來申酉冲動禄時官即至冲動馬處病難防馬在病宫宜生合禄居官位要軒昂富貴根源愛在胎維持却喜長生地設施必湏居旺方應驗便宜墓絶位勸君冲生莫冲胎冲胎却恐根原壞惟從生處一冲之維持圓活天機快勸君冲墓莫冲旺冲旺却愁設施妄惟從墓處一冲之自然應驗無遮障金貴却在寅午中貴人可合不可冲合起貴人冲動禄何愁富貴不相從請問貴人如何合金貴寅午用戌合寅午二方有吉曜戌命生人爲甚妙亡命若更是卯酉富貴重重相輻輳水火以墓絶爲貴金以爲貴水以土之衰旺爲貴土以未之墓絶爲貴也右第二十七章論用神冲合貴穴十九是變體時師俗眼何曾識第一穿變火灼金金液而流惟一線到頭遇土便安墳乳如懸膽眞金現第二穿變木趕土土星磊磊變金子窩傍帶火便尋踪必有當頭屏與几第三穿變金琢木木變鳳形雞涿粟水星一見便堪扦突微如苞爲眞木第四穿變土壅水水勢奔騰如蛇蛻金峰隱隱面前迎一穴安然如孔墜第五穿變水滅火火星撲滅如菱角尋見條條木節開水星映穴場辰尅而變者喜見父見父安墳貴富生而變者喜見財見財富貴自天來精微妙訣說不盡尅生生尅兩安排生變喜見財官尅愛喜見父子故曰兩安右第二十八章論變體作穴莫道尋龍難難於平地望高山莫道尋龍易易在高山望平地一看龍是如何起眞龍起處便有鬼二看龍是如何博眞龍博處便有托三看龍是如何伏眞龍伏處便有簇四看龍是如何行眞龍行處便有情五看情勢向何方所向之方多閃藏閃藏何處討分明後有送者前有迎送迎却在兩邊看護龍莫作眞龍斷眞龍一閃一出頭此閒却要認根苗細認金木水火土認定星辰作少祖少祖遠祖若相生便知此處勢層層得時子父財宫逐便知種有千年福行時龍生與氣東便知藏有眞堂局看了少祖却看趕財官趕處眞爲罕父母趕要來得緩子孫趕要到得滿若然不緩與不滿興隆有數難綿遠若求大富與大貴楊公只愛財官趕若還只是我趕我縱有驟福亦無禍看了龍時看鬼落鬼落看也星辰愽鬼落生龍與生穴暗中爲福眞堪賀若是龍穴生鬼落反生盗氣反爲禍我尅尅我皆不宜不若比和相負荷平洋鬼落要可枕高山鬼落要可靠不論左右與中間看他情向何邊抱看了鬼落却看穴高沉凸凹宜分别穴看氣從何處入葬乘生氣湏當記氣從耳入爲第一第二頂入第三腰化生腦下認毬簷穴情要似生芽荳上有一靨中有跡下有唇氈莫消瘦鰕鬚蟬翼兩邊挨鷄心魚泡高相照土木行龍乳突多金水行龍鈴與窩看了穴時却看裹裹處要與龍神合若還裹我兩邊財子孫腰下黄金帶若還裹我兩邊官堆金積玉福千般父母裹時子孫罕子孫裹時父母殘不如只是我裹我安居樂業無艱難看了裏時却看朝我生生我皆相投更有財官來並列門庭富貴無休歇看了朝案看門户門户不許子孫居第一父母第二財第三亦愛官星來吉人形象由人取只宜頭向内安排朱玄青白都看了砂水明堂自然好水來水去捴不拘只從方位討分曉來愛長兮不愛急去如眷戀情不走若求大富與大貴巽水源源流到口地在高山易爲術地在平地多鶻突高山跌下平洋來時時要見毛與骨却問如何認是毛不生禾稼生草茅却問如何認是骨土石一坯常竦出有毛有骨便有護護處便有星神助無風水處有風水有風水處無風水無風水處有風水十有八九容窀穸有風水處無風水尋盡世間萬無一此是尋龍一掌金眼明心巧方能述右第二十九章論尋龍總要人家富貴豈容易必有陽基與陰地陽似舟兮陰似棹論陽先要定方位胎養周正富貴根生浴開張富貴至冠帶平坦富貴清官旺軒昂富貴義衰病遮攔富貴安死處䟽納富貴易墓處藏聚富貴久吉神湏用應方位中間又要看聯絡聯絡之文多禁忌胎養長生湏間隔若無間隔不清白沐浴冠帶嫌凹突有凹有突生鶻鶟臨官帝旺宜抄插不抄不插無科甲衰旺中間莫高下一高一下常驚訝死病二方宜擁護不擁不護生嫉妬陰地陽地一般論墳屋星辰宜既濟陰地生陽與尅陽子孫富貴多軒昂陰地生陰與尅陰子孫富貴多沉吟若見陰陽同一氣子孫富貴無興替陽地富貴要根源又要維持與設施到處又要有應驗五吉俱全天地賜中間方位又相殊生養墓旺四處是縱有根源無設施聲名不到鳳凰池虎砂兜插即官罷不許腰纏萬貫歸有了設施無根源何湏苦向仕途鑚龍頭拱出席㡌様奏名納粟可求官有了根源有設施登科奪得錦衣歸如何不繫黄金帶湏知墓下無維持維持設施俱各有根源得位科多首如何位不到三公應驗須知無輻輳亥上有吉蔭子人離宫有吉午人受登山從此細推詳胷中星斗神仙授右第三十章論宅墓總要完孝録一卷終
