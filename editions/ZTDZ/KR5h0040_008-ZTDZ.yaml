body:
  text: 安葬簡儀小引治棺治葬開塋域祠后土祝文穿壙作灰隔和灰沙刻誌石乃窆又祀后土祝文藏眀器下誌石題主題主式祝文神主升車成墻立小石碑附録文公父壙記目録終儒門崇理折衷堪輿完孝録卷之八安葬簡儀小引嘗聞君子不以天下儉其親葬親豈可不從厚然陰地僅一線乃造化妙機也令之世宦大家徃徃肆其美麗以燿生者之觀甚至於鑿損造化之眞氣於都惜哉今考先賢造葬格言數條於後俾仁人孝子或可適從云治棺朱子曰油杉爲上栢木次之土杉又次之其制方直頭大足小僅取容身勿令高大及爲虚簷高足内外皆爲灰漆底佈炭屑一二寸加七星板其上其於秫米油灰瀝青一名松脂一名松香亦曰松糖又名雲香釘嬛則恐未然其于以下非朱子意胡氏泳曰彭止堂作訓蒙云灌以松脂宜於北方江南用之適爲蟻房而釘嬛亦能引水其木易爲腐朽耳彭必有考更詳之劉氏璋曰凡送死之道惟棺與椁爲親身之物孝子所宜盡心者臨喪之日擇木爲棺恐倉卒未得其木灰漆亦未能堅完或值暑月尸難久留古者國君即位而爲椑槨預嵗一漆之令人亦有生時自爲壽器者此乃猶行其道非豫㐫事也其木油杉及栢爲上毋使高大以圖觀美惟棺周於身椁周於棺足矣棺内外皆用布裹漆務堅實按棺中七星板用板一其長廣棺中可容者鑿爲七孔治葬朱子曰三月而葬前期擇地之可葬者程子曰卜其宅兆卜其地之美惡也非陰陽家所謂禍福者也地之美者則神靈安其子孫盛若培壅其根而枝葉茂理固然也地之惡者則反是然則曷謂地之美者土色之光潤草木之茂盛乃其驗也父祖子孫同氣彼安則此安彼危則此危亦其理也而拘忌者惑以擇地之方位决日之吉凶不亦泥乎甚者不以奉先爲計而專以利後爲慮尤非孝子安厝之用心也惟五患者不得不謹湏使他日不爲道路不爲城郭不爲溝池不爲貴勢所奪不爲耕黎所及也一本云所謂五患者溝渠道路避村落遠井窑丘文莊公曰風水之說其希覬大富貴之說雖不可信若夫乘生氣以安祖考之遺體蓋有合於伊川本根枝葉之論先儒徃徃取之文公先生與蔡季通預卜藏穴門人裹糗行紼六日始至蓋亦愼擇也昔朱子論擇地謂必先論其主勢之强弱風氣之聚散水土之淺深穴道之偏正力量之全否然後可以較其地之美惡後之擇葬地者誠本朱子是說而參以伊川光潤茂盛之驗及五患之防庶得矣擇日開塋域家禮主人帥執事者於所得地掘穴四隅外其壤掘中南其壤各立一標當南門立兩標四隅外其壤出其土壤於外也掘中南其壤出其土壤於南也祠后土家禮曰祀以后土恐其僣竊也擇遠親或賓客一人吉服冠素告后土氏祝帥執事者設位於中標之左南向設盞注酒列脯醢於其前又設盥盆浴巾二於其東西其東告者所盥其西執事者所盥也儀節就位告者立北向執事者二人在其后鞠躬拜興拜興平身告者與執事者皆超盥洗告者與執事者俱洗詣香案前告者至案前跪告者乃跪上香斟酒執事者一人執酒注西向跪一人執盞東向跪告者取注斟酒于盞畢反注取盞酹酒傾酒于地獻酒復酌酒署神位前俯伏興少退之讀祝執祝板跪于告者之左而讀之焚祝文和楮錢同焚之鞠躬拜興拜興平身禮畢祝文維幾年歳次干支幾月干支朔越幾日干支某官某姓敢昭告于本山土地之神今爲父則云某官姓名母則云某封某氏營建宅兆于本山某士名某山某向神其保佑俾無後艱謹以清酌脯醢祗蔫於神尚饗按古禮無所謂后土氏者惟唐開元禮有之温公書儀本開元禮家禮本書儀喪禮開塋域及窆與墓祭俱祀后土然后土之稱對皇天也惟國家得稱士庶之家有似乎僣考之文公大全集有祀土地祭文今擬改后土氏爲土地之神徹出乃穿壙徹去祭儀臺案等物也穿壙司馬温公曰今人葬有二法有穿地直下爲壙而懸柩以窆者有鑿隧道旁穿土室攛柩於其中者按古者惟天子得爲隧道其他直下爲壙而懸棺以窆今當以此爲法其穿地宜狹而深狹則不崩損深則盗難近也按深葬防盗固先正之確論但地理家又有淺深得乘風水自成之說謂龍脉有浮沉水土有厚薄如朱子謂漳泉間棺只入地一半上面用土培封稍深則有水若此者又難一律深葬且宋以前壙中多藏金寳故致盗寇劫塚之患國朝制禮不許用金寳殉葬自無盗寇之虞蓋不用金寳極有禮昊下人雖化者衣裝必預剪壞亦防盗之意然欲厚於親在擇吉地以安之豈必金寳爲厚哉不惟不能厚其親反致刼塚之禍愚亦甚矣作灰隔穿壙既畢先布炭末於壙底築實厚二三寸然後布石灰細沙黄土拌勾者於其上灰三分二者各一可也築實厚二三尺别用薄板爲灰隔如椁之狀中取容棺墻高於棺四寸許置於灰上乃以四旁旋下四物亦以薄板隔之炭末居外三物居内如底之厚築之既實則旋抽其板近上復下炭灰等而築之及墻之平而止炭禦木根辟水蟻石灰得沙而實得土而黏歲久結而爲全石螻蟻盗賊皆不得進也程子曰古人之葬欲比化者無使土親膚今奇玩之物尚保藏固密以防損污况親之遺骨當何如哉世俗淺識惟欲不見而已又有采速化之說者是豈知必誠必信之義且非欲求其不化也未化密閉保藏當如是耳槨外實灰沙沿壙炭屑朱子答廖子晦曰所問葬法後來講究木槨瀝青似亦無益但於穴底先鋪炭屑築之厚二寸許下與先所鋪者相接築之既平然後安槨於其四傍謂沿槨也又下三物如前按槨本不必用即欲用之亦惟木槨或磚槨爲佳切不可用石槨蓋石能生水只觀天將雨而礎潤即可見矣且石槨重甚年數深遠設若傾頽安知其不壓於骨骸之上尤爲可畏故不用之爲愈也槨内亦實灰沙槨底及棺四傍謂槨内槨外上面皆以沙灰實之俟滿加蓋復布沙灰而加炭屑於其上亦厚寸許然後以土築之盈坎而止蓋沙灰以隔螻蟻愈厚愈佳或問棺外可用灰雜沙土否朱子曰只純用炭末置之槨外槨内實以和沙石灰或曰可純用灰否曰純灰恐不實湏雜以篩過細沙久之灰沙相雜入其堅如石槨外四圍上下一切實以炭末約厚七八寸許既辟濕氣免水患又截𣗳根不入𣗳根遇炭皆生轉去以此見炭灰之妙蓋炭是死物無情故𣗳根不入也抱朴子曰炭入地千年不變禮壙中用生體之屬久之必潰爛却引螻蟻非所以爲亡者慮久遠也古人壙中置物甚多以某觀之禮文之意大備則防患之意反不足要之只當防慮久遠毋使土親膚而已其他禮文皆可畧也頃嘗見藉溪先王說嘗見用灰葬者後因遷葬則見灰已化爲石矣炭屑則以隔木根之自外至者亦里人改葬所親見故湏令常任沙灰之外四面周圍皆無縫罅然後可以爲固已上三條皆朱子語石灰三分黄土細沙各一分篩半勾以淡酒洒造噴壺洒之築之按今俗用糯米粉煑粥以拌入三合土内却亦能使三物膠固用之可也刻誌石用石二片其一爲蓋刻云某官某人之墓無官則書其字曰某君某甫其一爲底刻曰某官諱某字某某州某縣人考諱某毋某氏封某某年月日生叙歷官遷次某年月日絡葬于某郷某里某山向娶某氏某人之女子男某官女適某官某人孫男幾人某官某孫女幾某某婦人夫在則蓋書某官姓名封某氏之墓無封則云夫之姓名夫亡則云某君某甫妻某氏其底叙生年日月死年月日因夫子致封號無則否葬之日以二石字面相向而鐵索束之埋之壙前近地面三四尺間蓋慮其時陵谷變遷或悞爲人所動而此石先見則人有知其姓名者庶能爲掩之也按閩俗安此石於壙内棺首者殊非宜浙俗安壙前是終不若安壙前近地面三四尺間爲當矣乃窆窆下棺也先用木杠於灰隔之上乃用索四條穿柩底環不結而下之至杠上則抽索去之别摺細布或生絹兜柩底而下之更不抽出但截其餘棄之若柩無環即用索兜柩底兩頭放下至杠上乃去索用布如前法大抵下棺之時須審用力不可悞有傾墜揺動主人兄弟宜輟哭親臨視之已下再整柩衣銘旌令平正或問若柩無環恐索難出當如此法柩既有環何不就索徑下却至杠上又去索換布絹何也曰想亦恐索難出也今人兩頭齊用活套索放下者亦甚穩當從俗用之亦可壙内四角各用磚以架柩蓋亦可以抽去下柩索耳加灰隔内外蓋先度灰隔大小製薄板一片旁距四墻取令脗合至是加於柩上更以油灰彌之乃加外蓋按此原本用瀝青溶灌於其上約厚三寸許然後始加外蓋令去瀝青用石板亦不可外蓋之上今俗有用磁碗盛糯米粥和石灰以鋪數層亦牢固用之可也實以灰三合灰拌匀居上炭屑又居上各倍於底及槨外槨内四旁上面之厚以酒洒而躡實之恐震動柩中故不敢築但多用之以俟其實爾乃實土而築之下土每尺許即輕手築之勿令震動柩中祀后土神於墓左祝文維某年月朔日具位同前敢昭告於本山土地之神令爲某官某人封謚窆兹幽宅神其保佑俾無後艱敬以清酌脯醢祗爲於神尚饗復位告者再拜徹出按劉氏璋曰爲父毋形體在此故禮其神以安之藏眀器等實土及半乃藏明器下帳苞筲甖於便房按明器乃刻木爲車馬僕從侍女各執奉養之物如巾帕茵褥等物象平生而小准令五品六品三十事七品八品二十事非陞朝官十五事庶人十事帳謂牀帳茵蓆椅卓之類亦象平生而小苞竹掩一以盛遺奠餘脯按儀禮注苞覃也古稱苞苴是也曲禮註苞者包裹魚肉之屬苴者以此藉器而貯物也筲竹器五以盛五穀司馬温公曰今但以小甕貯五穀各五升可也劉氏璋曰既夕禮筲三容與簋同盛黍稷麥其實皆瀹注云皆湛之以湯神之所享不用食道所以爲敬按儀禮註筲藉通飮器容與簋同論語註筲竹器容斗二升甖磁器三以盛酒醯醢按此數物俗又謂之倉庫今亦不用閩中用二磁瓶一盛五穀曰倉一盛銅錢或紙錢曰庫吾郷皆不用張說曰墓中不置甕瓶以其近於水也不置羽毛以其近於尸也不置黄金以其久而爲恠也不置丹朱雄黄礬石以其近烈而燥使土枯而不滋也古人納明器於墓此物久而致蟲必矣如必欲用之則莫若於壙旁别爲坎以瘞之也司馬温公曰自明器以下俟實土及半乃於其旁穿便房以貯之以板塞其門劉氏曰或間明器之義曰檀弓註云謂以禮送死者以死者之禮待之是無愛親之心爲不仁不可行也以生者之禮待之是無燭理之明爲不智亦不可行也故備物而不可用也其謂之明器者蓋以神明之道待之也或問穿便房恐虚壙中引水不便欲貯埋墓誌處如何曰此雖古人不忍死其親之意然實非有用之物且脯肉腐敗生蟲聚蟻尤爲非便不可用也惟埋明器矣按穿便房以埋眀器以閩俗之木刻金難玉犬栢人土地等物不無有泄地脉且引水生蟲無益化者不若皆不用爲是若孝子必欲遵禮用之亦不必事雕刻而但用紙糊裱楮爲之乃於窆完工畢之際謝土告墓之時對墳燒化如焚楮錢之義庶亦就便焉謹以告仁孝君子幸察焉下誌石墓在平地則於墓道南先布磚一重置石其上又以磚四圍之而覆其上者墓在山側峻處則於壙南數尺間掘地深四五尺依法埋之復實以上而堅築之下土亦以尺許爲準但須密杵堅築按俗有用磚捲鄲者鄲必高大空虚久則傾䧟甚非所宜只多用三合土而堅築之可也題主執事者設卓子於靈座前左向右置硯筆墨更置盥盆帨巾儀節主人向卓子前立盥洗祝及題主者俱洗出主祝開箱出木主卧置卓子上題主盥手畢向右立題主䧟中字須先令他人書完只留粉面上神主之主字勿加點只作王字今題主者加一點于上即成主字謂之題主祝奉主置靈座置畢收魂帛乃藏魂帛於箱中置主后祝焚香斟酒跪主人以下皆跪讀祝祝讀畢不焚興復位鞠躬拜興拜興拜興拜興平身謝題主者主人再拜題主者苔拜按神主䧟中字何以先令他人預書而點主者至是但於其粉面書主字之一點而已曰點主者多是有位之尊者及年高之老者臨時書字恐有不便故爾此亦從權處耳諸儒家禮未嘗言此題主式䧟中父則曰明故某官某公諱某字某行幾神主母則曰明故某封某氏諱某行幾神主粉面父則曰顯考某官封謚府君神主母則曰顯妣某封某氏神主其下左旁皆書曰孝子某奉祀無官則以主所稱爲號如父曰顯考處士府君神主祝文維年嵗次月朔日辰孤子某敢昭告於某官封謚府君形歸窀穸神返室堂神主既成伏惟尊靈含舊從新是憑是依母則改孤子爲哀子窀穸左傳襄十三年楚共王疫病告諸大夫曰獲保首領以擊地藏是春秋窀穸之事注窀張倫切厚也穸音夕夜也蓋厚夜猶長夜謂葬埋也祝奉神主升車魂帛箱在其後令俗主人自抱神主於懷乘轎而返蓋欲使神魄相依也亦有理執事者徹靈座遂行主人以下男左女右重服在前輕服在後出墓尊長乘車馬去墓百步之許卑幼亦乘車馬水則乘船但留子弟一人監視實上以至成墓或問窆後乃題主孝子奉主而歸委其封土成墓之事扵他人何也荅曰事死如事生今遺魄用葬扵土而神魂則附於主矣故孝子亟於奉主以安神魂至封土成墓委之期親子弟或門人耳昔孔子值葬時封委之門人時大雨防墓崩子貢後歸以告孔子孔子泫然淚下責其門人曰古者不脩墓夫所謂不脩墓者乃當時築造牢固堅實不俟於脩耳豈有崩而不脩哉今人三日後復山之說正因此也成墻墳高四尺檀弓孔子既合葬於防曰吾聞之古者墓而不墳今丘也東西南北之人也不可以弗識也於是封之崇四尺今按孔子防墓之封其崇四尺故取以爲法立小石碑於其前亦高四尺趺高尺許司馬温公曰按今式墳碑石獸大小多寡雖各有品數然葬者當爲無窮之規後世見此等物安知其中不多藏金玉耶是皆無益於亡者而又有害故令式又有貴得同賤賤不得同貴之義然則不若不用之爲愈也按温公說别立小碑白石徑闊尺以上其後居三之二圭首而刻其面如誌之蓋乃略述其世系名字行實而刻於其左轉及後右而周焉婦人則俟夫葬乃立面如夫亡誌蓋之刻云國朝稽古定制塋地一品九十步每品减十步七品以下不得過三十步庶民止於九步墳一品高一丈八尺每品减二尺七品以下不得過六尺其石碑一品螭首二品麒麟三品天禄辟邪皆用龜趺四品至七品皆圓首方趺其石人石獸長短闊狹以次减降其石人石獸望柱皆有次第着在令甲可考也貴得同賤賤雖富不得同貴慮遠者於所當得縱不能盡去少加减殺可也司馬温公曰古人有大勳德勒名鍾鼎藏之宗廟其葬則有豐碑以下棺耳秦漢以來始命文士褒賛功德刻之於石亦謂之碑降及南朝後亦銘誌埋之墓中使其人某大賢耶則名聞昭顯來世稱頌流播絡古不可掩蔽豈待碑銘始爲人知其人不賢耶雖以巧言麗辭强加采飾功侔吕望德比仲尼徒取議誚其誰肯信碑雖立於墓道人猶得見知乃藏於壙中自非開發莫之睹也隋文帝子方四歲薨時僚請立碑帝曰欲求名一卷史書足矣何用碑爲徒與人作鎭石耳此實語也今既不能免依其誌文但可直叙鄕里世家官籍始終而已季札墓前有石世稱孔子所篆云鳴呼有昊延陵季子之墓豈在多言然後人知其賢也今但刻姓名於墓前人自知之耳附録文公父壙記先府君諱松字喬年姓朱氏徽州婺源人曾祖諱振祖諱詢妣皆汪先考諱森妣程氏三世皆不仕考妣以府君故贈承仕郎儒人府君生於紹聖四年閏二月戊申性至孝有高志大節落筆語輒驚人政和八年以同上舍出身授迪功郞建州政和縣尉承仕公卒貪不能歸因葬其邑而游宦徃來閩中始從龜山楊氏門人爲大學中庸之學調南劔州尤溪縣尉監泉州石井鎭稅循左從政郎紹興四年召試除秘書省正字丁内艱服除召對改宣教郞遷著作佐郎尚書度貟外郎兼史館校勘歷司勳吏部兩曹皆領史職如故以史勞轉奏議郞以年勞轉承議郎丞相趙忠簡公張忠獻公皆稱知府君未及用而去秦檜以是忌之而府君又方率同列極論和戎不便檜益怒也府君知饒州未赴請問差主管台州崇道觀以十三年三月辛亥卒建州城南之寓舍年四十有七所爲文有韋齋集十二卷娶同郡祝氏處士確之女封孺人後二十七年卒男熹嘗爲左迪功郎差充樞密院編脩女嫁右迪功郎長汀縣主簿劉子翔孫男塾埜在女巽兊皆幼初府君將没欲葬崇安之五夫卒之明年遂窆其里靈梵院側時熹幼未更事卜地不許既懼體魄之不獲其安乃以乾道六年八月五日遷於里之白水鵝子峰下熹攀慕號殞痛貫心骨重惟先君既不得信其志以没而熹又無所肖似不能有以顯揚萬分敢次叙姓系官閱志業梗槩刻而掩諸幽且將請作文者以表其隧昊天罔極嗚呼痛哉
