body:
  text: 五星命略引宫分所屬度數所屬度數所在太陽行度太陰行度晨昏度論星曜行度安命度法十二宫命定限度法年分訣行度訣衛命宫度魯命宫度趙命宫度晋命宫度泰命宫度周命宫度楚命宫度鄭宋命宫度燕命宫度吳命宫度齊命宫度量天尺看法目録終儒門崇理折衷堪輿完孝録卷之七五星命略引堪輿造命即五星推命也五星推命只重星曜吉凶以定禍福堪輿造命亦究星曜吉凶以决趨避特星家兼重財宫造命不重財官星家遇卯安身命造命以所用之時安身命此其小異耳然星家之理亦不可不知因輯其略宫分所屬寶瓶齊青位磨竭越揚州人馬燕幽地天蝎宋豫求天科鄭兖分雙女楚荆丘三河周獅子巨蟹秦雍留益魏陰陽位趙翼是金牛白羊魯徐郡雙魚衛豳收度數所屬木蛟十二金龍九度土貉十六日兔五屬六宿心月狐十八火虎水豹九兮草四木獬金牛亦六十數土蝠九度日鼠月燕十五火猪十七水㺄九兮十七木狼婁金狗十二土雉十五昴日雞十止十六月烏火猴借半水猿數九水犴三十二度金牛十二柳土漳日馬六度月鹿十六火蛇十九水蚓十七度數所在初總在二存三在位四牛宫真二同在十三度宫行兮都在二宫親四同躔七井在九俱在四午位迎十五兮十還歸在於太陽行度立春一起雨水七求驚蟄室六度春分璧三遊清明奎九下穀雨婁六留立夏胃八邊小滿昴八收芒種畢十一夏至參九頭小暑井十三大暑井草九立秋柳十度處暑張五有白露翼二立秋分翼十七寒露軫十三霜降角十及立冬氐二行小雪房二至大雪尾六臨冬至箕四逼小寒斗十連大寒牛二直太陰行度欲識太陰行度時正月之節起於危每日常行十三度三日兩宫次第移二奎三胃四從畢五井六柳張居七八月翼宿以為初龍角秋季任游歷十月房宿作元辰建子箕子細尋覓丑月牽牛切要知周天之度無差忒晨昏度論昏度者酉宫也凡初一至十五六日生皆從酉上起每一時挨一度酉戌亥三時順數申未午巳辰卯寅丑子九時逆數晨度者卯宫也凡十五六至三十日生皆從卯宫起每一時挨一度卯辰巳午未申酉戌亥九時順數寅丑子三時逆數初一至初四月行最疾一晝夜行十四度有餘初五至初八月行平一晝夜行十三度有餘初九至十九月行遲一晝夜行十二度有餘二十至草三月行小疾一晝夜行十三度有餘草四至三十月行大疾一晝夜行十四度有餘星曜行度太陽一日行一度一月行一宫一年行一周天太陰一日行十三度兩日半行一宫一月行一周天嵗星順或五日行一度一年一宫十二年一周天熒惑順或日半行一度兩月一宫二年行一周天鎮星順或十日行一度二十八月行一宫二十八年一周天太白順或一日行一度一月一宫一年一周天辰星順或一日行一度一月一宫一年一周天紫氣二十九日行一度二十九月一宫二十九年一周天月孛九日行一度九個月一宫九年一周天羅㬋十八日行一度十八月一宫十八年一周天計都十八日行一度十八月一宫十八年一周天已上日月木火土金水氣孛九星順行度逆行宫也惟羅計二星順行宫逆行度也凡木火土金水才有遲留伏逆晨夕次見之論於中太陰躔度有朔後行昏度望後行晨度宜仔細推詳安命度法月為身星又月躔某度即身之度主也以生時加太陽宫順數遇卯即是命宫也如太陽在子宫酉時生人以酉時加在子宫順數到午遇卯即是命宫也蓋日出在卯故以卯為命宫以太陽之度對著命宫之度即是命度也如太陽躔子宫虛六度對著午宫星五度即為命度如曰躔女三度對著午宫柳四度是也餘同此例十二宫命宫財帛兄弟田宅男女奴僕妻妾疾厄遷移官祿福德相貌凡定十二宫者逆數輪轉如命宫在寅財帛在巳兄弟在子田宅在亥男女在戌奴僕在酉妻妾在申疾厄在未餘同此定限度法以命度在某宫第幾行則知某歲行限也如命躔星五度在星盤中午宫第五行上則是十五歲行限如命躔三四五度下則是十一嵗行限如命躔張十一十二十三度則是二十嵗行限矣大抵行限早以十一嵗起行限遲即二十嵗止以星盤度數數上起限更便以量天尺尤難年分訣命宮十五貌宮十福德妻宮十一詳官祿十五最高位移止有八年糧疾厄七兮共六六財帛兄弟五年强田宅子孫并奴僕四年之半定毫芒行度訣命宫行度隨淺深相貌一年三度立官祿一年兩度通移三載共一十疾厄一年四度强三年之上同加一福德妻妾三度移三年减一為端的奴僕男女并田宅一年七度三减一財帛兄弟各五年一年六度行不失但能依此論行年分明嵗嵗知凶吉己上限度年分之法但照前例惟命宫十五年者乃古之法則不可拘執此例如十一嵗起限者命官止官十年或零三度以三年餘行一度也如二十歲起限者命官又管十九年約有二十六七度以一年半行一度也其餘倣此椎之卯辰巳午未申酉戊夾子丑寅室十三婁初昴三參四井草二生六四十十三角房初箕初斗大八十四一四五草四張初十四八一一十九九十五二五六草五一十五九二二十危初十六二十六十二命一十七三六七草六三十七十一三三草一二十八四七八草七四十八十二四草二三𤩹初五八井初草八五十九亢初五四牛初四二六九草九六畢初一心初五一五三八十一三十七一二一六二六四九畢初二鬼初八二三二七三七五十一三一九三四三八八六十一二四一十四五四九四九七十二三五柳初十一五六五斗初五十一八胃初四六一十二六七尾初一六十一九一五七二十三七八一二女柳十三奎初十四二六八十一三大四十四八九七氏初二三五一衛十四十三一九三十八七五四九二五十五五十四一二三三五六退九二二十四二九四