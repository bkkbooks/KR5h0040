body:
  text: 右第三十一章論選期正式易曰至哉坤元萬物資生乃順承天觀此則知地中生氣乘天而時行也是故為春為夏天時鼓萬物之出機也地氣則隨之以出而敷其生長之功為秋為冬天時鼓萬物之入機也地氣則隨之以入而斂其收藏之化易曰地道無成而代有終此之謂也彼龍穴砂水生氣之行於地者也年月日時生氣之運于天者也得乎地而不得乎天即春夏而欲其收藏秋冬而欲其生長必不淂之數也俯察於地者可不仰觀於天以全其陰陽並運之正理哉但格局不可以預設變化不可以先啚須臨時詳山川氣運之盛衰以行其補助尅泄之法可也是豈通書中死局所能拘耶或問孟子曰天時不如地利地利不如人和則天時之不足尚也明矣况古者天子七月而葬諸侯五月而葬大夫三月而葬士踰月而葬若拘時日此制不行所以術人有得地即葬不論時日之說吁不然也孟子因當時諸侯皆不得人和故較其輕重以曉之非謂天時地利可盡廢也否則王者治曆明時鑿池築池何為者也古者天子七月而葬待諸侯至諸侯五月而葬待同盟至大夫三月而葬待同朝至士踰月而葬待六親至此雖王者定制若葬之吉凶何嘗不擇但拘通書選擇則此吉而彼又凶亡者利而生者又不利踰數十年無葬期矣以七政選擇止避三殺太歲乘旺所以年年月月可葬天時王制兩不相悖矣彼術人謂得地即葬不拘時日者此固中心無主抑亦急於求利之心使之歟智者不可不察右第三十二章論天時凡造命之法皆以日干為主月為提綱年為基本時為結果排下八字看其合何格局然後用之倘不命局又宜更擇他局比星家不同蓋星家所談之命由乎天無可變之理選擇所造之命由乎人可擇其善者而從之吾慨世之造命者或重坐向或重亡命或重察主或堅造重作主皆非也蓋人之生也以落地為命元命元純粹必然一世榮昌人之死也以入地為命元命元旺相自然宗祀長遠此理之不可誣者若坐向定於開闢之初生命定於降生之始亡命則既已有死日在前矣此不過避其對冲而已以此數者為重命曷以造是以善造命者須擇上格八字審氣推星二者兼盡方成全局蓋氣之盛衰禍福之基也此為極重星辰之顯晦禍福之柄也亦不可輕故必木取木為主火取火為主土取土為主金取金為主水取水為主四柱務合中和吉星宜坐實得時凶星宜落陷逢空然後可用否得龍氣有過不及之患而星辰又不合度雖合富貴極之格何益哉右第三十三章論造命選擇造命之法須先定格局而格局則有日月對照格有日月合照格有三方拱照格四正拱照格有支干夾照格有貼身夾照格有帝星夾宫格有帝星到山格三吉同照格格雖多端必以太陽太陰為主乃上格也日月對照格多在望日日月合照格多在朔日日月三方拱照格多在初十二十日日月四正拱照格亦在望日支干夾照格多在初五六草五六貼身夾照格多在初二三草八九若本日合淂一格則山山皆可作用惟用時不同耳如卯時上四刻合格可作子山午向則下四刻可作癸山丁向辰時上四刻即可作丑山未向辰時下四刻即可作艮山坤向隨時順行草四山山山倣此止有三殺乘旺之山併太歲所占之山皆不可犯若帝星合太陽諸式又止有卯時可用餘時皆不合朔日要防日食望日要防月食若未食之先復明之後亦不深忌外有二德拱照官福拱照田財拱照文書文魁拱照科名科甲拱照諸格皆貴但不若太陽為主者之尤愈也雖然此不過匠者之規矩射者之彀率而已矣至若運規矩以方圓執彀率以中鵠者則存乎其人耳詳觀圖式于后右第三十四章論格局選擇之法以造命為重而造命之訣以立身立命為重蓋太陽猶父人受氣於父而命生焉故立命當查太陽所躔之度為命度太陰猶母人成形於母而身生焉故立身當查太陰所躔之宫為身宫今星家以生時加太陽數至卯上安命者固非也以本日太陰到處即指其為身者亦非也蓋太陽本是左旋每一時行一宫足故冬至前後太陽出在辰時則辰上起太陽順數至所用之時即是命宫夏至前後太陽出在寅時則從寅上起太陽順數至所用之時即是命宫餘時太陽出在卯時當從卯時上起太陽順數至所用之時即是命宫此安命之定式也太陰亦左旋一時行一宫弱故當查太陰何時到何度即就本度上順數本時起數到所用之時即是身宫餘倣此此安身之定式也但太陰有晨昏之度而晨昏之中又有漸次不同如秋分起至次年春秋止晨度皆在卯其實止有十六十七十八在卯十九二十在辰草一草二草三又在巳草四草五又在午草六七八又在未草九三十又在申白露起至次年清明止昏度皆在酉其實止有初一初二初三在酉初四五即在戌初六七八又在亥初九十又在子十一十二十三又在丑十四十五又在寅自穀雨起至秋分止昏度皆在戌又當自戌上順數起自情明起至白露止昏度皆在寅又當自寅上數起太陽一日一周今人逢卯安命太陽寧有時時在卯之理乎太陰亦一日一周特不及日十二度而已今人即以本日太陰到處安身太陰寧有時時皆在一宫之理乎此理甚明但智者不加察耳此所以推星者多不驗而造命者胥失真也歟右第三十五章論身命凡選擇家審氣之法定要看大勢龍從何來到頭胍從何止如大勢龍從南來到頭翻身結喉坐西此則當補到頭之脉以為大勢財局若補大勢之龍則到頭受尅其禍甚速餘倣此又或大勢龍從東來到頭結喉坐北此則當補到頭之脉以為大勢之生氣若補大勢之龍必泄到頭之氣其泠退之患必不旋踵若泄之太過必主傷人餘放此又有大勢龍從北來到頭結喉坐東此則但當補大勢龍以為到頭之生氣若補到頭之脉必泄大勢之氣暫時雖不見祻而衰敗之患胎于此矣餘倣此今術人止以到頭一節氣胎為主者不過欺人于一時而已其如後患何凡觀大勢皆以本龍出脉為主而中間之曲折不拘也凡觀到頭必以穴後一節為主而此後亦不拘也雖然五氣迭居本無定在使其得中和之龍居之歟則作福必大雖坐山之尅泄無妨或者以過不及之龍居之歟則其作禍亦大縱使坐山生旺何益所以古人有實乘虛坐之論亦以龍神為主而坐山之陰陽五行不盡拘也止要取得吉星到坐或到向到三方或到四正或到拱夾之宫皆吉至于凶星止避其乘旺而已凶星衰弱亦不忌裁酌存乎其人耳右第三十六章論審氣凡推星之法必以七政臺曆為主皆在山何方隅上用之如太陽太陰帝星恩星皆至吉之神也令星用星福星行吉之神也歲德天德月德月合與夫貴人馬田財宫福文昌文魁科名科甲等星皆助吉之神也或到山或到向或在三合或在四正或在得時有用之宫或在左右夾拱之宫皆吉兆也至若仇星難星三殺太殺太歲等神皆當避之使其乘旺得地為禍亦大衰陷空亡不忌蓋吉則趨之凶則避之此選擇之要法也况天垂象見吉凶正在七政止考之推星之法詎可缺歟右第三十七章論推星嘗聞太極生陰陽陰陽生五行五行變化而萬物之生成備焉此造化之定理亘萬古而不易者也其在天也則見於日月星辰而五行順布其在於地也則見於山川動植而五氣流行其在人也則健順成德而五性五倫出焉混闢之初天也乃泄於河圖洛書以發聖人之神智蓋使之闡明陰陽五行之體而示斯民以趨吉避凶之途也觀圖以五十居中書以五居中即太極之象也圖書皆奇數二十偶數二十即陰陽之數也圖以一六居北屬水二七居南屬火三八居東屬木四九居西屬金五十居中屬土而寄旺於四隅以洛書易位之後觀之其生胸之數亦與河圖相為經緯故上自三皇下及百王凡治曆明時悉本于此令之曆家因之始足以推步天文醫家因之始足以推究氣㬋星家因之始足以推人之壽夭窮通况乎地理又所以承天時行而為斯民福蔭之基也又可悖造化之正埋而從怪誕之說乎惜乎吕才作洪範五行已非正埋而淨陰淨陽之說尤為悖理之甚不知二五本原固如是乎奈一人作俑于前後世術家踵而蹈之以網一時之利遂貽天下之害斯民固罹其害而不知術人啚獲其利而弗顧不亦深可痛哉惟我太祖高皇帝龍飛淮甸闢乾坤于再造覺顓蒙于述途猶慮通書數十種胥為民害於是洪武九年益禁僞造盡燬僞書復令監官訂正選擇曆書頒行天下垂法後世皆所以明陰陽之正傳開示趨吉避凶之玄鑑也故述其略云右第三十八章論二五觀河圖奇偶之數則知陰陽五行之原其一生一成各得自然之妙皆天地化育之精華發泄之以示人者也如天一生水地六成之居北方亥子之位故自亥宫奎一度起至子宫危七度止皆屬陰水自子宫中危六度起至丑中斗二十二度止皆屬陽水地二生火天七成之居南方巳午之位故自巳宫軫九度起至午中張九度止皆屬陰火自午中張八度起至未中井二十七度止皆屬陽火天三生木地八成之居東方寅卯之位故自寅宫斗三度起至卯中心三度止皆屬陽木自卯中心二度起至辰中角十一度止皆屬陰木地四生金天九成之居西方申酉之位故自申宫井八度起至酉中畢一度止皆屬陽金自酉中畢初度起至戌中婁四度止皆屬陰金天五生土地十成之雖居中宫而其氣寄旺於四隅故自辰未十八度併戌末十八度皆屬陽土自丑末十八度併未末十八度皆屬陰土周天三百六十五度零四分度之一五行各得七十二度有奇此皆自然之數一定而不可易者也十二天于皆界於地支之兩間雖居其位而不變其所屬如乾在戌亥之間右邊七度半在戌即以陽土論左邊七度半在亥即以陰水論壬界於亥子之間右邊七度半在亥即以陰水論左邊七度半在子即以陽水論餘倣此他如前輩之言八卦初不過明天氣之流行耳亦未嘗以八卦而變易地支之陰陽五行也蓋古之羅經只有十二地支準河圖一定之數也後世添八十二天干只是湊成二十四位以應一年二十四氣也即以天干而變易地支之陰陽五行固非也八卦只是驗天氣之運行而已即以八卦只變易地支之陰陽五行亦非也末世不悟此機而設為天星卦例之謬者固感世之大蠧而學者亦不加察而信從之且牽合互會聖為邦說以亂真者彼蓋不知陰陽五行之理乃天地造化自然之妙機非人智力所能損益者也右第三十九章論山向二五日月同躔謂之朔對躔謂之望月光平分謂之弦月光既盡謂之晦五星遇日則伏三合則留近日則疾遠日則遲遲甚而留留久而退退久而順行太陽怕羅㬋太陰怕計都木怕金旺火怕水旺土怕木旺金怕火旺水怕土旺太陽喜晝太陰喜夜旺木喜金旺大喜水旺土喜木旺金喜火旺水喜土水弱愛金金弱愛土土弱愛火火弱愛木木弱愛水水衰不生木木衰不生火火衰不生土土衰不生金金衰不生水春土不尅水夏金不尅木季水不尅火秋木不尅土冬火不尅金此皆七政之要法也學者不可不知右第四十章論七政經星之列於天者有二十八宿共三百六十五度零四分度之一雖有升沉實無轉移天運左旋一日一周而又過一度日月五星氣孛皆順天左旋惟計羅二星乃是右轉此儒者之言萬世不易雖革象新書亦言之詳矣但曆家因其不便推算遂云天左旋日月五星皆右轉凡二十宫行度次序皆自左數至右取其推步之捷乃作曆之法也今欲選擇吉期宜從前說方始時刻不差凡者七政行度定須自右順行轉左惟羅計以逆行推之如女二在子女一過丑斗四在丑斗三過寅尾二在寅尾一過卯氐二在卯氐一過辰軫十在辰軫九過巳張十五在巳張十四過午柳四在午柳三過未井九在未井八過申畢七在申畢六過酉胃四在酉胃三過戌婁二在戌婁一過亥危十三在亥危十二過子危五是壬子之界女九是子癸之界牛一是癸丑之界斗十一是丑艮之界箕六是艮寅之界尾十一是寅甲之界心一是甲卯之界氐九是卯一之界亢二是乙辰之界軫十七是辰巽之界軫二是巽巳之界軫六是巳丙之界張七是丙午之界柳十二是午丁之界鬼初是丁未之界井斗是未坤之界井一是坤申之界畢十四是申庚之界昴十是庚酉之界胃十一是酉辛之界婁八是辛戌之界奎九是戌乾之界壁三是乾亥之界室五是亥壬之界數雖逆算實是順行虛七虛六之間子之中也星六星五之間午之中也子午之中過宫之機軸也其各宫度數次序本宜改正向左順行但恐初學駭愕姑仍其舊亦不妨特推步宜詳細耳右第四十一章論過宫地理分四十四山曆書亦分二十四時時與山每每相應凡定時之法必須逐時逐刻考驗方可查得星辰躔度之次否則定是悮事蓋地支十二時一定之局也而天干十二時即界于地支之兩間如亥正三刻起至子初二刻止此屬壬時子初三刻起至正二刻止方是子時子正三刻起至丑初二刻止此屬癸時丑初三刻起至正二刻止方是丑時丑正三刻起至寅初二刻止此屬艮時寅初三刻起至正二刻止方是寅時寅正三刻起至卯初二刻止此屬甲時卯初三刻起至正二刻止方是卯時卯正三刻起至辰初二刻止此屬乙時辰初三刻起至正二刻止方是辰時辰正三刻起至巳初二刻止此屬巽時巳初三刻起至正二刻止方是巳時巳正三刻起至午初二刻止此屬丙時午初三刻起至正二刻止方是午時午正三刻起至未初二刻止此屬丁時未初三刻起至正二刻止方是未時未正三刻起至申初二刻止此屬坤時申初三刻起至正二刻止方是申時申正三刻起至酉初二刻止此屬庚時酉初三刻起至正二刻止方是酉時酉正三刻起至戌初二刻止此屬辛時戌初三刻起至正二刻止方是戌時戌正三刻起至亥初二刻止此屬乾時亥初三刻起至正二刻止方是亥時一日十二時共分百刻每一時八刻有奇所以有初刻有初初刻皆零數也加起天干十二時則每一時止有四刻强如正月太陽卯初三刻在子則乙時必然到癸辰時即到丑巳時到艮以次而推莫不皆然每日皆從太陽到處數卯時起一時到一山惟冬至前後又從太陽到處數辰時起夏至前後又從太陽到處數寅時起七政氣孛皆隨時左旋惟計羅二星乃是逆時右轉此是查時刻以考星纏之要法學者必不可忽右第四十二章論定時朱子曰天道與日月五星皆是左旋天道一日一周天而常過一度日亦一日一周天起度端終度端故比天道常不及一度月行不及十三度十九度之七今人却云月行速日行遲此錯說也但曆家以右旋為說取其易見日月之度耳觀朱子此言則知七政皆左旋所以擇時日者不可不知今之星家亦失之遠矣臨川昊氏曰古來曆家非不知七政亦左行但順行不可算只得將其逆退與天度相值處算之因四後遂謂日月五星逆行也今當以太虛中作一空盤以天與七政陳其遲速天行最速一日過了太虛空盤一度鎮星之行比天稍遲於太虛空盤雖過了些子積二十八個月則不及天三十度歲星之行比鎮星尤遲積十二個月與天爭差三十度熒惑之行比歲星更遲積六十日與天爭差三十度太陽之行比熒惑又遲在太虛盤中一日行一周匝無餘無缺比天行一日不及一度積一月則不及天三十度太白之行稍遲於太陽但有疾時遲疾相準則與太陽同辰星之行又遲於太白亦有疾時遲疾相準則與太白同太陰之行最遲一日或不及天十二度或十三度或十四度其行遲故退度最多今人不曉以為逆行則謂太陰之最速也今次其行之遲速天一土二木三火四日五金六水七月八天土木火其行之速過於日金水月其行之遲不及日此其大率也即此二說而觀之則知天與七政皆左旋無疑矣欲喜選擇之妙用者不可不察諸泰和周氏曰天以純陽之體而左旋一日一夜行一周而又過一度以其行過處一日作一度周天之體所謂三百六十五度四分度之一者原於此也鎮星之行次之積二十八月比天為少三十度歲星又次之積十二月已少三十度熒惑又次之積兩月亦少三十度太陽又次之一日行天一周比天為少一一度積至三百六十五日四分日之一則天所過之度又恰周得本數而日所遲之度亦恰盡得本數遂與天會於初纏而成一年太白又于太陽辰星又次於太白但有時而疾遲疾相準亦能與太陽同惟太陰最遲一日比天不及十三度十九分度之七積二十九日九百四十分日之四百九十九遂與日會而成一月十二會得日三百五十四九百四十分日之三百四十八是一歲月行之數也是天與日月五星皆繞地左旋古惟云天左旋者蓋七政之進數為順天而左退數為逆天而右曆家以進數之多難算退數徑捷易推故步其退數而謂之右行蔡氏以為西九丸曆是順莫則彼當知皆左旋矣子月日在斗昏壁旦軫與月會於星紀丑月日在女昏婁旦氐與月會於玄枵寅月日在室昏參旦尾與月會於娵訾卯月日在奎昏弧旦建與月會於降婁辰月日在胃昏星旦斗與月會於大梁巳月日在畢昏翼旦女與月會於日沈午月日在井昏亢旦危與月會於鶉首未月日在柳昏火旦奎與月會於鶉火申月日在翼昏建旦畢與月會於鶉尾酉月日在于角昏旦觜與月㑹於壽星戌月日在房昏虛旦柳與月會於大火亥月日在尾昏旦星月㑹於析木已上皆擇日之在用不可缺也右第四十三章論天文天之元氣無形日見觀斗綱所指之辰可知矣斗有七星一曰魁五曰衡七曰杓此三星謂之斗綱假如建寅之月昏則杓指寅夜則衡指寅平旦魁指寅他月倣此凡斗指寅卯之月宜作東方龍斗指巳午之月宜作南方龍斗指申酉之月宜作西方龍斗指亥子之月宜作北方龍斗指辰戌丑未之月宜作四隅龍蓋斗柄之所指即天之元氣所在也因其氣之所在而善以乘之作福甚速如春種稻秋種夾未有不生者也右第四十四章論天運玄枵之次其辰在子此是齊之分野屬青州今山東登州萊州青州濟南東昌是也星紀之次其辰在丑此是昊越分野屬楊州今南京十四府浙江十一府江西三十府廣東十府及廣西梧州福建各府是也析木之次其辰在寅此是燕之分野屬幽州今北直隸河間保定永平隆慶宣府保安遼東是也大火之次其辰在卯此是宋之分野屬尉州今南直隸豐沛之地是也壽星之次其辰在辰此是鄭之分野屬兖州今河南閉封汝寧之地是也鶉尾之次其辰在巳此是楚之分野屬荆州今河南南陽陜西漢中湖廣武昌等十府四川夔州半入廣西桂林南寧之地是也鶉火之次其辰在午此是周之分野屬營州今河南一府柳屬貴州之銅仁星張屬河南之南陽鶉首之次其辰在未此是秦之分野屬雍州今河南洛陽陜西都司西平鞏昌延綏寧夏雲南鶴等軍民府是也實沈之次其辰在申此是晋魏之分野屬梁州今山西太原大同平陽澤潞四川順慶於籓疊溪雲南十五府貴州八府是也大梁之次其辰在酉此是趙之分野屬冀州今北直隸真定順德廣平是也降婁之次其辰在戌此是魯之分野屬徐州今之山東兖州是也娵訾之次其辰在亥此是衛之分野屬辨州今北直隸大名河南彰德懷慶衛輝是也凡造葬欲斷何人科第官居何地皆不可不知角斗奎井四宿屬木其氣相於冬旺於春火躔其度則為恩金躔其度則為仇水躔其度則為用土躔其度則為難夏秋休囚禍福皆輕亢牛婁鬼四宿屬金其氣相於夏季旺於秋水躔其度則為恩火躔其度則為仇土躔其度則為用木躔其度則為難冬春休囚禍福皆輕氐女胃柳四宿屬土其氣相於夏旺於夏季金躔其度則為恩木躔其度則為仇火躔其度則為用水躔其度則為難秋冬休囚禍福皆淺房虛星昴四宿屬太陽利於晝而不利於夜心危畢張四宿屬太陰利於夜而不利於晝尾室觜冀四宿屬火其氣相於春旺於夏土躔其度則為恩水躔其度則為仇木躔其度則為用金躔其度則為難秋冬休囚禍福亦淺箕壁叄軫四宿屬水其氣相於秋旺于冬木躔其度則為恩土躔其度則為仇金躔其度則為用火躔其度則為難夏秋休囚禍福亦不重已上恩用旺相者吉休囚者凶仇難旺相者凶休囚者吉右第四十五章論經星日太陽之精人君之象也其體徑一度半自東而西一日一周天比天行缺一度所行之路謂之黃道與赤道相交半出黃道外半入黃道內冬至之日黃道出赤道外二十四度去北極最遠日出辰時入申故時寒晝短而夜長夏至之日黃道入赤道之內二十四度去北極最近日出寅日入戌故時暑晝長而夜短春分秋分黃道與赤道相交當兩極之中日出卯日入酉故時和而晝夜均焉月大陰之精后妃之象也體亦徑一度半自東而西一日一周比天行不及十三度百分度之三十七二十七日退一周天所行之路謂之白道與黃道相交半入黃道內半出黃道外出入不過六度如黃道出入赤道二十四度也陽精猶火陰精猶水火則有光水則㑹影故月光生於日之所照魄生於日之所不照當日則光明就日則光盡與日月同度謂之朔分天體為四分初八草三月行近日一分謂之近一遠日三分謂之遐三分受日光之度故半明半暗魄如弓張上弦昏見故光在西下弦旦見故光在東衡分天中謂之望十五日之昏日入月出東西相望光滿而魄死也光盡體復謂之晦三十日月行近日光體皆不見也凡日月順度而又交照山向之時堅造安葬皆吉月行於白道與黃道正交之處在朔則日食在望則月食日食者月體掩日光也月食者月入暗虛不受日光也凡日食月食之時不可堅造安葬五緯是五行之精木曰嵗星春為令星宜作東方龍火曰熒惑夏為令星宜作南方龍土曰鎮星四季為令星宜作四隅龍金曰太白秋為令星宜作西方龍水曰辰星冬為令星宜作北方龍凡日月之交食星辰之變異以所臨分野占之或吉或凶各有當之者矣故選擇者不可不知右第四十六章論緯星卜氏曰某州某郡分野可斷此亦非妄語也蓋天有分星地有分野上感下應一定而不可移者也如秀砂秀水出在卯必主卯生人貴或卯乙年成就功名皆可預卜矣又或穴前秀砂秀水在酉即可占其居官多在趙分或秀砂秀水現在戌即可占其居官多在魯地餘可例推無不響應然此特論其砂水已也又要審其龍穴果是貴格而氣運又當方盛之時者百發百中否則不驗右第四十七章論星土朱子曰帝者天之主宰擇日當首重之然通書所談帝星皆無可考愚于易與禮經得之月令于三春則曰其帝太皥其神勾芒此蒼精之君木官之臣所謂青帝也于盂仲夏則曰其帝炎帝其神祝融此赤精之君火官之臣所謂赤帝也于季夏月則曰其帝黃帝其神后土此黃精之君土官之臣所謂黃帝也于三秋則曰其帝少皥其神蓐收此白精之君金官之臣所謂白帝也于三冬則曰其帝顓頊其神玄冥此黑精之君水官之臣所謂黑帝也又稽易繫辭曰帝出乎震齊乎巽相見乎離致役乎坤說言乎兊戰乎乾勞乎坎成言乎艮合而觀之曰天之主宰總一帝也一分而為四矣四分而為八矣不但已也是故驚蟄三候到甲春分三候到卯清明三候到乙所謂帝出乎震此也穀雨三候到辰立夏三候到巽小滿三候到巳所謂齊乎巽此也芒種三候到丙夏至三候到午小暑三候到丁所謂相見乎離此也大暑三候到未立秋三候到坤處暑三候到申所謂致役乎坤此也白露三候到庚秋分三候到酉寒露三候到辛所謂說言乎兊此也霜降三候到戌立冬三候到乾小雪三候到亥所謂戰乎乾此也大雪三候到壬冬至三候到子小寒三候到癸所謂勞乎坎此也大寒三候到丑立春三候到艮雨水三候到寅所謂成言乎艮此也由七十二候而三百六十五日四分日之一可類推巳故帝所到之期乃吉期也帝所臨之方乃吉方也楊公曰春作東方吉夏作南方吉季夏作西南方吉秋作西方吉冬作北方吉亦此意也今人不信經典之言而信無稽之論惑亦甚矣右第四十八章論帝星或曰東方木南方火西方金北方水四隅土此一定之位也今五星又以子丑為土以寅亥為木卯戌為火辰酉為金巳亥為水午為太陽未為太陰此無乃在天之五星與在地之五行不同歟曰五星五行其埋一也蓋子丑是土之本宫非直指子丑為土也寅亥是木之本宫非直指寅亥為木也卯戌是火之本宫非直指卯戌為火也辰酉是金之本宫非直指辰酉為金也巳申是水之本宫非直指巳申為水也午為太陽之宫未可直指午為太陽也未為太陰之宫未可直指未為太陰也如金生于麗水未可直指麗水為金也玉出於崑岡未可直指崑岡為玉也或曰七政所居之宫亦有義乎曰懸象於天莫大乎日月故日居午月居未成形於地莫大乎土故土居子丑運行於天地間莫大乎四時故木居寅亥即春令也火居卯戌即夏令也金居辰酉即秋令也水居巳申即冬令也一星盤之間而乾坤大造化存焉然則舜之齊七政豈無謂歟可見七政選擇所最重者或又曰二十八宿內有星日焉虛日鼠房日兔昴日雞然則在天果有四日乎曰否此皆太陽流行之位如古者天子巡狩四方每方必有明堂相似即指明堂為天子可乎不獨此也二十八宿分度盡皆七政流行之次即如今之撫按官每府縣必有行臺是也善悟者其自得之右第四十九章論五星辨疑古人植八尺之臬以定東西南北則偏方之日影定是與中土不同玄針則動而有常者也又不可以此例論其子午定向易地皆然即如古人論中字曰在堂以堂之中為中在室又以室之中為中地雖不同莫不各一其中也今人議偏方之針與中土不同者悮矣但以戀夫益子之說考之則子午正針略兼壬丙此是確論右第五十章論中針歷驗太陰太陽山家至吉之神也故造命選擇皆當以此為重所以已上俱說皆自太陰太陽言之若五星四餘定要逐時查考難以預定因立二曜流行定局于後以便初學雖無流年臺曆亦可趨吉避凶太陽陳希夷曰日者陰中之陽君象也其德至剛其體至健其行天所以分晝夜别寒暑一日一周天而比天為不及一度一嵗之積恰與天㑹故日有三道者黃道也北至東井去極近南至牽牛去極遠東至角西至婁去極中是中道南道北道為三道也蓋南極至於牽牛則為冬至晝四十刻夜六十刻極北至於東井則為夏至晝六十刻夜四十刻南北極中東至於角西至於婁則為春分秋分晝夜各五十刻凡天行之分正月雨水中氣後太陽躔亥娵訾之次其應甲丙庚壬二月春分中氣後太陽躔戌降婁之次其應艮巽坤乾三月穀雨中氣後太陽躔酉大梁之次其應癸乙丁辛四月小滿中氣後太陽躔申實沈之次其應甲丙庚壬五月夏至中氣後太陽躔未鶉首之吹其應乾坤艮巽六月大暑中氣後太陽躔午鶉火之次其應癸乙丁辛七月處暑中氣後太陽躔巳鶉尾之次其應甲丙庚壬八月秋分中氣後太陽躔辰壽星之吹其應乾坤艮巽九月霜降中氣後太陽躔卯大火之次其應癸乙丁辛十月小雪中氣後太陽躔寅析木之次其應丙庚甲壬十一月冬至中氣後太陽躔丑星紀之次其應艮巽坤乾十二月大寒中氣後太陽躔子玄枵之次其應乙丁辛癸其所躔之分乃光所照之方大可扦立三方四正用之亦可叨光是名山家帝駕所在之處謂之嵗空凡天星地殺皆可制伏遇房虛昴星四躔者為太陽升殿用之尤吉若值日蝕天變者太不堪用切忌之太陰陳希夷曰月者陽中之陰后妃之象也其德至柔其體至順其行天所以佐理太陽驗之夜影以為消息月本無光麗日而明以不明之體言之則純陰而象坤晦朔之時也越三日不及三十七度强而生明始資日之明而有光因謂之朔謂陽之初生也昏見於庚越八日不及日九十八度强而資日之半明因謂之上弦謂陽之將半也昏見於丁越十五日不及日一百八十二度半强與日對望資日之全明而大圓因謂之望謂三陽備見也昏見於甲又三日不及日一百九十五度强而生魄與日之望偏而陰魄始生因謂之魄言陰復生也晨見於辛又五日不及日八十一度强而半晦半資日之明因謂之下弦言陰生至半也晨見於丙又六日去日之四百九十分則不及盡三百六十五度四分度之一而與日交㑹月之明全不能相資復晦而不明因謂之晦盡沒於乙其行天之度一日之行得三百五十二度八百二十八分六釐在日而不及十二度十九分度之一在天而不及十三度十九分度之七積二十九日九百四十分日之四百九十九而與日會合於辰吹之所是為一月十二會得三百五十四日九百四十九分日之三百四十八分而與天㑹是為一嵗也故月有九行九行者黑道二出黃道北赤道二出黃道南白道二出黃道西青道二出黃道東並黃道共九行也故立春春分從青道分度在甲立秋秋分從白道分度在庚立冬冬至從黑道分度在壬立夏夏至從赤道分度在丙共日月合度之辰三合照臨之方為天德月德之星故三月建辰日月會於酉出於庚入垣於壬故天月德在壬六月建未日月會於午出丙入垣於甲故二德在甲九月建戌日月會於卯出甲入垣於丙故二德在丙十二月建丑日月㑹子出壬入垣於庚故二德在庚蓋子午為日月之始終卯酉為日月之出沒故其分度多而有太陽太陰也其他月分所臨之宫乃太陰升殿入廟之時大可扦立凡天曜地殺盡可制伏若值月蝕天變者大凶太陽永定圖冬至本日箕四小寒本日斗十大寒本日牛三立春本日虛一雨水本日危七驚蟄本日室七春分本日璧三清明本日奎九穀雨本日婁七立夏本日胃九小滿本日昴八芒種本日畢十一夏至本日井初小暑本日井十四大暑本日井草九立秋本日柳十處暑本日張五白露本日翼三秋分本日翼十八寒露本日軫十三霜降本日角九立冬本日氐三小雪本日房二大雪本日尾二假如冬至本日太陽在箕四次日即在箕五又吹日即在箕六以次數去節節皆然太陰永定圖正月初一二子二月初一二亥三月初一二戌四月初一二酉五月初一二申六月初一二未七月初一二午八月初一二己九月初一二辰十月初一一卯十一月初一二寅十二月初一二丑假如正月初一二太陰在子初三四五即入亥初六七即入戌以次數去月月皆然已上皆日月運行之度驗於當時而不易者也日月之宫既定則命宫身宫可知而五星四餘可推矣此選擇之要務也學者其首重之右第五十一章論二曜木德東方號嵗星厥色亦維青行有留伏順與逆常度見諸曆留時名曰長喪曜减福興灾兆入逆又名災愁星主禍却非輕伏時乃號天欄杆禍福總無干此星順軌無他曜致福定須驟當其順軌遇刑星减半福力輕其行六日歷一度此一非常路或時三日一度遊或時五日周大抵一年移一宫此是總行踪十二年中一小周密度要詳求幾時歷遍大周天八十有二年若是東方龍得之大可扦立不間天懼地殺俱可降伏遇角斗奎并為入廟箕壁參軫為得勢值順軌者吉伏逆者凶右第五十二章論天機此章至六十章皆饒安李氏論南方熒惑火之精列象甚分明行有疾遲並順迸伏留宜詳識遲留伏逆總興灾順軌主福來入留改號曰天虹招火最為凶逆號天攻破家星瘟疫遭天刑入伏名號黑天曜作惡極殘暴入垣旺樂總為祥權䊮煥文章其行大度細推論莫作等間星一十八時周一度乃建順遊路五十日內一宫移此際任施為降福須知在此時坐向總相宜更遇入旺樂宫催春怏如風此星專主文章貴元登及第更主神童入廟廊宰相近君王若遇遲留井伏逆二日一度歷兩月絻方過一官此際極興凶疾行七日過五度四十五日一宫就遲退行時三四月拾好一宫越二年歷一小周太妙訣不輕傳七十九載大周天密度細精研南方龍得之大可扦立三合四正亦吉遇尾室觜冀為入廟斗角奎井為得勢凡天曜地殺俱可降服若值順軌吉伏逆凶右第五十三章論火星坤德中央號鎮星戊己土之精經中又曰地羅㬋吉凶細推求行有伏逆遲與順逐一細詳論伏時名號曰瘟星懼犯禍非輕晋時又名曰暗曜亦主興灾兆逆時名喚破家星逢之橫禍生入垣旺樂順相逢富貴永興隆若遇月孛同到宫凶吉半相從其行三嵗一宫移大周小周隨五十九年是周期厚重故行遲西隅龍得之大可扦立凡天曜地殺悉可制伏氐女胃柳為入廟尾室觜張翼為得勢值順軌者吉伏逆者凶右第五十四章論土星西方太白是金星又號曰長庚行有遲留順與逆占㬋分晨友伏見循時行順軌造福真無比失度經天非所宜兵革禍相隨與火同宫為受制斯時何足貴與土同宫正得宜福勝常時當其遲逆並遲行無凶福亦輕只畏孛及羅計同减力莫相逄日月水星同到位一舉登科第其行日半周一度一月一宫就一年行歷日周天與度每相聯大遍周年是幾時記取八月期此星大抵不為灾逄之福澤來蓋照三方為大利尤喜大陽聚入垣升殿喜稱懷官貴到三台若值木星同到垣敵國富堪言西方龍得之大可扦立凡天曜地殺盡可制伏遇亢牛婁鬼為入廟氐女胃柳為得勢值順軌者吉伏逆者凶右第五十五章論金星北方水德曰辰星懸象列天庭行有疾遲伏逆時常順無逆期此星大抵主為祥遇日福無量若值退遲力稍减孛火同相反其行常近太陽旁為相輔君王一日常行一度半一月一宫算遲行六十九日移疾行二十期最疾十七過一宫每月不相同大抵一年周小遍密度宜查看六十五載大周天妙訣不盡言北方龍得之大可扦立不問天曜地殺悉可制伏遇箕壁參軫為入廟亢牛婁鬼為得勢值順軌者吉伏逆者凶右第五十六章論水星木星之餘為紫氣為福此為最禎祥瑞慶喜相逢所作盡亨通此星大抵多招福性善無凶毒入垣旺樂更非常密度可推詳其行常順易尋求無遲逆伏留大抵一月行一度年周十二度三年共行過一宫此足定游踪歷遍渾天一大周二十八春秋宜東南方龍右第五十七章論紫氣月孛多是水餘精名號大陰神又名彗帚大將軍减福助凶深五星順軌恰相逢亦有助福功若是逢逆星甚惡逄孛凶大作月孛入垣與樂廟禍福觀他曜他曜凶兮愈助凶吉則吉相從其行無有遲留逆一月三度歷九個月中過一宫行度有常踪十二月中行幾度恰好四十九幾時行遍小周天密度好推研六十二年周天遍天度宜詳算宜東北方龍右第五十八章論月孛羅㬋本是水之餘天首名不殊不逢忌曜最有權凶吉細推研全無伏逆與遲留常道逆行遊此星大抵性凶惡為福力全簿朔遇太陽同度時日蝕不須疑望遇太陰同在度月蝕為凶咎當其薄蝕最為崇萬事不堪逢惟有入廟逢火星助福力非輕一十九日行一度一月度半就十八月中移一宫諸曆總相同十九年時一小周步步逆行遊大周九十有三年天機莫亂傳宜火土龍右第五十九章論羅㬋土餘名號計都星蝕神豹尾稱此星性與羅㬋似凶多吉少遇逆行常度也無形伏遲不用評日月同度即相蝕為惡最為凶入垣廟樂看同星凶吉却相仍火土同宫軌順時為福不須疑若當火土伏逆際橫禍從天至其行常與火羅對都無留順退十九日中行一度度半一月過一年半始移一宫小周十九通九十三年一大周循環有何休宜土金龍右第六十章論計都二卷終
