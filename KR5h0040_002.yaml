front:
  text: 儒門崇理折衷堪輿完孝録封二談堪輿者不過曰相形勢選吉期兩端而已但術家流一登山舍形勢而勿論獨以封例天星理氣等說惑人前卷既已悉略而不重直以形氣之正為宗矣至選期誕說惑人尤甚有所謂諸家者有所謂雷霆者有所謂奇門者紛紛誕妄不一而足此皆起于吕才作通書變亂陰陽顚倒五行所以術人遂乘訛踵弊亥豕錯陳相沿而不息也正德嘉靖間天下怪說又甚至今僞書汙牛冲棟小人固因之以誤人君子亦信之以自悮福未必淂而害且隨之完孝之謂何間有偶然之合亦積德之家陰玫之非誕術之力也彼楊公曰識淂五行倒顚方是大羅仙此惟楊公然耳非楊公而以拘泥之見入之則相生者而反相尅相尅者而反相生比和者而反不和大乖乎造化之正理矣人胡敢輕用之乃知百家雜說悉皆幻妄奇門至理誰悟真機惟七政者自容成受命以來堯之欽若昊天敬授人時舜之在璇璣玉衡以齊七政歷代帝王所以治曆明時者胥不能外也此微而著隱而顯乃天地造化之正理也人何悖之而事怪異耶殊不知五運六氣即陰陽五行之代遷者也五星七曜即陰陽五行之著明者也代遷者常流行於天地之中而有禍有福著明者常照臨於乾坤之內而有吉有凶是故選擇者只須以氣運審龍神而酌量其生尅制化之道又以星曜定坐向而推詳其遲留伏逆之機期二者乃選擇之切要而有星曆之可據者然氣運之行也朝夕不同用星曜之布也晨昏不同度必以七政臺曆考之又知推步之法方得造命真訣不致悮事他如溫曆萬年曆一掌經之類皆不足憑也毫釐之差千里之謬可不愼哉若山家神殺止避其三殺太歲乘旺而已不旺不忌餘殺亦不忌詳見於左
