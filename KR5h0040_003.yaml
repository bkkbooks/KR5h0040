body:
  text: 選擇條例引龍穴陰陽五行例年月日時陰陽例年月日時五行例四時陰陽五行例三元例五行生死例五行生剋例經星例緯星例命宫例身宫例令星例用星例恩生仇難例年起月例日起時例大運例大運歲數例小運例初限例大限例小限例三方例四正例夾宫例符頭例畫夜星辰例地盤名號例天盤宫分例日月交會例晝夜長短例七曜流年例太嵗例三殺例大殺例對沖例目録終儒門崇理折衷堪輿完孝録卷之三選擇條例引此選擇一書固皆古今不易之埋而有補於龍穴砂水之用者也但陰陽之定體五行之常性與夫各位神殺皆不可不先知者因預例條例於自以便初學凡安葬不必拘大葬日小葬日凡堅造日亦不必拘定大堅造日小堅造日只要龍神合中和之氣坐向得吉曜相扶立命又得地逢時足矣然坐向星辰之吉凶定要以七政為主愼不可為邪説所惑龍穴陰陽五行例自寅宫斗三度起至卯中心三度止皆屬陽木自卯宫心四度起至辰中角十一度止皆屬陰木自巳宫軫九度起至午中張九度止皆屬陰火自午宫張八度起至未中井二十七度止皆屬陽火自申宫井八度起至酉中畢一度止皆屬陽金自酉宫畢二度起至戌中婁四度止皆屬陰金自亥宫奎一度起至子中危七度止皆屬陰水自子宫危六度起至丑中斗二十二度止皆屬陽水辰末十八度同戌末十八度皆屬陽土丑末十八度同未末十八度皆屬陰土年月日時陰陽例甲丙戊庚壬天干之陽乙辛巳丁癸天干之陰也子寅辰午申戍地支之陽也丑卯巳未酉亥地支之陰也年月日時五行例甲乙寅卯屬木丙丁巳午屬火戊己辰戌丑未屬土庚辛申酉屬金壬癸亥子屬水四時陰陽五行例立春後三十六日屬陽木次三十六日屬陰木又次十八日屬陽土立夏後三十六日屬陰火次三十六日屬陽火又次十八日屬陰土立秋後三十六日屬陽金次三十六日屬陰金又次十八日屬陽土立冬後三十六日屬陰水次三十六日屬陽水又次十八日屬陰土三元例十干是天元十二支是地元子中藏癸水丑中藏癸巳辛寅中藏甲丙戊卯中藏乙木辰中藏乙癸戊巳中藏丙戊庚午中藏丁己未中藏乙己丁申中藏庚壬戊酉中藏辛金戌中藏辛丁戊亥中藏壬甲此皆人元也五行生死例甲木生在亥死在午乙木生在午死在亥丙戊生寅死酉丁己生酉死寅庚金生巳死子辛金生子死巳壬水生申死卯癸水生卯死申凡沐浴冠帶等例皆自長生上起如長生沐浴冠帶臨官帝旺衰病死墓絶胎養是也五行生剋例木生火火生土土生金金生水水生木此是五行相生木尅土土尅水水尅火火尅金金尅木此是五行相尅經星例危十二過子女一過丑斗三過寅尾二過卯氐一過辰軫九過巳張十四過午柳四過未井八過申畢六過酉胃三過戌奎一過亥星虛房昴是太陽之位張危心畢是太陰之位角斗奎井是木星之位尾室觜翌是火星之位氐女胃柳是土星之位亢牛婁鬼是金星之位箕壁參軫是水星之位緯星例子丑土之位寅亥木之位卯戌火之位辰酉金之位巳申水之位午太陽位未太陰位餘皆奴星計附子氣附寅孛附申羅附戌命宫例太陽所到之宫即是命宫太陽所居之度即是命度假如萬曆癸未年正月十四日卯時太陽在子宫虛一度即以土為宫主星以太陽為度主星辰時太陽到丑宫井干三度即以土為宫主星木為度主星他倣此身宫例太陰行到之宫即是身宫太陰所居之度即是身度假如萬曆癸未年正月十四日卯時三刻太陰到午宫柳五度即以太陰為宫主星以土為度主星辰時太陰到未宫井十度即以太陰為宫主星木為度主星他倣此令星例春木夏火秋金冬水四季月土是也用星例木見火火見土土見金金見水水見木是也恩生仇難例生我者為恩尅我者為難我尅者為仇我坐者為主年起月例甲己之年丙作首乙庚之歲戊為頭丙辛之嵗從庚上丁壬壬位順行流更有戊癸從何起甲寅之上細追求假如甲己之年正月起丙寅二月即是丁卯三月即是戊辰以次順行餘放此日起時例甲己還加甲乙庚丙作初丙辛從戊起丁壬庚子居戊癸何方發壬子是真途假如甲己日子時起甲子丑時即是乙丑寅時即是丙寅以次順行餘倣此大運例甲丙戊庚壬陽年也乙辛己丁癸陰年也凡堅造起運陽年順行陰年逆行與命家起男子運同凡安葬起運陽年逆行陰年順行與命家起女子運同皆從月令上起算假如甲子年二月建丁卯順運即起戊辰己巳庚午依次而行逆運即起丙寅乙丑甲子癸亥亦依次而行皆論支不論干他倣此大運歲數例每月節氣在前中氣在後如立春是節氣雨水即是中氣日月皆然凡大運止看節氣不看中氣陽年看在前節氣陰年看在後節氣每有三日即作一歲起算假如陽年立春三日前用事即是一歲運六日前用事即是二嵗運九日前用事即是三歲運十二日前即是四歲還十五日前用事即是五歲運餘倣此陰年立春三日後用事即是一歲運六日後用事即是二歲運九日後用事即是三歲運十二日後是四歲運十五日後是五歲運餘亦倣此又或零一日者即除去不又算零二日者即加作三日算零一日半者準半歲入算小運例凡起小運皆以歲君天干為主星命家亦云嵗用天干運用地支亦此意也假如甲乙年木是小運丙丁年火是小運戊己年土是小運庚辛年金是小運壬癸年水是小運即命家嵗運是也外有月令起運皆與大運同日神起運皆與小運同初限例此與星家起童限相似一命二財三疾厄四妻五福順行流六歲却從官祿起逆旋數到命宫休假如立命坐子則一嵗在本宫限主屬二嵗行財帛宫宫分在巳限主屬水四嵗行妻妾宫宫分在午限主屬太陽五嵗行福德宫宫分在寅限主屬木六嵗行官祿宫宫分在卯限主屬火七嵗又行轉福德宫八嵗行到相貌宫宫分在丑限主屬土九嵗又到命宫九嵗後起大限他宫安命皆以此例推之大限例凡起大限皆除初限九年外然後自命宫度主上算起凡一宫三十度三度管一年行過度數即除以未行者起算皆自右順行向左此自命宫起限處言之餘皆十年行一宫假如立命在子宫危十一度即是十歲起限若在危九度即是九歲起限若在危六度即是八歲起限若在危三度即是七歲起限餘倣此或立命在子宫女二度則本宫皆除盡無餘行初限九年外大限即入丑小限例凡起小限皆自本年太歲上算起不㧾陽年陰年俱是自左逆行向右一年行一宫月限自流年上數正月起日限自月上數初一日起時限自日上數子時起假如太歲在未未上即是一歲午是二嵗巳是三歲逐宫右行十三嵗又在未上周而復始一年行一宫月在年上起一月行一宫日在月上起一日行一宫時在日上起一時行一宫三方例申子辰亥卯未巳酉丑寅午戌艮丙辛乾甲丁巽庚癸坤乙壬此皆三方也四正例子午卯酉寅申巳亥辰戌丑未乾坤艮巽甲庚丙壬乙辛丁癸此皆四正也夾宫例壬癸夾子子丑夾癸癸艮夾丑丑寅夾艮艮甲夾寅寅卯夾甲甲乙夾卯卯辰夾乙乙巽夾辰辰丙夾巽巽午夾丙丙丁夾午午未夾丁丁坤夾未未庚夾坤坤庚夾申申酉夾庚庚辛夾酉酉戌夾辛辛乾夾戌戌亥夾乾乾子夾壬又亥丑夾子子寅夾丑丑卯夾寅寅辰夾卯卯巳夾辰辰午夾巳巳未夾午午申夾未未酉夾申申戌夾酉酉亥夾戌戌子夾亥又壬艮夾癸癸甲夾艮艮乙夾甲甲巽夾乙乙丙夾巽巽丁夾丙丙坤夾丁丁庚夾坤坤辛夾庚庚乾夾辛辛壬夾乾符頭例一節分三㬋一㬋五日以甲己作符頭下臨子午卯酉為上㬋臨寅申巳亥為中㬋臨辰戌丑未為下㬋凡上㬋符頭所到日時即是交節之期如本日立春本日即遇上㬋符頭則本日作立春氣㬋看或立春先日遇上㬋符頭則先日作立春氣㬋看或立春後日遇上㬋符頭則直待符頭到日方作春氣㬋看此是超神接氣法也畫夜星辰例自卯至酉為晝當以命度為主宜見日木土自酉至卯為夜當以身度為主宜見月火金蓋日木至皆屬陽宜於晝而不宜於夜月火金皆屬陰宜於夜而不宜於晝水星雖屬陽而其性無常或利於晝或利於夜地盤名號例子名玄枵又曰寶瓶亥名娵訾又曰雙魚戌名降婁又曰白羊酉名大梁又曰金牛申名實沈又曰陰陽未名鶉首又曰巨蟹午名鶉火又曰獅子巳名鶉尾又曰雙女辰名壽星又曰天稱卯名大火又曰天蝎寅名析木又曰人馬丑名星紀又曰磨蝎天盤宫分例地盤十二宫雖有闊狹長短之不同大約天干十二位即界於地支之兩間左右各分得七度半共成十五度如癸界於子丑之間則左分丑宫七度半右分子宫七度半共成一十五度壬界於亥子之間則左分子宫七度半右分亥宫七度半亦共成一十五度子宫左右各分去七度半本宫亦止得一十五度餘皆倣此今人皆以癸統於子壬統於子壬統於亥又或以三七分之似此之例未免失之偏枯決不可憑惟今之司府定時日規皆以天干界於地支之兩間此一定之法也天盤分度當以此為式日月交會例正月會於亥二月會於戌三月會於酉四月會於申五月會於未六月會於午七月會於再八月會於辰九月會於卯十月會於寅十一月會於丑十二月會於子即官曆上望日時刻推之則交會之時刻可知此定朔之法也晝夜長短例夏至晝極長有六十刻夜極短止有四十刻自夏至符頭日後即有加減乘除之漸大約以九日為率晝漸減一刻夜漸加一刻加減到冬至符頭之日晝極短止有四十刻方寅午戌年占午方巳酉丑年占酉方對沖例即天干受尅地支相沖是也如甲子人忌庚午庚午生人忌丙子乙丑人忌辛未辛未生人忌丁丑丙寅人忌壬申壬申生人忌戊寅之類然相沖之內又有輕重不同如子生人見午則內沖外其禍必淺若午生人見子則外沖內其禍必深支沖而干不受尅干受尅而支不沖者皆不在此例觀星節要凡三十四條一觀星之法先辨太陽太陰自太陽初出之時數到所用之時則命之宫度可知自太陰初出之時數到所用之時則身之宫度可知皆以度主為要宫主次之蓋宫主猶府尉也度主猶縣令也令近民視尉尤切宫主必要逢生得令不要受尅制不為太陽所伏及三方四正無星相尅更看度主又坐高強又坐祿馬長生歲駕又逄旺得時方可為妙一立命立身既定更看是晝是夜晝則宜看命度主命宫主遇日木土計氣為用神者皆吉見月火金孛羅者皆凶夜則宜看身度主身宫主遇月火金孛羅為用神者皆吉見日木土計氣者皆凶一造命須先看福德宫為緊如人之生命亦以福德為最蓋有福則有妻子立名利致富貴福德既虧前數者未見其可得也福德者乃造命之主若得福居祿祿居福身主命主入福又有日月照福德權貴蔭映之星入福德金水夾主居福德者皆生有福之人出入性必端厚量必寬洪而有福有壽若見土計坐福德者作後亦可玫福或福德宫犯刑囚耗星切不可作若悮作之必招凶禍且出人必多刻薄凶狠姦謀詭譎好鬪好殺不忠不孝之流如福德宫無好星辰又看三合對照有何星守照如三合對照守照俱無星亦未可便言其吉凶更看財帛宫如何一財帛宫亦人生受用大端也或遇福德守財帛日月照財帛田宅互垣身命二主臨財財帛又逢生旺得令得時作後必生有祿之人如人既是有財則可以養妻子致奴僕既有財亦有名若財主失經刑囚照財作後必主財穀虛耗出愚蠧無用之人如財帛宫不好又未可便言其吉凶又當看田宅宫何如一田宅之位亦人生受用之源如田宅主星不起或有福德守田宅日月照田宅身命坐田宅作後必生有財名望之人既有田宅則妻子皆自田宅而出若福德田宅財帛三宫既無吉星必不可作又宜另選吉期方能為福一看作後行限如何如人一生命好身吉若行限不好却不作發福論之蓋命好不如限好如身命好行限又好方是吉期蓋命為魂身為魄限為血氣三者須要相扶譬如人之一身血氣稍滯則不流通故為寒熱相攻瘡毒並行風邪客氣得以侵之若血氣和暢其身既壯安得有病一行限須要向明不背方吉何謂向明夜見火金月當限日見日木土當限皆謂向明發福可期如日不曾見日木土星又皆獨見金月火星照限行限又經行的殺劫殺羊刃三殺空亡之上作後必不發福一凡大小限以作日後交神殺祿貴以冬至日後交命宫行度九嵗以前在小限至十嵗上本生度起行一造命須要看得令為緊如春木夏火秋金冬水土則寄旺四季為令令者如臣稟君令宣真教化生民休戚係焉以令主之不背則赫然號令從所膽仰立春木為令主發生則萬木萃於春生人亦清麗煥彩然木既主令金不可尅木乃掌時月之星金當藏刃土則培木只伯金土參差是為逆亂伐上禍由期發主為凶厄夏月火陽當空水縱泛溢豈敢侵月令之火金廢則沮於爍石流金之勢何所用焉亦當廢棄故夏金多行南方若金火日用事必生酒色之徒大抵當廢之星用事日值之後出人必志大謀踈虛空無實愚而好自用平生快然易於退失只怕金水相合與火爭勢為反逆之曜以此日用事必主凶敗秋金用事大火西流本自棄置萬木黃落當廢之時惟金司令逆金為禍若木火相合即不受令又有陸梁安得不凶冬水陰沍必藉火為順流溫助之宿土為隄防之星皆無傷用事之時却水木無相生之理相合氷凍若水星夜見以之用事必生孤寒之人大抵令星春時必借土為栽培之宿冬月火土自為相生相養亦與水而濡沐雖星廢不當時却畢竟相為表裏皆吉只有火金月不可相見必不能相順見之禍發令星從陽則吉為贊助協翊之星逆則凶為跋扈飛揚之宿所以順者或引陽或從陽遠在十度不為克奪所謂逆者侵陽用事令星最要得日君行事居有氣之位與命主不相背反方為令自己出稍為克奪則是聽令於人令星司奪當之必死令星司福用之必祥五星犯殿傷宿即克奪之星也學者務宜詳察用不可怠忽一太歲最為緊要大凡立命須要吉星臨駕與太歲相關攝則富貴可必若歲君不收録則亦無用又忌殺星破駕凡作用皆以身命與德德為重有祿無福福將安享有命無身命將安係一凡殺星不要逢時要失時春木逢金冬水逢之之類殺星失時主星有氣凡火為殺不宜於晝土為殺不宜於夜木為殺防春金為殺防秋水為殺防冬火為殺防夏此皆得時失時之妙論一金星若在太陽之宫名曰映進若命主在太陽之前為特進又名曰金星映日又曰金星當權皆主權貴太陽之前只喜身度主命度主及金星在前者皆作貴論若太陽之前或是刑囚暗耗名曰誤進並皆不吉命主及金星在太陽之後者名曰後進其福減半一諸星並行有先有後大凡殺星則欲其前行主星則欲其後至旦如水火二星同行水能尅火則以水為殺星如水星在前行則不能尅火如火在前水在後其殺逼身最為大害不可不審諸星皆然經云殺前主後當膺藩輔之權殺後主前必有徒流之患一諸星退行有退而有力者有退而無力者且如退而有力火金二星同行金在前火在後而退行此殺星不敢進前以尅其金是退而有情如或金星退遇火順行是退而逄其殺也五曜皆然亦有退而升殿退而入垣退而逄生皆為吉論或退而坐殺退而逢殺或退惡弱之宫並作凶推一遲留伏逆五星中緊要學者不可不明遲則忌度留則不行伏則不見逆則退行有用之星順行為福遲留伏逆進退減力經曰順則優遊逆則退縮留則拘繫抑鬱伏則韜晦無光如命午太陽忌木氣同躔木前日後退之為禍日前木後退之為福留者用星留於實地為福久遠殺星留於實地為禍不休若留於虛地禍福皆無伏者用星伏則無力忌星伏則無災逆者退行也有退為福有退為禍以埋推之詩曰五星遇日須當伏三合逄陽必定留若是對宫為逆度不逄陽處是為遲一羅計截斷半天星有吉有凶或截斷諸星在左而限行右名曰反背行限不遇諸星故也又有升沉之不同或日間而諸曜當天截在辰巳午未申位而有星行限從酉戌亥子丑寅位而無星者為不得體又有夜間斷截在戌亥子丑寅位而有星行限從辰巳午未申位而無星者皆為升沉之不同並不合格一羅計截斷半天星斗有跳出一星在外者當專論在外一星禍福如跳出一星為福主祿主命主身主或官魁權貴星夜火夜月晝木晝土皆為得格作後必出富貴名利之人如跳出一星為刑囚暗耗或奴僕主羊刃劫殺的殺主晝火晝金夜土漏出在外者皆不合格出人必主貧賤勞碌之事度世無成不為吉論一截斷不要太陽跳出如太陽隔在外名曰孤君孤遁君而無輔極為不好蓋太陽乃君王之象必欲星輔佐而行或左右皆為吉論若太陽孤立雖親輔之人亦多遠之出人必主勞苦一諸星聚會有吉會有凶會吉會者為命主身度主官魁福祿或化權貴蔭印皆為吉會會雖是火羅計孛亦無害如不為前項等星而為的劫羊刃等主或化刑囚暗耗皆為凶會學者不可不察一身命主坐奴僕有凶有吉如貴人之命多有身命主入奴僕而貴者亦有入奴僕而賤者如奴僕宫主原是貴人祿馬長生帝旺爵駕殿勳權祿之地皆出富貴利達之人如奴僕宫主原是劫的羊刃死絶暴敗之卿而身命限主居其上者必出勞役無成之人學者最宜詳察一造命須是四正為緊或日月照四正或金木照四正福德照四正或用星居四正之地並主富貴亦有火羅計孛守四強及化得好者亦為合格如有刑囚暗耗等星居於四正宫中而逄相尅之曜皆主破敗一看諸星皆如看命之法亦看三合亦看正照方斷吉凶大抵論三合四余輕五星重對照四余重五星輕四余乃橫衝直突之曜也一十干坐命如六甲年不要立命在金宿度上名曰鬼尅皆主不安只喜坐生星坐水宿名曰父母之上坐土宿名曰財帛之上坐火宿名曰脫局之上當以意會消息得時得令為妙餘倣此一身命坐祿坐貴坐長生坐庫坐駕坐殿坐夾貴窠坐祿馬樞坐生旺卿皆主富貴不然亦主衣食盈饒天玄賦云祿馬貴人持世立身須主清高咸池凶殺臨身出處必然微賤是也一身命坐劫的芒刃暴敗空亡死絶三殺飛廉殺者皆主出人心險行怪不亡不義凶暴勞苦一夾身命要日月夾福德夾官魁夾印貴夾三合拱之者皆吉或命度主身度主起在别處而夾拱之者並主吉一劫的芒刃之宫或凶星夾照其凶敗不可勝言然無官符不成殺刃無歲破不成劫的無病符不成疾厄此乃五行真生殺一官祿不要星尅其宫名曰官鬼且如官祿在寅地却不要金星入內亦不要三合四正宫值之皆主出人健訟不然遭官事亦無食祿之分一官祿福德二宫最要吉星臨之如日月居官祿福德或福祿居官福水日金月各居官祿行限遇之皆主發福如官福二宫無星或弔起吉曜居其上者亦吉又看對照三合之宫以斷休咎一造命只可求其主星命度命主身度身主看強弱禍福不必諸星一一高強一一得地故經云一星得地終生貴顯吉人又云使一星背而莫究其非縱群曜吉而莫能為福譬如五七員官在任不必員員皆職而其中有一員得力則群從州縣莫不刮目觀星當以理推其次看限主行限須要限主高強得地受生吉星交會方為好限發達不然皆為不福一論五星無毋推究太陽太陰躔度次舍𥚟福吉凶貧賤富貴十有九中蓋命宫以太陽為主身宫以太陰為主主本既端何所根蒂故日當推太陽夜當椎太陰如日間太陽逄惡曜夜間太陰逢凶曜定主出入貧賤天折日間吉宿逄陽夜間言星釣月必主出入富貴顯達然猶當論其在度中與不在度中也一星辰俱善柔而不能作大事又要一凶星以助其權大凡吉星多凶星少則以吉論凶星多吉星少則以凶論如貴人之命非權殺不能治世一造病皆要日月明潔方為吉論蓋天地以日月為主若日月明淨方始貴顯經云貴人日月要分明日月不明非貴人一元守之星固好又恐流年之星為患如限主又惡又弱流年凶星又重亦能為災不可不察若限主健只是流年為禍必候凶星出後方好故經云元守雖然無咎流年又怕為災元守雖醇尤勝膏梁之有味流年為患譬猶橫潦之無根是也故欲善選擇者必要元守星昔吉限主不陷衰弱者然後用之
