故立此捷法以椎之彼算月白以子年為上元即以丑年為中元蓋子年十二月尾正好接丑年正月頭如子年十二月六白居中宫故丑年正月五黃進而代之也是十二宫配九宫算法也若時白必須遍六十甲子之數常以五日換一元如甲子日起甲子時必須交己巳日然後甲子周遍是子日為上元斷當以巳日為中元是六十時配九宫之算法也且陰陽二遁又有順逆不同較之於月白之法相去甚遠於埋甚悖今為改正即如以算月之法算時先一日起甲子則次日當為丙子不當為甲子先一日起一白順布則次日當為四緑不當為七赤先一日起九紫逆布則次日當為六白不當為三碧然後與十二官算法相合不然安得以子日為上元丑日為中元也太嵗一星起例斷略太嵗一星禍難防諸殺凶危不可當但把三元自椎數犯之家下有重喪太嵗一星誰不知逐年之內有凶期每月連行方至妙更無定準及常儀且如上元甲子年一白來宫飛九天子上六宫重得白再來離上不堪言其法以三元值年星入中宫順尋太歲本宫所得何星即移入中宫以求值年星所在值年星每嵗中宫星也故名太嵗一星假如上元甲子年一白入中宫順數至本年太嵗在坎位得六白又將六白入中宫順尋一白到離離中有午字隨逐月飛查午字落何宫又吊一白同午字到處乃是真太嵗一星今之術家以太嵗對沖名之此歲破之鄉非一星也嵗建子年坎丑寅年艮卯年震辰巳年巽午年離未申年坤酉年兊戌亥年乾吊宫逐月審凶期常忌太歲又相隨只如一白居離上二月椎來艮犯之假如上元甲子年二月建丁卯移卯字入中宫順尋午字到艮子午卯酉年正月中宫起八白二月中宫起七赤順飛八白乾九紫兊一白又到艮與月家午字又同到山最凶水火太嵗害如何定主重喪起禍戈假如上元甲子年一白為太嵗一星三月中宫得六白順飛一白到離是水入火鄉主重喪水金淫亂中房祻殺妻損長害尤多又如上元甲子年一白為太嵗正月中宫得八白順飛一白到兊是水入金宫主淫亂坎為中男故主中房禍太嵗臨方不自由水土瘟癀的主憂又如上元甲子年二月中宫得七赤順飛一白到艮是水土太嵗也主瘟癀水火失財並自縊水火相逢蛇犬愁又如上元甲子年七月中宫得二黑順飛一白到巽是水入木鄉四月中宫得五黃順飛一白到坎是水入水鄉以上所犯若無刑帶合不為大災火木刑傷事可哀火金雖産主傷胎火土疾病當夭死更嫌水火損嬰孩木水風聲傷殺遭木金囚死不離牢木土折傷並發背木火為害迅如刀金金短折多凶暴木木癭瘤並發顚土土瞎盲兼啞疾五行發病義相連請君更用吊宫變凶吉悠然在眼前以上太嵗一星總斷其大略言五行感應之機如此可見九星之生尅制化不離五行八方之消息乘除總歸一理年月為提綱雖重日時關作用非輕再參以運氣之循環並配以奇門之變化則無因之起例皆屬可刪駕空之邪説不辨自破孟子曰經正則民無邪慝彼河洛之書非熄邪之經乎哉余不敏聊按經論次如右以待後之作者六卷終
