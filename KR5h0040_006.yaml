front:
  text: 儒門崇理折衷堪輿完孝録卷之六
  hash: sha256:1dc305e08bf912820e493196f4f4dfbc043f3a3d42f4be3f93e48f6f820547b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0040_HFL_006-001a, image: hfl/1091/1091-004.png}
body:
  text: 九宫紫白引錢塘許氏膠庠頴士也嘗於酣經孕史之暇廣玄覽鈎祕機陰陽造化之理盈虛消息之藴直窺真竅而著九宫紫白之論尤發先賢所未吐者誠與天符經相表裏者也因輯其略以俟世之知味者共嘗之九宫紫白消息總論紫白配於九宫乃方位初分之本色也九宫錯於八卦尤後天入用之玄機也以四十有五總八節之綱以一十有五布一氣之運坎北離南震東兊西立四正之位而中氣長短之咎定春艮秋坤夏巽冬乾分四維之垣而節氣寒暑之候明加乘為七十有二遊行變化進退於三百六十消息陰陽參則用其全兩則用其半奈何配以貪狼巨門武曲之别星而九宫之本星不重雜以生氣天醫福德之翻卦而八方之本卦反輕於是紛紛不論其主客飛伏不論其生旺休囚不論其尅泄化合而槩以紫白為吉吾不解也且如一白屬水而火山以水為殺六白屬金而木山以金為殺八白屬土而水山以土為殺九紫屬火而金山以火為殺其間又有輕重強弱不同殺輕為官殺重為鬼身強為用身弱為災即朝元貢福而根浮力淺未必為恩維漏元泄氣而子救母扶絡無大禍安見紫白之為全吉而餘星之為全凶乎彼所謂通天竅白天鏡圖運玄機圖運天福經運尤惑世誣民之甚者也巧立名色驚人耳目言吉則曰天祿天福天德天財之類直令人希覬莫已言凶則曰天哭天怨天災天禍之類又令人恐怖不安問之以五行生尅陰陽消息全無謂謂豈洛書之埋不足憑而紫白之形别有説乎有物即有形九宫之色所由分也有形即有性九色之理所由定也有方位即有加臨晝夜之所以循環不已也有加臨即有順逆冬夏之所以反覆相因也有天地即有參立三元之所以各領其候也有運氣即有通復六甲之所以互歸其元也故陳希夷按圖闡之冬至起甲子於坎而順行九宫見陽氣之方長夏至起甲子於離而逆飛九色知陰氣之初生陰陽之消息可憑五行之生尅有準舍具所已言矜其所未授譬之畫人物者難眩人以所明畫鬼魅者易動人以未見吾試以洛書一圖請解其九宫八卦之理以發其生尅消息之機有不立見其詖謡邪遁者否也噫我國家以制義取士士未暇留心此道故此屬得以紛紛亂之耳倘肯靜觀其四正五方之形以會其金木水火之性動察其流行飛伏之端以酌其進退乘除之用天地之升降鬼神之屈伸且不能逃於此圖之外也况此屬乎因次其大略於左一白位坎其行屬水陽水生於申敗於酉旺於玄子墓於辰絶於巽巳逄金為印逄土為殺逄木為泄逢火為財逢水為比冬為令星春則休夏則囚秋則相四季則受制凡金水年月日時為有氣生旺吉墓絶凶二黑位坤其行屬土陰土生于申敗于酉旺于戊巳墓于辰絶于巽巳逄火為印逢木為殺逢金為泄逢水為財逄土為比四季為令星秋則休冬則囚夏則相春則受制凡火土年月日時為有氣生旺吉墓絶凶三碧位震其行屬木陽木生于亥敗于子旺于寅卯墓于未絶于坤申逄水為印逢金為殺逢火為泄逄土為財逄木為比春為令星夏則休四季則囚冬則相秋則受制凡水木年月日時為有氣生旺吉墓絶凶四緑位巽其行屬木陰木一説逆生于午生于亥敗于子旺于寅卯墓于未絶于坤申逄水為印逢金為殺逢火為泄逄土為財逄木為比春為令星夏則休四季則囚冬則相秋則受制凡水木年月日時為有氣生旺吉墓絶凶五黃位中其行屬土沖土生于申敗于酉旺于戊巳墓于辰絶于巽巳逢火為印逄木為殺逢金為泄逢水為財逄土為比四季為令星秋則休冬則囚夏則相春則受制凡火土年月日時為有氣生旺吉墓絶凶六白位乾其行屬金陽金生于巳敗于午旺于申酉墓于丑絶于寅艮逄土為印逄火為殺逄水為泄逄木為財逄金為比秋為令星冬則休春則囚四季則相夏則受制凡土金年月日時為有氣生旺吉墓絶凶七赤位兊其行屬金陰金一説逆生于子生于巳敗于午旺于申酉墓于丑絶于寅艮逄土為印逄火為殺逢水為泄逄木為財逄金為比秋為令星冬則休春則囚四季則相夏則受制凡土金年月日時為有氣生旺吉墓絶凶八白位艮其行屬土陽土一説寄生于寅生于申敗于酉旺于戊巳墓于辰絶于巽巳逄火為印逄木為殺逄金為泄逢水為財逄土為比四季為令星秋則休冬則囚夏則相春則受制凡火土年月日時為有氣生旺吉墓絶凶九紫位離其行屬火生于寅敗于卯旺于巳午墓于戌絶于乾亥逄木為印逄水為殺逄土為泄逄金為財逢火為比夏為令星四季則休秋則囚春則相冬則受制凡木火年月日時為有氣生旺吉墓絶凶按五行有陰陽順逆之例蓋以干支相配而言也若九宫星煞木金土有二而水火則一也混沌開關惟有水火對待而已故先天水火列日月之門後天水火立冬夏之極水火既無有二而木金土分而為二無是理也且陽之權重陰之權輕以陰從陽有以婦從夫之義則生旺墓絶不當分順逆明矣又如戊土寄生于寅巳土寄生于酉固也然五行正理惟土在火金之交夏秋之際然後四時遞生萬物化醇也斷當以生于坤申為是九宫紫白方位圖説洛書後天此圖用洛書本宫八封數佩後天封定位方位以入用者愚按古人取紫白為吉者非無謂也以六白位乾天門樞紐也於時為開一白位坎陽氣初生也于時為休八白位艮成始成終也于時為生九紫位離向明出治也於時為景若三碧當日月之衝七赤居肅殺之地有驚傷之象四緑物茁而已壯二黑傳陰以送陽有死杜之義五黃居中其位為君其行為土權總四方威傾八面當之者摧抗之者滅故諸家最凶之星無如五黃五黃猶太嵗也可順不可犯此九星之定位也又按中宫星古曆名為太嵗一星其定位則五黃主之若每年遊行飛泊或水或木或火或金遞相為君司一嵗之權行四時之令不獨一五黃也成功者退將來者進天之道也故每年中宫星所關禍福最緊假如山向方隅與此星相遇相生相合則禍淺相尅相戰則禍深今人惟知避太嵗不知此星為真太嵗如山向方隅吊到此星而年月日時又與之沖尅為害甚大九宫星煞加臨所忌一白二黑三碧四緑五黃六白七赤九紫六捷殺即入墓辰辰未未辰丑丑辰戌暗建殺即本宫伏吟坎坤震巽中乾兊艮離受剋殺客弱主強中坤震兊兊震艮巽乾乾巽離離震巽坎穿心殺即對沖返吟離艮兊乾巽震坤坎交劔殺金與金同位兊乾閗牛殺金土與震震震震震木同位巽巽巽巽巽暗建殺為臣奪君位受尅殺為客弱主強各相對沖為穿心殺金與金同位為交劔殺金土木同位為閗牛殺五行入墓為六捷殺凡開山立向修方雖得紫白須有氣則福重無氣則福輕又當論其入墓等殺所謂白中有殺少人知是也以上星煞所忌特見其例耳如欲盡其變先當以十二支配八卦如子在坎丑寅在艮卯在震辰巳在巽午在離未申在坤酉在兊戌亥在乾如一白飛卯六白飛八白飛巳九紫飛離為刑宫如一白飛午六白飛申八白飛巳九紫飛丑為害宫其九宫星煞莫不有三刑六害也又當論其年月日時四空亡之地以消息其盈虐如甲子旬十年戌亥地為空凡用神凶神到其方皆落陷無力如甲子年正月至八月戌亥地為空九月至十二月申酉地為空如甲子旬戌亥為空然陽日空陽陰日空陰凡年月亦如此論如一重二重空亡減其力之半如三重四重空則全然無力矣大抵年上空亡關十年氣連最重月上空亡次之日時上空亡又次之僅待其出旬即可用矣即刑害空亡又當論其生扶制化如刑宫為貴人宫則刑化為權害宫為祿馬宫則害化為用如空亡宫逢生扶則實逢化合則變生以水生木木生火火生土土生金金生水水復生木之類扶以水扶水木扶木火扶火土扶土金扶金之類制以水制火火制金金制木木制土土制水水復制火之數化有以天干化地支化者甲與己化土乙與庚化金丙與辛化水丁與壬化木戊與癸化火此天干化也亥卯未化木寅午戌化火巳酉丑化金申子辰化水此地支三合化也天干化以河圖生成之數正所謂一六二七二八四九五十此自然之配合也地支化以本垣一局一局之氣乃生旺墓自然吊合也言不盡意是在能者消詳之三元年白起例圖説上元甲子年中宫起一白弘治十七年甲子為上元中元甲子年中宫起四緑嘉靖四十三年甲子為中元下元甲子年中宫起七赤三元之法移宫換氣之法也此自天地開闢以來循環不已之妙理也易之道一而二二而三三五錯綜以成變化安有不從一起者乎一白位坎玄冥之宫于數為太乙于復為天根故上元甲子起于是三周而復歸于是妙矣哉有能窺是機緘者邵子所謂親見伏羲來者是也以下月日時皆本此三元年方白法定局甲子乙丑丙寅丁卯戊辰己巳洪武十七年甲子為中元庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳正統九年甲子為下元壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳弘治十七年甲子為上元甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳嘉靖四十三年甲子為中元丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午已未庚申辛酉壬戌葵亥緣赤中乾兊艮離坎坤震巽黑黃乾兊艮離坎坤震巽中碧兊艮離坎坤震巽中乾緣赤艮離坎坤震巽中乾兊黃黑離坎坤震巽中乾兊艮紫碧坎坤震巽中乾兊艮離赤緣坤震巽中乾兊艮離坎黑黃震巽中乾兊艮離坎坤紫碧白巽中乾兊艮離坎坤震愚按治曆明時帝王首務故凡頌來嵗之曆先作一文表並所成曆焚告於帝若曰下民罔知趨避故定其歲時蚤暮日月吉凶頒行天下儻有星𦡱推算不精願當其辜下此小民永為無咎今之選擇家不奉時王之政而動以祕授愚人人何不思福量孰與朝廷推步孰與專官觀天候氣之法孰與欽天監此屬未嘗有一行之名理耶律之該博而自專自用誤人不淺曆書首載一年白圖逐月下又詳載一月白圖日時之圖浩煩難載故不備書以待能者椎類奈何國朝之憲章不奉而往往以不經邪説雜於間可怪殊甚豫故條列其論以便崇正利用一覽云三元月白起例圖説上元子午卯酉年正月中宫起八白二月七赤中元辰戌丑未年正月中宫起五黃二月四緑下元寅申巳亥年正月中宫起二黑二月一白並逆布順飛此以月分三元何也蓋子年之下是丑丑年之下是寅此上中下之次也至卯年復為上元何也蓋洛書止九宫每年有十二月積三年計三十六箇月合四九之數遊行四遍而復歸元位故子年正月起八白而卯年正月亦然也自卯而辰而巳至午年復然此古立法之意餘可類椎三元月方白法定局子午卯酉年正二三十十一十二四五六七八九辰戌丑未年七八九正二三十十一十二四五六寅申巳亥年四五六七八九正二三十十一十二一兊艮離坎坤震巽中乾二黑艮離坎坤震巽中乾兊三碧離坎坤震巽中乾兊艮四緑坎坤震巽中乾兊艮離五黃坤震巽中乾兊艮離坎六震巽中乾兊艮離坎坤七赤巽中乾兊艮離坎坤震八中乾兊艮離坎坤震巽九乾允艮離坎坤震巽中月令提綱也年家總一年之休咎其方有定而不易其權雖尊而不專若月家神煞飛泊吊替臨山到向禍福最緊尤當明其輕重取舍之法如五行本氣木山宜春月火山宜夏月金山宜秋月水山宜冬月土山宜四季月如五行進氣木山宜冬月火山宜春月土山宜夏月水山宜秋月金山宜四季月如五行財氣金月宜春月水山宜夏月火山宜秋月土山宜冬月木山宜四季月如五行退氣水山忌春月木山忌夏月土山忌秋月金山忌冬月火山忌四季月如五行鬼氣土山忌春月金山忌夏月木