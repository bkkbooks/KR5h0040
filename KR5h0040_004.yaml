body:
  text: 七政引七政發用陰陽五行之圖人元一定之圖五行生死之圖五行生尅之圖太陽出入圖太陰晨昏圖經星過宫之圖星辰分野之圖星辰定位之圖星辰垣局之圖度法時上天運躔度定局時上太陽躔度定局時上太陰躔度定局時上五星躔度定局時上紫氣躔度定局時上月孛躔度定局時上羅計躔度定局時上帝星躔度定局宫度喜忌定局圖解十二宫次序十二宫強弱十二宫身命十二宫度十二宫星辰躔度六甲年諸星定局目録終儒門崇理折哀堪輿完孝録卷之四七政引七政者即太陽太陰木火土金水是也凡山家坐向吉凶皆本於此其法但要先查天運之流行然後能知氣化之盛衰消長次要仰觀天文然後分星可明又次要俯察地理然後分野可辨由是吉可趨而凶可避真選擇之要機也因詳發于左七政發用太陽是火之精至吉之神也降福不降禍惟日食之時甚凶太陰是水之精次於太陽者也亦降福不降禍惟月食時凶木曰嵗星冬春禍福甚緊夏秋禍福遲火曰熒惑春夏禍福甚緊秋冬禍福遲土曰鎮星四季禍福甚緊春秋禍福遲金曰太白季月秋月禍福甚緊夏冬禍福遲水曰辰星秋冬禍福甚緊春夏禍福遲氣是木之餘禍福次於歲星孛是水之餘禍福次於辰星羅是火之餘禍福次於熒惑計是土之餘禍福次於鎮星星虛房昴太陽之行宫張危心畢太陰之行宫角斗奎井木之行宫尾室觜翼火之行宫氐女胃柳土之行宫亢牛婁鬼金之行宫箕壁參軫水之行宫此皆七政流行之度遇生扶者吉遇尅泄者凶陰陽五行之圖此陰陽五行之定躰本於河圖之數也皆以地支為主其天干十二位皆居其位而不專其氣定須自右向左算去人元一定之圖天干謂之天元地支謂之地元此是支中之所藏者謂之人元皆造命選擇者之不可缺故詳具于圖詩曰子宫癸水在其中丑癸辛金己土同寅宫甲木兼丙戊卯宫乙木獨豐隆辰宫乙戊三分癸己宫庚金丙戊叢午宫丁火井己土未宫乙己丁共宗申宫壬水庚金戊酉宫辛金庚亦從惟有戌宫丁辛戊亥宫壬甲是真宗五行生尅之圖長生沐浴冠帶臨官帝旺衰病死墓絶胎養以次數去陽順陰逆陽死陰必生陰死陽必生胎養生是進氣冠帶臨官是旺氣沐浴是敗氣衰病是退氣墓是藏氣死絶是盡氣凡進氣死不死退氣生不生亦有死地不死絶處逢生者此皆造命者不可不知五行生尅之圖此即河圖天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之其一生一尅皆五行自然之性也選擇者荀能知其生尅之性而行其制化之道焉必無太過不及之惠矣豈不足以趨吉而避凶耶太陽出入圖今星家皆謂太陽出在卯入在酉此不過大約之數也欲善選擇者定須以此圖考之方是時刻無差太陰晨昏圖臺曆載太陰朔後昏度望後晨度此亦大約之數也欲善選擇之法者定須以此圖考之庶幾時刻不差星辰分野之圖此是在地之分野應在天之分星者也選擇者不可不知觀氣運者亦不可不察經星過宫之圖此是二十八宿之定局七政運行之次也下應一十二州分野者不可不察星辰定位之圖每宫經星皆三十度有奇共三百六十五度有奇零四分度之各宫奇零之餘數也查七政者依此十二曜分屬十二宫皆原位也起貴人祿馬者準此如癸祿在子即查土星落處是祿元餘放此四餘皆從主氣看氏三入卯尾三寅斗四度兮丑中尋周女至二度方過去危十三度亥中輪天星度之圖奎二入戌胃四酉畢七度兮移過申井九過未柳四午張十五巳軫十辰星辰垣局之圖凡緯星在木氣之宫坐本氣之度者謂之居垣在生氣之宫坐生氣之度者謂之入局在本氣之宫坐生氣之度者謂之居垣入局在生氣之宫坐本氣之度者謂之入局居垣此算星辰禍福甚緊發用與令星同度法周天三百六十五度零四分度之一凡言四分度之一即二十五分也蓋一度該百分一分該百秒古今曆法皆準此推之時上天運躔度定局每一刻順行三度零七十六分每一時行一宫有奇記三十度零五十一分三十三秒強凡一日該行三百六十五度零四分度之一而又進一度視日行過一度視月行多十三度一年進盡周天之數方與日會而成一嵗之終或謂天運一嵗一周是自其進盡之度言之耳去時上太陽躔度定局每一刻順行三度零七十五分每一時順行一宫記三十度零四十三分七十五秒強一日順行三百六十五度零四分度之一視天行不及一度視月行多十二度一年不及一周天冬至行盈度夏至行縮度盈縮雖不同大率曆家以一日退一度入算時上太陰躔度定局每一刻順行三度零五十分每一時順行一宫弱記二十九度零四十三分七十五秒弱一日順行三百五十三度零四分度之一視日行不及十二度視天行不及十三度凡二十九日即退盡周天之數而成一月之朔弦前退疾弦後退遲大約一日退行十三度零三十七分時上木星躔度定局每一時順行一宫強記三十度有奇視天行不及七十秒強一日順行周天三百六十五度四分度之一而又過一度弱視天行不及分分零三十三秒十二日不及天行一度一百二十日不及天行十度三百六十日不及天行一宫十二年退盡一周天時上火星躔度定局每一時順行一宫強記三十度有奇視天行不及四分零七十秒弱一日順天周天三百六十五度而又過一度弱視天行不及五十分二日不及天行一度六十日不及天行一宫二年退盡一周天時上土星躔度定局氣星同每一時順行一宫強記三十度有奇視天行不及二十九秒零十分秒之五一日順行周天三百六十五度零四分度之一而又過一度弱視天行不及三分五十三秒弱二十八日零五時一刻六分不及天行一度二百八十日零四時不及天行十度二十分個月零二十五日不及天行一宫二十八年退盡一周天時上金水躔度定局每一時順行一宫有零計三十度強視天行不及八分零三十三秒一日順行周天三百六十五度零四分度之一弱不及天行一度強一月不及天行一宫一年退盡一周天時上紫氣躔度定局此星躔度之局宜用土星之類推之亦是二十八年退盡一周天時上月孛躔度定局每一時順行二十九度零九十九分強視天不及一分弱一日順行周天三百六十五度零四分度之一又過八十八分視天行不及十二分弱九日不及天行一度九十日不及天行十度九個月一宫九年退盡一周天時上羅計躔度定局每一時逆行一宫零九分五十秒弱視天行少五十秒強一日逆行三百六十五度零四分度之一而又過九十四分強視天行少六分弱十八日少一度一百八十日少十度十八個月少一宫十八年進盡一周天曆家以退數推之故云羅計左旋七曜氣孛皆右轉凡選擇年月日時定要順推七曜氣孛逆推羅計二星否則必致悮事不可不謹時上帝星躔度定局每一時行十二分度之一一日順行一度一月順行一宫一年一周天曆起驚蟄上㬋符頭其時在甲順行向卯一節過一山到山極吉或到向或到三方或到四正皆要助我扶我則吉尅我泄我必凶楊氏曰春作東方吉夏則南方吉秋作西方吉冬作北方吉四季作四隅吉亦此意耶春曰青帝夏曰赤帝秋曰白帝冬曰黑帝隨時異名其理一也宫度喜忌定局子丑二宫併氐女胃柳四宿皆土之位也凡居於其上者以木氣為難以水孛為仇以火羅為恩以金為用在四季月為令星寅亥二宫併角斗奎井四宿皆木之位也凡居於其上者以金為難以土計為仇以水孛為恩以火羅為用在春月為令星卯戌二宫併尾室觜翼四宿皆火之位也凡居於其上者以水孛為難以金為仇以木氣為恩以土計為用在夏月為令星辰酉二宫併亢牛婁鬼四宿皆金之位也凡居於其上者以火羅為難以木氣為仇以土計為恩以水孛為用在秋月為令星巳申二宫併箕壁參軫四宿皆水之位也凡居於其上者以土計為難以火羅為仇以金為恩以木氣為用在冬月為令星午一宫併星虛房昴四宿皆太陽之位也凡居於其上者忌火羅木同度喜金水二星宜於晝而不宣於夜遇日食凶未一宫併張危心畢四宿皆太陰之位也凡居於其上者忌土計同度亦宜金水二星宣於夜而不宣於晝望前力重望後力輕月食凶已上宫度恩用當令者吉仇難當令者甚凶不獨各宫為然凡大限小限亦以此例推圖解經星二十有八分布於一十二宫皆七政流行之次也緯星有七政四餘流行於各年之中變曜之所從出也因立二圖於後以便查考凡太陽所到宫度是命太陰所到宫度是身身命既定然後各宫主星可推如命在子土為主財帛即在亥木為主兄弟在戌火為主田宅在酉金為主男女在申水為主奴僕在未月為主妻宫在午日為主疾厄在巳水為主遷移在辰金為主官祿在卯火為主福德在寅木為主相貌在丑土為主逐年天星地曜皆從此出學者荀能按圖查考則吉凶可知而選擇之法可得矣各宫度主説現下文十二宫次序如用夜間時當從身宫數起一命宫二財帛三兄弟四田宅五男女六奴僕七妻妾八疾厄九遷移十官祿十一福德十二相貌十二宫強弱命宫妻宫田財官福男女此是強宫遷移疾厄奴僕兄弟此是弱宫若得時者不在此例十二宫身命自卯至酉為日固宜自命宫數起故曰一命宫二財帛三兄弟以次逆行十二宫自酉至卯為夜又不可以此例論宣曰一身宫二財帛三兄弟亦以次逆行十二宫雖七強之例亦當夜用身宫日用命宫方是的確至若身命所居又有宫主有度主尤選擇者不可不知也因條注如左子宫度在天屬玄枵之次在地則分野屬齊凡身命居之者以土為宫主喜忌見前身命坐危宿者以太陰為度主喜金水忌土計不宜無光之夜而宣有光之時坐虛宿者以太陽為度主忌火羅木星喜金水相涵不宣於夜而宜於晝坐女宿者以土為度主喜忌與宫主同丑宫度在天屬星紀之次在地則分野屬昊凡身命居之者以土為宫主喜忌見前身命坐女宿者以土為度主喜忌與宫主同坐牛宿者以金為度主以火羅為難以木氣為仇以土計為恩以水孛為用坐斗宿者以木為度主以金為難以土計為仇以水孛為恩以火羅為用寅宫度在天屬析木之次在地分野屬燕身命居之者以木為宫主喜忌見前身命坐牛宿者以木為度主喜忌與宫主同坐箕宿者以水為度主以土計為難以火羅為仇以金為恩以木氣為用坐尾宿者以火為度主以水孛為難以金為仇以木氣為恩以土計為用卬宫度在天屬大火之次在地則分野屬宋身命居之者以火為宫主喜忌見前身命坐尾宿者喜忌與宫主同坐心宿者以太陰為度主喜金水忌土計不宜於無光之夜而宜於有光之時坐房宿者以太陽為度主忌火羅木星喜金水相涵不宜夜而宜晝坐氐宿者以土為度主以木氣為難以水孛為仇以火羅為恩以金為用辰宫度在天屬壽星之次在地則分野屬鄭身命居之者以金為宫主喜忌見前身命坐氐宿者以土為度主喜忌見前坐亢宿者以金為度主以火羅為難以木氣為仇以土計為恩以水孛為用坐角宿者以木為度主以金為難以土為仇以水孛為恩以火羅為用坐軫宿者以水為度主以土計為難以火羅為仇以金為恩以木氣為用巳宫度在天屬鶉尾之次在地則分野屬楚身命居之者以水為宫主喜忌見前身命坐翼宿者以火為度主以水孛為難以金為仇以木氣為恩以土計為用坐張宿者以太陰為度主喜金水忌土計不宜無光之夜而宜有光之時午宫度在天屬鶉火之次在地則分野屬周身命居之者以太陽為宫主忌火羅木星喜金水相涵不宜於夜